body:
  text: 春秋平義卷五秀水俞汝言撰僖公名申莊公子閔公庶兄毋成風夫人聲姜在位三十三年諡法小心忌畏曰僖元年春王正月齊師宋師曹師次于聶北救邢邢地左作曹伯次于聶者為之聲援蓋救邢也崔氏救兵譏次次緩也失救道也然救而次不同於次而救者次而救者或觀釁而動乎孔義夏六月邢遷于夷儀邢地公作陳儀諸侯救邢邢人潰出奔師師遂逐狄人具邢器具而遷之師無私焉左遷邢未若邢遷為近自然也邢潰奔于師而城夷儀衛人宵濟河廬于漕而城楚丘遷者其誰耶夫使人遷之如其自遷善矣野編齊師宋師曹師城邢遷而後城之則邢也不容復稱夷儀野編秋七月夫人姜氏薨于夷齊人以歸夷齊地夫人薨不地地故也桓公召而殺之也以歸歸齊也孔義此舉殊快不如是閔之罪人終不可得左氏曰齊人殺哀姜為已甚矣女子從人者也不知左氏之所謂從人竟從誰也野編楚人伐鄭成荆改而楚矣野編從其自稱也孔義按史記武王即位結舊好于諸侯使人獻天子天子賜胙曰鎮爾南方夷越之亂無侵中國楚自此始為列國與周室通矣春秋所以改稱楚也統紀八月公㑹齊侯宋公鄭伯邾人于柳宋地公作朾左作犖衣裳之㑹六左氏曰謀救鄭也當是時楚兵已退鄭已在㑹矣蓋謀伐楚也孔義鄭甸服也密近京師勤鄭為周非為鄭也野編九月公敗邾師于偃邾地公作纓邾本附庸于魯不敢外交諸侯雖邾子瑣受王命其幽之再盟亦不敢與蓋猶附于魯地今柳之㑹邾人始與其列故八月同㑹而九月伐之責其從齊而不復附魯爾木訥冬十月壬午公子友帥師敗莒師于酈獲莒拏酈公羊作犂穀梁作麗魯地書獲之始莒納慶父又以求賂不遂而加兵魯則成季帥師敗之亦以雪先君之恥胡𫝊以友主此戰而責之不然也春秋翼二國納我罪人取敗宜已野編不以賊討慶父者體季子親親之心必以酈敗莒之慶父者著季子誅亂之義辨義十有二月丁巳夫人氏之喪至自齊二年春王正月城楚丘城武城而後遷之猶楚丘也不容遽稱衛或謂諱齊桓専封而偹責之非也猶康叔之舊封也何専之有哉野編夏六月辛巳葬我小君哀姜成其葬者喪既歸子無詘母之義也孔義虞師晉師滅下陽公榖作夏陽虞師為啓固當首兵邑也何遽言滅蓋曰晉已得虢矣左傳先書虞賄故也野編林氏曰不曰晉取者天子之地非諸侯所得取故云滅若國然屬辭秋九月齊侯宋公江人黃人盟于貫宋地公作貫澤衣裳之㑹不在九㑹之數江黃在楚東北境江黃服則楚勢孤矣惟宋與盟不煩諸侯也孔義冬十月不雨楚人侵鄭時子文為令尹楚勢駸强補程傳三年春王正月不雨夏四月不雨不雨者勤雨也一時言不雨者閔雨也閔雨者有志乎民者也榖梁徐人取舒舒楚黨也取舒所以撓楚也徐吾與也野編為齊桓通伐楚之徑也補程傳六月雨喜雨也一經書雨此為特筆孔義秋齊侯宋公江人黃人㑹于陽榖齊地謀伐楚也左以夷攻夷所以為援也徐人用以取舒江人黃人用以伐陳野編冬公子友如齊涖盟榖作公子季友涖公榖作蒞聼伐楚之期也木訥楚人伐鄭至是楚人五加兵于鄭矣孔義四年春王正月公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯侵蔡蔡潰遂伐楚次于陘楚地夲謀楚也曷為先蔡凡所與楚爭者陳蔡鄭也鄭方受兵而蔡先即楚則侵之因彼奔告代我𫝊檄所以為聲也可頌言伐楚矣夫責人者使可承也厥貢惟金而徵包茅用重而物薄也厥罪僭號而問昭王之不復事大而時逺也非敬仲不能為此辭也楚人半推半承殆將服矣次于陘師進也野編齊桓圖伯二十餘年至是始有事於楚猶未敢聲言伐之也以侵蔡召諸侯借侵蔡以出楚不意此威公之謀也戴溪趙鵬飛曰蔡自莊十四年荆入蔡哀侯折而事楚已易世不通中國今二十四年矣蔡已入楚則次及于鄭蔡鄭當楚之衝華夷之門户也齊侯不得蔡無以伐楚侵蔡伐楚勢當然矣木訥夏許男新臣卒穆公卒子僖公業立脫于師字下有盟于師知為脫也野編楚屈完來盟于師盟于召陵來盟于師完之意也盟于召陵桓之意也蓋先請為盟而後齊始退師盟于召陵耳孔義齊師雖强桓公能以律用之而不暴楚人已服桓公能以禮下之而不驕故召陵之盟春秋所美也胡氏齊人執陳轅濤塗轅公榖作袁伯討也濤塗誤師野編秋及江人黃人伐陳孰及之齊人也不言遂踰時也野編八月公至自伐楚大伐楚也榖梁葬許穆公公作繆冬十有二月公孫兹帥師㑹齊人宋人衛人鄭人許人曹人侵陳兹叔牙子公作慈伯國大夫㑹諸大夫侵與國始此本伐楚也曷又移陳陳蔡鄭逼楚常懷兩端徑陳陳不果納其心未可知舍之教二執之又當歸之取成于陳而歸轅塗薄伐楚而深望陳所以為實也此帖荆終局也野編五年春晉侯殺其世子申生目晉侯斥殺惡獻公也杞伯姬來朝其子伯姬歸寧因見其子於公時年十嵗是年德公卒所朝之子立是為成公蓋是時德公病欲托其子于魯然非禮矣孔義夏公孫兹如牟凡大夫聘他國曰如孔義姜廷善曰牟自來朝後屬魯時齊桓事從簡便不令小國與㑹而貢賦則助大國供事魯人以從齊征伐㑹盟之故使兹如牟取貢賦之助主所知也左氏謂兹以私娶行恐非辨義公及齊侯宋公陳侯衛侯鄭伯許男曹伯㑹王世子于首止公榖作首戴衛地衣裳之㑹七㑹王世子所以尊王也野編王世子危不得立齊桓公率天下之諸侯而為㑹以定之禮之變者也殊㑹世子而不以世子夷于諸侯所以定世子也陳氏後傳秋八月諸侯盟于首止前此未有㑹王世子者齊桓創為之知有羽翼之事是時王欲以寵子帶易世子鄭非口舌所能爭也因㑹致敬不言而示所以為妙㑹在夏盟在秋各為一事後儒不知謂㑹是定世子盟是相要同戴世子處人父子兄弟正未易言尚未夢見齊桓况可與于春秋之微哉野編陳氏傳㑹有周人盟無周人書㑹于某但曰諸侯盟則齊桓之孫也㑹有周人盟于周人書㑹于某但曰某日盟則晉厲之伉也辨義鄭伯逃歸不盟凡桓之盟皆為周也鄭常顧楚是以善逃臣逃于幽君逃于首止野編逃盟于王世子無損然鄭二楚生心即滅弦楚敢背召陵之盟者鄭伯致之也傳斷楚人滅弦弦子奔黃狄始滅中國凡書楚人滅國皆言楚張也夷夏宜分併則中國憂矣野編黃弦同壤而受弦子之奔楚之滅黃亦自此始張洽九月戊申朔日有食之冬晉人執虞公不言晉之滅虞虞自滅也秦之取梁也書曰梁亡而不及秦以為梁自亡也晉之滅虞也書曰晉人執虞公而不言晉人伐虞以為虞自滅而晉人執其君耳蘇氏熊氏曰滅下陽晉據而有之者也虢公醜奔京師未嘗執也故書地其重在地也虞滅而修其職貢于王謂輸其甸服之貢則虞公猶存于國置之而不得他去其事與下陽異而執天子三公重在人也辨義六年春王正月夏公㑹齊侯衛侯曹伯伐鄭圍新城治首止之逃也圍新城而不下夫爭城以戰多殺士卒桓有教士三萬不與鄭爭新城諸葛有整卒十萬不與魏爭陳倉其斯以為節制之兵與野編新城鄭人新築密邑左疏楚人圍許諸侯遂救許楚人圍許以救鄭經不書不與楚人救鄭也孔義黃正憲曰救稍緩則楚必入許將據其要害與鄭同為犄角以制我矣故遂釋圍以救之如前緩于救衛而急于救邢皆伯主權時應變之衡耳辨義冬公至自伐鄭不以救許致師以伐鄭出也孔義七年春齊人伐鄭鄭未服故復伐齊力足以制之不煩諸侯也補程傳夏小邾子來朝公作小邾婁子即郳黎來也齊桓公請于天子進之邾之别封故曰小邾始得王命而來朝也孔義鄭殺其大夫申侯申侯自楚往也實通楚師鄭殺申侯乞盟之漸也野編秋七月公㑹齊侯宋公陳世子欵鄭世子華盟于寧毋魯地榖作寧毋衣裳之㑹八因管仲之言不受鄭世子為內臣之請見救正之功大也補程傳曹伯班卒班公榖作般昭公卒子共公襄立公子友如齊冬葬曹昭公八年春王正月公㑹王人齊侯宋公衛侯許男曹伯陳世子欵盟于洮鄭伯乞盟公陳世子欵下有鄭世子華洮曹地兵車之㑹一惠王崩襄王懼太叔之難不發喪而告難于齊於是有洮之盟王人下士也而先諸侯貴王命也孔義鄭伯初迎惠王之意則背首止既知襄王將立則請盟洮前書逃後書乞皆賤之也𫝊斷夏狄伐晉前狄伐邢齊救而城之狄入衛齊徙而封之今狄伐晉齊桓如不聞蓋自齊之伯晉歷三世未嘗一窺齊侯之壇坫齊不伐晉幸也何狄之問趙氏秋七月禘于太廟用致夫人何以謂之致也不廟見何名夫人惟廟中獻禮夫人與焉則因禘而致之爾致之斯夫人之矣野編言夫人不以姓氏非夫人也立妾之辭也非正也夫人之我可以不夫人之乎夫人卒葬之我可以不卒葬之乎榖梁聲姜也公羊云以妾為妻蓋脅于妾媵之先至者也然則安知其非成風也成風後此尚三十年君薨母不入廟無所致之然則何以知其為聲姜也曰致之又明年公及夫人姜氏㑹齊侯于陽榖則是聲姜也黃道周致者三月廟見以禮成婦之名季孫行父如宋致女即其事也夫人者聲姜也聲姜在春秋中獨為保其完吉者其失禮在事而不在夫人也辨義冬十有二月丁未天王崩左氏云七年閏月惠王崩襄王惡太叔之亂不發喪而告難于齊八年正月㑹于洮謀王室也襄王定位而後發喪據此則正月二月位已定何至十二月而後告喪于諸侯乎左氏殆不足憑也吳氏謂惠王前年冬有疾而今年冬乃崩者近之趙氏九年春王正月丁丑宋公御說卒正月公榖作三月御公榖作禦桓公卒子襄公兹父立不葬魯不㑹也趙氏曰迫于葵丘之㑹也孔義或以襄公在喪與㑹簡父葬禮不及致諸侯也補程傳夏公㑹宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘齊地衣裳之㑹九曰宰周公者以冢宰兼三公也襄王之位桓公所定也故使宰孔來錫命焉桓公合諸侯而為㑹所以重王命也孔義陳傅良曰桓之㑹有天子之三於洮序王人於諸侯之上而同盟焉於葵丘亦序周公於諸侯之上而不敢同盟焉盟于首止不但不同盟而帥諸侯以㑹世子桓知節矣春秋是以豫桓也秋七月乙酉伯姬卒內女為夫人書卒許嫁為夫人亦然啖氏九月戊辰諸侯盟于葵丘言諸侯盟則不盟宰周公矣不敢使天子宰受諸侯約束也㑹盟同地而再言之葵丘之盟美之大者也孔義葵丘五命伯仲誥誓天子之禁也故曰五霸桓公為盛㑹者七人叛者安得九國王充儒增之篇誠非論也野編甲子晉侯佹諸卒公作甲戌佹公榖作詭獻公卒子奚齊立遇殺弟卓子立前已書戊辰不應書甲子在戊辰後合從公羊張洽晉里克殺其君之子奚齊殺公作弒言君則當國言子則當喪其君之子淺辭也誰非君之子野編其君之子云者國人不子也不正其殺世子申生而立之也榖梁十年春王正月公如齊朝齊之始公始朝齊也孔義狄滅溫溫子奔衛天王出居之漸也王惡溫子而安狄人不告于齊遂為晉文開霸之資野編熊過氏曰溫子爵國鄭漁仲曰已姓顓頊裔孫封于蘇鄴西蘇城是也今臨漳西二十里地近衛南東界于狄狄利其近已故滅之地遂入狄圻內别有溫司寇蘇忿生食邑在今懷慶府南與鄴西之溫不同左氏誤以為一文十年魯及蘇子盟于女栗其國尚存則謂襄王勞文公而賜之溫近于誣矣夫溫子蘇子豈可附㑹而無别哉辨義晉里克弒其君卓及其大夫荀息卓公作卓子惠公夷吾立殺奚齊書殺其君之子者獻公未葬奚齊未成君也殺卓書弒其君者獻公既葬卓免喪稱君也𫝊斷里克君之也書及所以明其節書大夫不失其官於息奚取焉公羊曰若息者可謂不食其言矣胡𫝊夏齊侯許男伐北戎晉殺其大夫里克里克弒二君一大夫不以討賊之詞書者殺之不以罪也里克所為弒者為重耳也夷吾曰是又將殺我乎故殺之而非討其弒也不以弒君之罪討之故書殺其大夫孔義秋七月冬大雨雪公作雹酉戌亥月非大雨雪之時也故尤為異髙閌十有一年春晉殺其大夫㔻鄭父惠公以私意殺里克故其黨皆懼鄭之有此謀由殺里克致之也故稱國以殺而不去其官野編里㔻世子黨也吕郤夷吾黨也春秋書里㔻不書吕郤補程傳夏公及夫人姜氏㑹齊侯于陽榖聲姜夫人齊侯子也明年㑹于卞野編秋八月大雩冬楚人伐黃病桓公也黃既服齊不供楚貢故楚伐之而齊不救負黃甚矣孔義十有二年春王三月庚午日有食之推厯當為五月庚午朔闕朔字夏楚人滅黃甚楚也野編秋七月冬十有二月丁丑陳侯杵臼卒杵公羊作處宣公卒子穆公欵立十有三年春狄侵衛黃正憲曰狄在北境其東則入齊之衝東南則入宋衛之道西南則入陳鄭之道自緣陵暨城衛少狄患亦非無益之舉然不越三時而由西道以侵衛齊竟坐視不救乃知城緣陵之役桓公實為己謀耳辨義夏四月葬陳宣公公㑹齊侯宋公衛侯鄭伯許男曹伯于鹹衛地兵車之㑹二淮夷病杞故左鹹為衛地在今開州距杞三百餘里㑹于鹹者謀杞也夫淮夷在南與王室逺不相涉或者狄勢方橫欲南㑹淮夷以困中國故為此㑹以謀之歟觀淮夷越宋而病杞明年狄越衛而伐鄭鄭與杞近蓋駸駸有相合之勢也城緣陵之謀自此起矣略記秋九月大雩冬公子友如齊十年春正月公如齊說者曰魯始朝齊也十三年冬公子友如齊則大夫聘問之常矣𫝊斷十有四年春諸侯城緣陵杞邑濰州營邱城而後遷之猶緣陵也不容遽稱杞城楚丘何以不書諸侯城緣陵何以書諸侯城楚丘不書諸侯封衛者齊非諸侯也城緣陵書諸侯㑹于鹹之諸侯也野編詹菜曰㑹鹹謀衛也城緣陵固衛也以楚丘之城不足以禦狄故復城其塞邑以藩之也不繫之衛者為天下禦狄也或謂為淮夷病杞故而遷之非也辨義夏六月季姬及鄫子遇于防使鄫子來朝鄫榖作繒朝不言使曹伯使射姑子制命于父猶可也季姬使鄫子夫制命于婦無時而可鄫子者用于次睢之社者也野編秋八月辛卯沙鹿崩晉山異在一國而大者為天下記之野編狄侵鄭冬蔡侯肹卒穆侯卒子莊公甲午立十有五年春王正月公如齊昭三年子太叔曰文襄之伯其務不煩諸侯今三嵗而聘五嵗而朝有事而㑹不協而盟今按公十年如齊此又如齊用五年一朝同于事天子之禮矣孔義楚人伐徐徐即諸夏故左三月公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯盟于牡丘遂次于匡衛地兵車之㑹三公孫敖帥師及諸侯之大夫救徐帥公作率慶父之子大夫往救君次而待之楚人輕剽不與爭也野編夏五月日有食之推厯當為四月癸丑朔闕癸丑朔字秋七月齊師曹師伐厲厲楚黨也伐厲所以撓楚也攻其所與即楚犯中原亦只伐鄭圍許野編八月螽公作􅏑九月公至自㑹魯侯凡再朝桓公而不書至蓋為伯主者必若桓而後可當諸侯之朝為諸侯者必善事齊桓而後得朝伯主之禮故特書至自㑹以别之屬辭季姬歸于鄫己卯晦震夷伯之廟異在一家而大者為國記之日事遇朔曰朔戊申朔隕石於宋己巳朔戰于泓是也遇晦曰晦己卯晦震夷伯之廟甲午晦戰于鄢陵是也二𫝊以為晝晦野編冬宋人伐曹同盟始自相攻而桓不能禁矣宋曹之爭始此其後曹卒亡于宋孔義諸侯相加兵自莊公十九年來未之有也於是再見宋襄為之也木訥楚人敗徐于婁林徐地徐恃救而敗伐厲之謀無補孔義十有一月壬戌晉侯及秦伯戰于韓獲晉侯秦始見經韓晉地秦晉兵端之始秦晉之兵始于韓而終于十三國之伐秦伯伐晉而經不書伐専罪晉也獲晉侯以歸而經不書歸免秦伯也君獲不言師敗績君重于師也孔義敗而書及惡之也野編十有六年春王正月戊申朔隕石于宋五是月六鷁退飛過宋都隕公作霣鷁榖作鵙物之逺者惟星言隕星未若言隕石手可得而捫也微者惟風言異風未若言受風之鷁目可得而察也星隕而石貴化為賤不善化者也鷁飛而退前變為却不善變者也野編不言石隕于宋而曰隕石天應之也伊川三月壬申公子季友卒成季自是季氏世為卿大夫卒而書名曷為書字世卿也孔義季友猶仲遂也皆有援立功僖何以興般閔弒宣何以立惡視廢野編夏四月丙申鄫季姬卒秋七月甲子公孫兹卒兹公作慈戴伯其後為叔孫氏冬十有二月公㑹齊侯宋公陳侯衛侯鄭伯許男邢侯曹伯于淮兵車之㑹四淮夷病鄫謀城鄫也不果城而還孔義王樵曰或者謂合南北之成自向戌始而不知此㑹已為之權輿矣辨義熊過曰淮今泗州盱眙淮水所經處古臨淮也鄫今沂州去年楚人敗徐婁林泗州近古徐州故今為齊謀楚以㑹其地徐子雖未㑹明年與徐伐英氏則兹㑹之以也辨義十有七年春齊人徐人伐英氏英氏楚之屬也齊人為徐伐之以報婁林之役蘇氏夏滅項孰滅之齊人也不言遂踰時也野編英項皆楚與國齊桓伐英滅項以報婁林之役承上文故不再舉齊也與四年及江黃伐陳同先儒以項為魯滅僖公在㑹季孫所為者非也夫季孫行父當祖友卒其父無佚蚤亡時尚稚年終僖公朝未専國政焉得擅為此事乎西亭辨疑秋夫人姜氏㑹齊侯于卞魯地九月公至自㑹冬十有二月乙亥齊侯小白卒桓公卒國亂明年孝公立淮徐地接㑹于淮謀徐也踰月伐英氏踰時滅項皆楚黨也可以報婁林之敗矣師還過我夫人出㑹之九月公至自㑹淮之㑹也而桓亦告終矣鹹之㑹下有城緣陵知是謀杞也淮之㑹下有伐英氏知是謀徐也左氏曰謀鄫也役夫夜呼中作罷歸便是淮事未了又楚有英氏項氏以地為姓蓋併于楚者也與魯絶逺左氏謂魯人滅項齊人止魯侯皆不取也起北杏迄淮三十有九年此齊桓公之伯也野編十有八年春王正月宋公曹伯衛人邾人伐齊公羊宋公下有㑹字納孝公也不言納與入孝公齊之世子也言納與入嫌於不當立也蘇氏子昭正乎曰正桓方圖伯管仲為輔葵丘初命凛然若非義嗣未應君臣俱失以此知其正也桓晚年更屬意無虧矣曰昭已為太子公雖意移未能廢也無虧求為太子公雖心許未能立也且事發于雍姬其為奪正明矣宋可以伐之與曰可如伐喪何曰伐亂也非伐喪也孝公得國于四公子之手而說春秋者必以為罪又纍納孝公之宋與同伐齊之衛則吾不知也野編夏師救齊五月戊寅宋師及齊師戰于甗齊師敗績齊地勝而書及豫之也甗之戰襄所僅有公羊子曰曷為不使齊主之豫襄公之征齊也桓公死竪刁易牙爭權不葬世有辨者不能謂竪刁易牙善也野編狄救齊秋八月丁亥葬齊桓公九月而葬冬邢人狄人伐衛狄始書人十有九年春王三月宋人執滕子嬰齊夏六月宋公曹人邾人盟于曹南公作宋人鄫子㑹盟于邾己酉邾人執鄫子用之㑹盟後㑹也孔義總曹南之㑹前乎㑹者執滕子後乎㑹者執鄫子所謂一㑹虐二國之君也宋書公諸侯書人屬辭絶類北杏何也襄自為太子已能讓國稱譽甚美故桓公管仲屬孝公焉蓋明以此座付之惜也曹南以後無一事不錯春秋于鹿上始人之曰今而後知宋之不遂伯也野編秋宋人圍曹曹為宋共起事即有同異猶宜隱之而造次稱兵示人淺也野編衛人伐邢報菟園之役也孔義冬㑹陳人蔡人楚人鄭人盟于齊公作公㑹楚始與夏盟楚人得與中國㑹盟自此始首陳陳倡盟也後鄭鄭首叛也以其人楚不可不人陳蔡以其人陳蔡不可不沒公地以齊則君亦與矣孔義按宋公暴虐陳穆公請修好焉以無忘齊桓之德桓公攘楚而反與之盟是為不忘桓公之德者乎楚之抗衡中夏禍實始此梁亡言其自亡非秦亡之也蘇氏三十年新作南門非所當作而作也故當作者閟宫泮水之役皆不書孔義夏郜子來朝姬姓南郜也郜有二桓二年取郜大鼎者北郜也𫝊斷五月乙巳西宫災小寢也公羊鄭人入滑姬姓滑與鄭鄰桓公死鄭首從楚稱兵周疆孔義秋齊人狄人盟于邢於衛方病邢謀衛難也孔義齊孝之無知厥父攘夷厥子盟楚于國厥父攘狄厥子盟狄于邢齊人狄人復何辨𫝊斷冬楚人伐隨姬姓二十有一年春狄侵衛為邢故襄陵許氏曰中國無伯則諸侯力攻四夷衡决民被其災此書伐衛伐邢入滑伐隨侵衛者著無伯之患也孔義宋人齊人楚人盟于鹿上此求諸侯于楚無緣得有齊人于齊之盟諸侯盡在齊故因齊人以請也然則宋楚合矣何以伯為曰亦欲服楚爾宋公志大才疏謂吾有求于楚不容不應若得諸侯而為㑹以好往度亦無他則吾已折服楚矣因東鄉而臨魯衛曹滕邾鄫亦如之則吾伯事已成此鹿上之志也野編髙忠憲曰齊桓攘楚以安中國宋公盟楚以求諸侯人楚故人宋也辨義夏大旱秋宋公楚子陳侯蔡侯鄭伯許男曹伯㑹于盂執宋公以伐宋盂宋地公作霍榖作雩或作宇楚始稱子執宋公者楚子也何以不言楚子執之分惡于諸侯也夫盟主所以合天下之諸侯攘戎狄尊王室者也宋公欲繼齊桓而與楚盟㑹豈尊攘之義歟胡傳召陵之役致江黃以撓楚者宋也僖二年齊宋江黃盟于貫三年齊宋江黃㑹于陽榖則楚之銜宋久矣十二年楚人滅黃豈遂忘宋乎十七年齊桓公死宋襄公不量力而欲為桓之事牛耳未執身先為虜故書其事以為伯者之戒郝解夫吳楚僭王久矣而春秋不道也其恆稱不過曰吳曰荆曰吳人楚人而已柏舉之勝蔡侯進之黃池之㑹魯晉進之此吳之所以始稱子也盂之張五國進之厥貉之㑹四國進之此楚之所以始稱子也故吳楚一也彼以蠻夷之禮接之我則書之為蠻夷稱荆稱吳者是也彼以從諸侯之禮接之我則書之為從諸侯稱楚人吳人者是也彼以大國之禮接之我則書之為大國稱楚子吳子者是也實録而已統紀楚人使宜申來獻捷楚大夫始見經不書宋捷削也此非戎捷所不忍聞野編十有二月癸丑公㑹諸侯于薄釋宋公宋地諸侯執之諸侯釋之何也曰司馬歸矣設守械以守國矣雖殺宋公猶不得宋國釋之為楚非為宋也執之罪也釋之亦罪也野編二十有二年春伐邾取須句公作胊直取邑爾野編夏宋公衛侯許男滕子伐鄭怒鄭之與楚也孔義秋八月丁未及邾人戰于升陘魯地記曰邾婁人復之以矢自戰于升陘始蓋惡戰也公胄縣諸魚門不書公削也不言敗績互有勝負野編冬十有一月己巳朔宋公及楚人戰于泓宋師敗績宋公被執見釋而猶爭諸侯楚以戎狄而干諸夏故泓之戰雖曲在宋而春秋辭無所豫蘇氏二十有三年春齊侯伐宋圍緡榖作閔宋邑齊孝公宋襄所立也又有鹿上之盟今乘其敗楚而伐之且㑹盂不至盟薄不與不仇猾夏之楚而仇立已之宋不伐宋于爭盟之時而伐宋于敗泓之後春秋所以圍伐並書重絶其惡也𫝊斷夏五月庚寅宋公兹父卒兹公作慈襄公卒子成公王臣立宋襄不葬秦繆不卒春秋不成之為伯也或曰不葬不往㑹也不卒不來赴也春秋葬陳哀公楚已滅陳往㑹乎來赴乎野編秋楚人伐陳伐陳以城頓也陳頓之爭始此孔義冬十有一月杞子卒成公卒弟桓公姑容立襄二十九年晉女叔侯曰杞夏肄也而即東夷時王貶之殆以此耳杞桓公之來朝于僖二十七年稱子于文十二年則稱伯杞文公㑹盟于襄二十四年尚稱伯二十九年即稱子至昭六年卒復稱伯左氏以為杞用夷禮故曰子豈文公之身忽夷忽夏乎大抵杞為先代之後天子所備三恪者故再降而再復其他則降而不復也略記二十有四年春王正月夏狄伐鄭夫伐鄭者伐周之形也可言伐鄭不可言伐周溫在河之陽南望玉門即鄭虎牢也西望雒汭即周也故溫之有狄周鄭之患也野編秋七月冬天王出居于鄭何以書遜狄也何以居于鄭與同患也天王居翟泉不言出翟泉近而鄭逺也何時出冬也何時歸盟于踐土猶鄭地也有王所焉久于鄭中國無伯也狩于河陽去雒城百里即周京矣歸當在此時此出居始末也春秋之文如斷山復嶺氣脉遙接蓋天王出居于鄭下接踐土而河陽之㑹上接狄滅溫中雖有間事纍纍可辨非盡棄其學不能知也野編帶之亂衛士將禦之王曰先后其謂我何故出居鄭三𫝊曰天子無出又曰王者無外夫一視同仁王者之心此所謂無外也豈謂王者一出而遂有外乎聖人書天王出居于鄭志天王出而天下無勤王者非謂王不可出而出也木訥簡端録惠王無出無入天子之位不使鄭與焉爾也襄王有出無入天子之位不使晉與焉爾也敬王有居無立天子之位亦不使劉單與焉爾也晉侯夷吾卒惠公惠公卒于去年九月晉文定位而後告喪故書於今年孔義是嵗秦納晉公子重耳不書不豫繆之伯也文之得國從容不如蔡季不可言歸匆遽不如齊小白不可言入當書秦人納重耳于晉如齊人納捷菑于邾則伯在秦矣左氏叙公子重耳所過衛曹鄭皆不禮焉齊桓宋襄則禮之楚子享之對以治兵中原辟君三舍若前知城濮事者其後侵曹伐衛解宋免齊辟楚大類主父偃新貴一飰必酬睚眦必報夫侵曹伐衛解宋免齊戰城濮皆有狐趙之謀文之略若如所言則皆莽也且夫曹衛楚之黨也齊宋楚之仇也自欲與敵反爾豈復憶疇昔周旋哉當與蔡姬蕩舟事並從洗濯為二伯開生面也野編二十有五年春王正月丙午衛侯燬滅邢邢衛均有狄患均受齊桓之德遷而城之二國就安則比以抗狄可也邢乃畔衛從狄又脅狄以伐衛故衛滅邢所以奪狄之援紓國之病也自十八年以至于今書邢衛之事甚詳所以著邢不當附狄伐衛衛亦不當從而遂滅之木訥燬之名滅同姓也三傳云然朱子曰諸侯滅國未嘗書名經文只隔夏四月癸酉一句便書衛侯燬卒恐是因而𫝊寫之誤朱子舉不信三𫝊也野編夏四月癸酉衛侯燬卒文公卒子成公鄭立宋蕩伯姬來逆婦宋殺其大夫史佚其名也野編秋楚人圍陳納頓子于頓圍陳為納頓子也頓在宛葉之間蓋中夏也是兼國多矣于頓何有以風示諸夏爾野編葬衛文公冬十有二月癸亥公㑹衛子莒慶盟于洮魯地衛成公稱子喪未逾年也莒慶莒大夫也以其釋酈之怨特書嘉之也蘇氏二十有六年春王正月己未公㑹莒子衛寧速盟于向莒地速公羊作遫尋洮之盟也左齊人侵我西鄙公追齊師至􅈶不及齊地􅈶公榖作嶲不公榖作弗討洮向二盟故孔義夏齊人侵我北鄙我自盟莒衛何與齊事而以為討齊甚矣二鄙受侵師未及國孔義衛人伐齊為我故伐齊不為無與野編公子遂如楚乞師書乞師始此展禽致辭而北鄙之師立退矣僖公不能用賢圖治而乞師蠻夷何為乎孔義何遽即楚莫恥于乞也野編定四年蔡侯以吳子及楚人戰于柏舉不言乞師桓十四年宋人以齊人蔡人衛人陳人伐鄭不言乞師而此獨言乞師者東門襄仲臧文仲撫蠻人以殘中國特書乞師以甚其惡秋楚子滅夔以夔子歸夔公作隗楚同姓之國冬楚人伐宋圍緡榖作閔宋成公忘父仇而往朝楚今新即晉故楚伐之孔義公以楚師伐齊取榖公至自伐齊一僖公也先任公子友而智晚任公子遂而愚其始也從齊伐楚其終也以楚伐齊𫝊斷二十有七年春杞子來朝成公弟桓公也孔義夏六月庚寅齊侯昭卒孝公卒子昭公潘立秋八月乙未葬齊孝公三月而葬速乙巳公子遂帥師入杞强則卑杞卑邾弱則事齊事楚人謂僖賢魯猶秉周禮吾不信也野編冬楚人陳侯蔡侯鄭伯許男圍宋楚人爭伯魯與曹衛陳蔡鄭許皆從宋懷父仇弗南服楚遂合諸侯圍宋然獨陳蔡鄭許者楚道所由且留曹衛以遏晉留魯以遏齊其困宋云狡矣榖梁子曰人楚子所以人諸侯然曷不人諸侯惟曰陳侯蔡侯鄭伯許男實從楚人圍宋則益著傳斷春秋之法盟主爵而諸侯人者有矣未有盟主人而諸侯爵者也人楚子而爵諸侯不與楚子以主夏之盟也家氏傳春秋之於諸侯有因其自尊而尊之自卑而卑之者北杏曹南之㑹是也有因其自尊而卑之自卑而尊之者圍宋之役是也略記十有二月甲戌公㑹諸侯盟于宋諸侯皆已為楚矣野編二十有八年春晉侯侵曹晉侯伐衛此晉伯之始兩挈晉侯明文之譎也侵曹一晉侯也伐衛一晉侯也猛毅迅疾如分身然非是莫可當楚者曹衛何罪匪曹衛之求將以致楚也且背夏即楚獨非罪乎召陵侵蔡亦略相同野編公子買戍衛不卒戍刺之公子買戍衛楚人救衛不克公懼于晉殺子叢以說焉謂楚人曰不卒戍也左刺未有書其故者書其故言非實也蘇氏楚人救衛晉所求也野編三月丙午晉侯入曹執曹伯畀宋人衛楚所急也曹亦楚所急也救衛則不能兼顧曹而晉已入之宋人醳兵受賜親我者勸仇我者懼而諸侯皆已為晉也野編分曹衛之田以畀宋者非厚宋也激楚之怒也私許曹衛之復使絶于楚者非愛曹衛也致楚之戰也馬森辨疑夏四月己巳晉侯齊師宋師秦師及楚人戰于城濮楚人敗績衛地春秋甚美城濮之戰遂伯矣晉書侯三國書師北杏之法也朱子曰齊桓公死楚侵中國得晉文公攔遏住如橫流泛溢硬做隄防野編晉欲救宋則先伐曹衛欲與楚戰則先激齊秦楚怒益甚晉謀方老子玉徒恃西廣東宫與若敖六卒以戰三大國之師能無敗乎𫝊斷楚殺其大夫得臣子玉楚始書大夫此殺有罪而以纍上之詞言之惡楚子也楚子知其不可使也而不能弗使知其不可敵也而不能使之勿敵是亦棄其師之道也權衡簡端録城濮之敗楚殺子玉於及瑕之時而罪止其身邲之敗晉殺先縠於及清之後而罪及其族緩急重輕其孰得失乎禮謀人軍師敗則死之城濮敗而誅子玉泜水退而誅子上鄢陵戰而誅子反屬國畔而誅子辛是乃楚所以振爾郝敬直解衛侯出奔楚左氏晉侯齊侯盟于斂盂衛侯請盟晉人弗許衛侯欲與楚國人不欲故出其君以說于晉衛侯出居襄牛間聞楚師敗懼出奔楚孔義五月癸丑公㑹晉侯齊侯宋公蔡侯鄭伯衛子莒子盟于踐土鄭地衛子者誰叔武也叔武非世子又無君喪而子之何也曰以喪禮處之也晉立以為君書侯則無等也書名則沒其實故以喪禮處之若以君父奔楚之為哀痛也黃道周陳侯如㑹來不及盟故曰如㑹孔義公朝于王所書朝王始此盟于踐土奉迎始事前書居于鄭此于踐土何也于鄭猶草次也于踐土新築王宮為王所也先㑹後朝何也此非常朝共奬王室固當有盟盟則須㑹也陳侯書如㑹何也初與楚伐宋者陳蔡鄭衛今畢㑹也獨逋一許爾公朝諸侯皆朝矣此踐土實録也野編書朝而後盟是以天子與斯盟也書盟而後朝不以天子與斯盟也孔義臣之于君惟其所在而朝覲焉公榖乃有非其所之論又有不與致天子之論皆非也補程傳趙氏曰晉文之伯功與齊桓同而勢與齊桓異齊桓之時楚不出蔡鄭而今直蹈齊魯之郊故齊桓伐楚至于召陵楚地也晉文敗楚止于城濮衛地也自楚及衛蓋千里却楚千里之外以收魯宋曹衛陳鄭許蔡半天下之諸侯其用力為何如三𫝊有天王下勞諸侯之說此不可信經于僖二十四年書天王出居于鄭自後未嘗書歸于成周踐土即鄭地也則天王蓋居于是久矣何下勞之有或謂左氏有晉侯納王之事遂以為實春秋以周為重安有晉侯納王而不書者哉天王之歸蓋因今踐土之盟也前此鄭陷于楚天下無勤王者今晉侯克楚于城濮以敵王愾奏凱于王㑹諸侯盟于鄭以諸侯朝焉天王因是復歸于成周冬書河陽之狩則天王既歸而出狩也文公非緩于納王也蓋先勝楚而後納王也伐楚者納王之實也然則踐土之盟厥勳茂哉日抄六月衛侯鄭自楚復歸于衛鄭之盟殺叔武也叔武何以不見踐土已列衛子矣野編衛元咺出奔晉陳侯欵卒穆公卒子共公朔立秋杞伯姬來公子遂如齊始平于齊也張洽曰杞伯姬來而入杞之怨釋公子遂如齊而取榖之憾解中國貴于伯權之立如此孔義冬公㑹晉侯齊侯宋公蔡侯鄭伯陳子莒子邾子秦人于溫畿內地穀晉侯下無齊侯秦與中國㑹始此此書㑹在天王狩于河陽之上則知天王將出狩諸侯㑹以朝之所以尊王也且議討衛所以服有罪也湛若水正傳天王狩于河陽狩榖作守即溫壬申公朝于王所晉人執衛侯歸之于京師諸侯之㑹在溫天王之狩在河陽諸侯既㑹而復以壬申朝于王所其事不過如此若王室微諸侯强天王因出狩而就見其迹亦曉然可知也日抄㑹于溫逐狄也狄整居于溫懲荆而不膺狄京師未得歸也故乘城濮之勝大㑹于溫為王前驅則何以不言狄也比至已無狄矣是溫而已矣天王何以狩也溫子叛王即狄狄又攻王而奉太叔三叛聚慝將東行以厭之河陽溫也于河陽大之也壬申稱王所猶行在也執衛侯乃書京師王歸自鄭矣奉迎事竟此于溫實録也召陵之功髙于城濮于溫之事大于救邢好處却被後人說壞野編黃正憲曰晉文藉齊秦以勝楚又欲糾齊秦以納王故三國在從諸國渡河西北合之耳但襄王出奔五載回鑾之際防範當嚴况頺叔之黨盡在溫雒間尤不可不備晉文乃命諸侯各整師徒為扈衛從行之計先于河陽簡集訓練振刷人心請天王大閲以整武備如宣王㑹東都搜狩講武故事聖人有嘉豫之意焉而可泥左氏之說以沒人善乎辨義衛元咺自晉復歸于衛多此一歸纍公子瑕矣野編歸大夫不言復言復者抗也自晉晉有奉焉孔義熊過曰惠王復周公忌父鄭復公父定朔宋復蕩意諸不書必據外援以歸然後書其曰自晉譏在晉也君歸則出奔而歸晉君出則晉奉而歸衛陳君舉曰衛元咺復歸宋魚石晉欒盈復入皆抗辭也辨義諸侯遂圍許討不㑹踐土也野編曹伯襄歸于曹遂㑹諸侯圍許遂㑹諸侯圍許如未嘗執然用見伯者之有度也衛不殺叔武亦當復矣左氏謂二君之命縣于巫史豈不誣哉野編二十有九年春介葛盧來東夷國介國也不言朝公在㑹也公至自圍許圍者未下也三十有三年晉人陳人鄭人伐許野編夏六月㑹王人晉人宋人齊人陳人蔡人秦人盟于翟泉公作公㑹翟公作狄雒陽城內地翟泉近王都之地王子虎於此下與列國盟是謂上替諸侯大夫入天子之境上盟王子虎是謂下陵故諱公不書諸侯之卿稱人而王子亦與焉孔義㑹者既非諸侯不書人而何書日抄秋大雨雹冬介葛盧來以未見公故復來朝孔義三十年春王正月夏狄侵齊狄間晉之有鄭虞而侵齊齊桓之伯狄伐晉而齊不救者憾晉之不從今晉文之伯狄侵齊齊已從晉何辭而不救木訥秋衛殺其大夫元咺及公子瑕先元咺而後瑕言事之在咺也蘇氏衛事一至于此晉侯處之未善也必也踐土不列衛子遣歸守國衛當乞盟鄭伯之于洮是也文視桓差劣謂此類也晉遂失衛文元年晉侯伐衛野編叔武之命奉之以受盟故稱衛子公子瑕乃元咺立之咺實自柄國權瑕固未如君春秋亦不與咺君之也瑕因咺而得誅故言及辨義春秋執諸侯大夫皆稱人不可謂定晉侯之罪曹伯襄復國亦稱名不可謂定諸侯之罪諸侯大夫歸國者多以復書不可謂定元咺之罪瑕實不為君故稱公子不可謂定瑕之罪或問衛侯鄭歸于衛鄭之初歸也得言復當是時叔武在內鄭雖無國國固其國也及其又歸也殺叔武矣執之歸于京師矣殺元咺及公子瑕矣鄭雖得國國非其國也故不言復意林元咺訴君而専立有罪矣而衛侯鄭亦名者竊意瑕亦嘗立故各書名為别如突忽歟日抄晉人秦人圍鄭討不㑹翟泉也晉軍函陵秦軍汜南燭武得奮其說以開入滑之漸此晉侯也春秋人之未能服鄭又生一秦齊桓用夷皆使從别道出江黃猶與相見徐稍大併㑹盟不與野編介人侵蕭蕭附于宋介附于魯木訥冬天王使宰周公來聘冡宰兼三公下聘蓋非常之禮莫大之寵或以僖有兩朝王所之勤而報之歟孔義王之卿士何以或公之或子之兼三公者曰公不兼者曰子劉卷卒何以稱公外既僭矣內何以不僭正外者自內始簡端録公子遂如京師遂如晉聘周之始聘晉之始以其如京師不敢不如晉是夷周于晉也陳傅良魯以宰周公之來本乎晉侯故既已聘周不可不如晉是聘使之勤出于周而勞問之恩歸于晉也然自隱至莊天王聘魯者五卒無一介之使如周則今日公子遂之行已為非常之禮尚何責其遂如晉耶木訥三十有一年春取濟西田曷為不言取曹濟西田晉人執曹伯而以其田分諸侯非吾取之曹也蘇氏公子遂如晉拜曹田也夏四月四卜郊不從乃免牲猶三望三望泰山河海公羊四月非時也四卜非禮也望郊之細也不郊亦無望可也蘇氏秋七月冬杞伯姬來求婦狄圍衛十有二月衛遷于帝丘濮陽于榖作於文之狄與桓異自溫而後天子不能有溫以賜晉侯傳謂晉侯作三行以禦狄故前年侵齊今年圍衛晉不能問也衛遷于帝丘無復楚丘之功矣其後乃為箕之役交剛之役白狄赤狄甲氏潞氏漸次驅除迄于三晉始徙居代邉中國遂無狄也野編衛益遷而南也帝丘顓頊之故地去楚丘又二百里日抄衛為狄滅遷楚丘今三十餘年狄又滅之重耳為方伯亡其同姓而不問愧小白多矣故楚丘遷書城帝丘遷書衛無預于晉與諸侯之辭也郝解邢遷繼救邢而書衛遷繼圍衛而書救邢而邢遷豫桓公之存邢也圍衛而衛遷譏晉文之置衛於不問也略記三十有二年春王正月夏四月己丑鄭伯捷卒衛人侵狄秋衛人及狄盟明年晉又敗狄于箕自是衛無狄患者十年日抄冬十有二月巳卯晉侯重耳卒子襄公歡立起城濮至卒凡五年此晉文公之伯也野編黃震曰惟齊桓晉文可以言伯宋襄狂矣戕中國而結戎狄伯之反也秦穆楚莊以戎狄而脅中國伯之變也皆不可言伯也伯惟齊晉安有五哉李琪曰桓文雖並稱而文非桓匹也桓公得江黃而不用于伐楚文公則謂非致秦則不可與楚戰楚抑而秦興矣此桓之所不肯為也桓公㑹則不邇三川盟則不列王人文公㑹畿內則抗矣盟子虎則悖矣此桓之所不欲為也桓公寧不得鄭不納子華盟則三綱五常于是不廢矣文公為元咺執衛侯其奬臣抑君不可以訓此桓文之所以相逺也辨義齊侯使國歸父來聘報公子遂之聘孔義在二十八年夏四月辛巳晉人及姜戎敗秦師于殽公無師字先師王貫道嘗云釁自秦啓曲不在晉使襄公懷先世之恩及拘尋常則晉不可繼伯而秦橫矣日抄癸巳葬晉文公狄侵齊因晉喪也孔義公伐邾取訾婁秋公子遂帥師伐邾升陘之役魯固怨邾然君取其邑臣伐其國報亦甚矣日抄晉人敗狄于箕狄自伐邢之後至是垂四十年矣諸侯無小大皆受其毒不敢以一矢加之前年衛不忍其虐而侵之狄屈而求盟焉今又侵齊齊不能討伐晉晉敗之故其後屢侵齊而不敢犯晉則知制戎狄果不可以示怯也木訥冬十月公如齊宰周公下聘而不入覲國歸父來聘而往朝比事而觀魯之無王甚矣孔義十有二月公至自齊乙巳公薨于小寢即安也左趙鵬飛曰僖公中材庸主也天下有伯主則僖有以自固中國無伯主則僖無以自立是知僖之為中主也隕霜不殺草李梅實隕公作霣哀公問于仲尼曰春秋記隕霜不殺草何為記之也曰此言可殺也夫宜殺而不殺則李梅冬實天失其道草木猶干犯之而况君乎胡𫝊晉人陳人鄭人伐許晉文無死今年伐許明年伐衛必也孝子善述人之事先君之事已之事也書曰若穡夫曷敢不終畝文不死矣其曰晉人以為猶墨也墨始于殽終于伐衛春秋平義卷五
