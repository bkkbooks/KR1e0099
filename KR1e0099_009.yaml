body:
  text: 春秋平義卷九秀水俞汝言撰襄公名午成公之子母定姒夫人敬歸四嵗即位在位三十一年諡法因事有功曰襄辟土有徳曰裏元年春王正月公即位仲孫蔑㑹晉欒黶宋華元衛寗殖曹人莒人滕人薛人圍宋彭城楚已取彭城封魚石戍之三百乗矣則曷為繋之宋楚不得取之宋魚石不得受之楚胡傳于是為宋討魚石故稱宋左傳夏晉韓厥帥師伐鄭仲孫蔑㑹齊崔杼曹人邾人杞人次于鄫料前軍能獨當鄭者諸侯之師且止晉悼舉止安閑同符齊桓伯亦有真也野編以韓厥獨攻其前以五國之兵援其後楚兵不出則一韓厥足以敵鄭而有餘楚兵出則五國之師足以鬬楚而不懾此皆所以謹用諸侯而不忍輕鬬其民也趙氏秋楚公子壬夫帥師侵宋侵宋所以救鄭也九月辛酉天王崩簡王崩子靈王立邾子来朝冬衛侯使公孫剽来聘晉侯使荀罃来聘二年春王正月𦵏簡王五月而𦵏鄭師伐宋楚令也公言起師公然伐宋野編夏五月庚寅夫人姜氏薨襄公母齊姜六月庚辰鄭伯睔卒成公卒子僖公髠頑立晉師宋師衛寗殖侵鄭聞之先師曰三國成師以出不以伐而以侵者正避鄭之喪也晉悼公豈伐喪者耶日抄秋七月仲孫蔑㑹晉荀罃宋華元衛孫林父曹人邾人于戚謀鄭也晉修㑹盟嘗在戚地晉方新合諸侯則同盟于戚晉悼謀鄭則㑹于戚城虎牢則㑹于戚通吳制楚則㑹于戚戚本孫氏之食邑忽為諸侯之孔道莫非晉親林父以示重也列國論己丑𦵏我小君齊姜三月而𦵏叔孫豹如晉穆叔通嗣君也左冬仲孫蔑㑹晉荀罃齊崔杼宋華元衛孫林父曹人邾人滕人薛人小邾人于戚遂城虎牢二戚之㑹謀鄭也虎牢何以不繫鄭前此鄭人奄有武公之畧今築以為塞虎牢者天下之虎牢非鄭虎牢也野編城虎牢不繫之鄭者時鄭從楚為中國守險以制鄭非為鄭而城之也戍虎牢而繫之鄭者鄭已従晉故置兵守衛以拒楚是為鄭而戍之也辨義楚殺其大夫公子申此城濮鄢陵之罰城虎牢之效也左氏以申為右司馬多受小國之賂以逼子重子辛楚人殺之野編三年春楚公子嬰齊帥師伐吳吴楚争强自此始不得志于宋則移師東伐矣莫善于鬬吳楚野編趙鵬飛曰自晉厲公會吳于鍾離而吳無仇晉之心楚有患吳之意楚之兵力既分于吳而不能專向中國此諸侯之患得以少紓吳既受楚兵則亦不能無求于中國故戚之㑹吳不召而自至自是天下之勢遂成鼎足晉楚吳是也吳既附中國則楚實孤終春秋之世楚無一日安枕者吳犄其東也公如晉夏四月壬戌公及晉侯盟于長樗晉地去其國而與公盟悼公之敬也孔義公至自晉六月公㑹單子晉侯宋公衛侯鄭伯莒子邾子齊世子子光己未同盟于鷄澤衛地同外楚也虎牢城而鄭成三駕之績五㑹之信七合之威自鷄澤始野編陳侯使袁僑如㑹陳請服也戊寅叔孫豹及諸侯之大夫及陳袁僑盟諸侯在而大夫自為盟始于此陳自辰陵即楚二十八年矣今始如會故使大夫盟而固之孔義諸侯皆在是又稱叔孫豹及諸侯之大夫大夫受命于其君之詞也湨梁者諸侯皆在是而大夫盟其非受命而専之也意林悼公所以伯諸侯在得陳得鄭然鄭以君㑹而陳以臣至鷄澤之盟以諸侯盟鄭之君戊寅之盟以大夫盟陳之臣袁僑至而無以盟之則諸侯之心不固故以大夫盟之則晉無屈己之辱僑無抗君之罪此吾所以見悼公之賢也木訥秋公至自㑹冬晉荀罃帥師伐許討不㑹鷄澤也野編許自新城以来不與中國㑹盟四十餘年矣為鄭虐而遷葉依楚豈能一旦叛楚哉宜許之終不服孔義四年春王三月己酉陳侯午卒成公卒子哀公溺立陳成歸而卒于中夏諸侯會𦵏之賢于鄭成逺矣木訥夏叔孫豹如晉報荀罃之聘也元年秋七月戊子夫人姒氏薨姒公作弋成公妾襄公母杞娃一曰莒女𦵏陳成公八月辛亥𦵏我小君定姒公作弋踰月而𦵏盖禮畧也許氏冬公如晉陳人圍頓頓近于陳僖二十五年楚人圍陳納頓頓為楚與故陳不敢伐今陳事晉楚使頓間陳而侵之陳人圍頓孔義五年春公至自晉夏鄭伯使公子發来聘子産父終春秋鄭聘魯惟此孔義叔孫豹鄫世子巫如晉是鄫世子耶從大夫後殆非世子也野編仲孫蔑衛孫林父㑹吳于善道公穀作稻吴地将為戚之會故先之以魯衛野編秋大雩楚殺其大夫公子壬夫壬夫以侵欲失陳討而誅之則志不在小夷狄之有威刑中國之憂也故謹而志之歸義公㑹晉侯宋公陳侯衛侯鄭伯曹伯莒子邾子滕子薛伯齊世子光吳人鄫人于戚衛地吳来㑹非為主也伊川成九年為蒲之㑹将以會吳而吳不至故十五年諸侯之大夫㑹之于鍾離前三年㑹鷄澤使荀會逆吳子又不至今年吳子使夀越如晉請聽諸侯之好故晉使魯衛先㑹之而為戚之㑹凡序吳者来會也殊吳者往會之也孔義春秋則輕之齊世子之下鄫世子之上是吳人也野編歸義曰楚初以親中國為榮引入中國而鹿上執宋公矣吳初亦以親中國為榮引入中國而黄池争先晉矣公至自會冬戍陳諸侯受命于戚還國遣戍故獨書魯戍陳附中國而楚争之助陳距楚春秋所與也孔義楚公子貞帥師伐陳公會晉侯宋公衛侯鄭伯曹伯齊世子光救陳公穀曹伯下有莒子邾子滕子薛伯善救陳也十有二月公至自救陳辛未季孫行父卒文子六年春王三月杞伯姑容卒桓公在位七十年卒子孝公匃立夏宋華弱来奔平公以其為樂轡梏于朝也而逐之秋𦵏杞桓公杞始書𦵏始能通也日抄滕子来朝莒人滅鄫莒人以兵破鄫立其子使守之而為附庸其子或鄫之外孫故當時有鄫甥守祀之説後至昭四年魯復取鄫趙匡經書曰滅公穀以為非滅也立莒公子以為後也胡氏從之以昭四年魯國有取鄫之文耳不知昭四年之取鄫猶之昭元年之取鄆皆取之莒也季氏曰公穀所載是絶世之辭不得混于滅國之例而無别也畧記冬叔孫豹如邾公即位邾子来朝季孫宿如晉武子行父子十有二月齊侯滅莱自宣七年伐莱至是遂滅之孔義莱姜姓齊滅莱不名則例之説不通矣日抄七年春郯子来朝夏四月三卜郊不從乃免牲小邾子来朝城費有城費斯有墮費城者罪也野編秋季孫宿如衛八月螽冬十月衛侯使孫林父来聘壬戌及孫林父盟報季孫宿之聘尋孫良夫之盟也孔義楚公子貞帥師圍陳十有二月公㑹晉侯宋公陳侯衛侯曹伯莒子邾子于鄬穀作䧦鄭地謀救陳也陳侯逃歸不成救故不書孔義鄭伯髠頑如㑹未見諸侯丙戌卒于鄵頑公穀作原鄵作操鄭地僖公卒簡公嘉立于貍脤善公孫也于鄵善鄭伯也沙隨魯之故于鄬天下之故大夫死國事諸侯死王事此死所也何必牖下丙戌蹙矣其輿疾而至者與如會未見諸侯有草蟲之思焉野編未見諸侯而曰如㑹者致其志也鄭僖公之卒三𫝊以為弑趙鵬飛氏以為未嘗弑豈當時事有難明賊無所歸有不得不從赴告之文者乎孔義王氏曰九年子駟與晉争盟詞不少屈而晉人不以弑君為討則子駟之不弑君可見畧記陳侯逃歸逃陳以義晉也莫恥于逃也陳侯之生不如鄭伯之死野編八年春王正月公如晉夏𦵏鄭僖公二𫝊言鄭伯将㑹中國其臣欲從楚不勝其臣殺而死然侵蔡者鄭人㑹邢丘者鄭簡未從楚也僖不被弑野編鄭人侵蔡獲蔡公子燮作濕季孫宿㑹晉侯鄭伯齊人宋人衛人邾人于邢丘君在也諸侯至者㑹不至者以大夫聽命此邢丘之格也是時公在晉季孫宿實㑹盖公歸矣野編諸侯與國為我敵體維大夫可以命又于政體甚便雖以魯襄在晉特不令其與㑹也不令與㑹者優之也辨義公至自晉莒人伐我東鄙此莒人以兵滅鄫明矣孰謂以其子繼鄫而滅鄫耶日抄秋九月大雩冬楚公子貞帥師伐鄭鄭及楚平野編此鄭又從楚之始孔義晉侯使士匄来聘拜公之辱告将用師于鄭孔義九年春宋災公作火夏季孫宿如晉報范宣子之聘也五月辛酉夫人姜氏薨成公母秋八月癸未𦵏我小君穆姜公作繆四月而𦵏冬公㑹晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光伐鄭十有二月己亥同盟于戱不異言鄭鄭不與盟野編楚子伐鄭明年諸侯伐鄭則鄭及楚平可知矣孔義十年春公㑹晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光㑹吳于柤楚地吳子在柤晉以諸侯往㑹之孔義夏五月甲午遂滅偪陽偪穀作𫝊偪陽楚與國吳晉往来之道孔義㑹吳之意常在楚野編偪陽妘姓小國石介公至自㑹楚公子貞鄭公孫輒帥師伐宋晉師伐秦晉人東連吳楚人亦西結秦野編秋莒人伐我東鄙公㑹晉侯宋公衛侯曹伯莒子邾子齊世子光滕子薛伯杞伯小邾子伐鄭此三駕之一齊世子光人臣而上位滕薛之上以其先至而躋之也日抄隠桓諸侯皆序爵伯者作而後小國躋大國之上則有子男長伯者矣若以世子長小國之君則悼公為之也張溥列國論冬盜殺鄭公子騑公子發公孫輒騑公穀作斐書盜始此卿失職也程氏不稱大夫義不繋于大夫也此時宜問盜不必問他卿失職野編戍鄭虎牢楚公子貞帥師救鄭前年城虎牢今戍之實鄭虎牢不書戍鄭虎牢不知城者之為鄭虎牢也不書楚公子貞帥師救鄭不知戍虎牢之為偪鄭非為鄭戍也野編城虎牢不係之鄭欲共拒楚天下之詞也戍繋之鄭者為鄭戍之也一國之詞也楚本争鄭救非善之書救陳見晉之終失陳書救鄭見楚之終失鄭孔義公至自伐鄭十有一年春王正月作三軍此三分魯也初為三軍各征其軍季氏盡征之叔孫氏臣其子弟孟孫氏取半焉公猶收其剰也野編詩何以言公徒三萬公車千乗也曰詩人之意舉其大畧且萬二千五百人為軍則二軍者二萬五千人詩人之辭但形容其大耳豈必計其實数哉若三軍則為三萬七千五百人當言四萬矣曰陳氏又謂至成公而季孫行父臧孫許叔孫僑如公孫兹伐齊以四卿于鞌之戰計之魯似有四軍也曰周禮國有一卿一軍之説鞌之戰特四卿並将耳或二卿合将一軍四卿則将二軍或問夏四月四卜郊不從乃不郊鄭公孫舎之帥師侵宋公㑹晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭此三駕之二秋七月己未同盟于亳城北亳公穀作京鄭地不異言鄭鄭又不與盟以鄭非盟可要也故蕭魚亦不盟野編公至自伐鄭楚子鄭伯伐宋公㑹晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭㑹于蕭魚此三駕之三鄭地三駕七合終此鄭服矣楚再侵宋晉再伐鄭鄭成則去之于晉未病楚不能矣止鄭一卿無若鄭何亦克有鄭二十餘年厲以亟戰弑悼以不戰伯故争者事之末也不争莫與争野編公至自會楚人執鄭行人良霄穀作宵楚人執鄭行人良霄則鄭之服晉可知矣至是楚不復出師争鄭而鄭不敢背晉者二十四年此晉悼之績也孔義不能伐鄭而執其行人無能為也晉已得鄭矣野編冬秦人伐晉晉為秦所敗春秋畧而不書不與秦人之為楚而救鄭也家氏傳左傳書晉敗績而經不書者無傷晉之大體也日抄十有二年春王三月莒人伐我東鄙圍邰季孫宿帥師救邰遂入鄆邰穀作台鄆公作運邰魯邑夏晉侯使士魴来聘来拜師也秋九月吳子乗卒吳始書卒夀夢卒諸樊立冬楚公子貞帥師侵宋公如晉十有三年春公至自晉夏取邿公作詩秋九月庚辰楚子審卒共卒康立冬城防臧氏邑防在齊南而近莒城防以備莒亦備齊也孔義十有四年春王正月季孫宿叔老會晉士匄齊人宋人衛人鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人㑹吳于向鄭地吳為楚敗㑹吳謀楚也孔義卿在也諸侯之卿至者㑹鄭公孫蠆是不至者以㣲者受事此于向之格也野編二月乙未朔日有食之夏四月叔孫豹㑹晉荀偃齊人宋人衛北宫括鄭公孫蠆曹人莒人滕人薛人杞人小邾人伐秦公蠆作囆秦晉兵争止此卿在也諸侯之卿至者㑹伐衛北宫括鄭公孫蠆是不至者以㣲者于役此伐秦之格也簡易如此故會數而不厭兵屢出而人不言疲誠得其理也野編自是一伐終春秋之世秦不敢復侵晉木訥趙子嘗曰齊宋大夫稱人者齊宋大夫不進師也悼公以諸侯之師伐秦庻㡬能張中國之勢討秦人黨楚之罪而齊宋大夫不進師則悼公之令外不行于列國矣茍偃欲進而欒黶先歸則悼公之令内不行于臣子矣故荀偃得從其恒稱譏不在荀偃也辨義己未衛侯出奔齊公侯下有衎字獻公出衛人立公孫剽𫝊曰衛孫林父寗殖逐其君衎名在諸侯之䇿此何以不書春秋削之削之何義也夫君臣之變不宜數見數見則常矣出者猶可入也不如以自奔為文野編叔武攝位而鄭不名剽簒國而衎不名其不名也同而所以不名者異叔武稱子而剽稱侯稱子者讓之之意也稱侯者簒之之實也意林莒人伐我東鄙報入鄆之役至十六年魯訴于晉湨梁之㑹晉人執而釋之二十年為向之盟而魯始無東鄙之患木訥莒自滅鄫之後四伐魯矣孔義秋楚公子貞帥師伐吳冬季孫宿㑹晉士匄宋華閲衛孫林父鄭公孫蠆莒人邾人于戚戚林父邑也林父出衎立剽諸侯共定之醳君助臣悼之伯業衰矣野編諸國書卿明皆林父之儔也髙氏集註十有五年春宋公使向戌来聘二月己亥及向戌盟于劉魯地報豹之聘尋亳之盟不言公伉也孔義下書劉夏逆王后于齊二字恐亦𫝊冩誤爾野編劉夏逆王后于齊過我也野編夏齊侯伐我北鄙圍成公救成至遇成遇皆魯地晉悼會諸侯者六齊靈皆不親行衛侯奔齊而戚之㑹以定衛而齊不與焉益輕晉矣故遂有北鄙之師孔義季孫宿叔孫豹帥師城成郛城齊所壞野編秋八月丁巳日有食之邾人伐我南鄙邾二晉與齊黨莒也孔義冬十有一月癸亥晉侯周卒悼公卒子平公彪立起即位至卒十有六年此晉悼公之伯也野編十有六年春王正月𦵏晉悼公踰月而𦵏三月公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于湨梁戊寅大夫盟梁地何以不言諸侯之大夫制在大夫也公在而大夫盟也文七年扈之㑹書大夫盟盡靈成景厲今兹湨梁之會又書大夫盟盡平昭頃定中通襄悼二伯依約言之皆五世也故曰自大夫出盖五世希不失矣此之謂也野編後𫝊曰凡覇在焉而但曰諸侯者無伯也君在焉而但曰大夫盟無君也自文而下有斥諸侯而不序自襄而下有斥大夫而不序通説晉人執莒子邾子以歸執以歸始此齊侯伐我北鄙齊既叛晉又以公討邾莒也孔義夏公至自會五月甲子地震叔老會鄭伯晉荀偃衛寗殖宋人伐許君先卿卿先人不書會鄭伯若為書之野編秋齊侯伐我北鄙圍郕應従公穀作成大雩冬叔孫豹如晉十有七年春王二月庚午邾子牼卒牼公穀作宣公卒悼公華立宋人伐陳伐許伐陳皆著楚之詘也髙氏夏衛石買帥師伐曹衛孫蒯越境田獵而遭曹人之訽辱故伐之孔義秋齊侯伐我北鄙圍桃魯地髙厚帥師伐我北鄙圍防桃公作洮下公榖有齊字君臣分道入犯野編九月大雩宋華臣出奔陳華臣暴其宗室而亂宋政陳宋讐也而奔焉尤可誅也孔義冬邾人伐我南鄙邾人何為者齊伐其北邾伐其南盖與齊應也野編十有八年春白狄来夏晉人執衛行人石買為伐曹故因其来執之非禮也野編秋齊師伐我北鄙榖作齊侯冬十月公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子同圍齊湨梁之㑹齊人不至起師五伐我盖為我故伐之而曰同圍齊天下共惡齊也野編曹伯負芻卒于師成公卒子武公滕立楚公子午帥師伐鄭間晉之出野編十有九年春王正月諸侯盟于祝柯公作阿齊地即督揚祝柯齊地師未違齊久于齊也野編晉人執邾子為我故執之而邾自此弱矣野編公至自伐齊取邾田自漷水成元年晉人敗齊于鞌使齊人歸我汶陽之田書曰取汶陽田不言齊魯地也本以晉命取田于邾故書曰取邾田自漷水言非魯地也蘇轍季孫宿如晉拜師也𦵏曹成公夏衛孫林父帥師伐齊秋七月辛卯齊侯環卒環公作瑗靈公卒子荘公光立晉士匄帥師侵齊至穀聞齊侯卒乃還至穀矣聞有喪而還宣子此行合乎道竟能有齊以為澶淵之㑹野編八月丙辰仲孫蔑卒齊殺其大夫髙厚殺髙厚者崔杼也以國殺亦荘公所欲也自是大權在杼矣孔義鄭殺其大夫公子嘉公作喜盜殺三卿公子嘉知而不言既又欲起楚師以去諸大夫故楚人伐鄭至是嘉之為政也専子展子西率國人殺嘉而分其室嘉則有罪矣而子展子西利其室而分之故稱國以殺而不去其官胡𫝊冬𦵏齊靈公城西郛叔孫豹㑹晉士匄于柯衛地齊及晉平魯猶懼而自托于晉也孔義城武城猶備齊孔義二十年春王正月辛亥仲孫速㑹莒人盟于向速公作遫速獻子之子孟荘子向莒邑孟荘子與之結盟迄二十年莒魯不交兵日抄夏六月庚申公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子盟于澶淵衛地齊成也秋公至自㑹仲孫速帥師伐邾蔡殺其大夫公子燮公子履出奔楚燮公作濕陳侯之弟黄出奔楚黄公穀作光澶淵之㑹獨陳蔡不與必諸大夫志在楚也日抄陳蔡終楚與也故其臣亦奔楚𫝊謂蔡司馬欲以蔡之晉黄與之同謀果若𫝊言便當奔晉不應奔楚然則燮何以稱大夫黄何以稱弟曰晉之里克亦稱大夫也陳侯之弟招亦稱弟也未是褒詞盖二公子自不容于蔡二慶自不容黄視楚如歸是其罪也野編叔老如齊復修齊好野編冬十月丙辰朔日有食之季孫宿如宋二十有一年春王正月公如晉拜師及取邾田也左傳邾庻其以漆閭丘来奔春秋以地奔者三人邾庻其黑肱莒牟夷也唐有右衛将軍之贈以待悉怛謀漢有不義之侯以待子宻于是二者何居曰維州彼夷此華来者無罪也漁陽彼逆此順受其来者無罪也邾魯同盟者也不知其可也野編夏公至自晉秋晉欒盈出奔楚不以范匄逐之為文而書盈之自出使盈無可逐之釁則匄不得逐矣意林左𫝊所載欒祁以母譛子致滅其族恐非人情不可信晉語云平公六年箕遺黄淵嘉父作亂不克而死公逐羣賊問于陽畢畢曰欒書實覆宗殺厲以厚其家若滅欒氏則民威而國安矣遂逐欒盈以此觀之則因箕遺諸人以及欒盈非因欒盈以及諸人也畧記九月庚戌朔日有食之冬十月庚辰朔日有食之厯家以百七十三日為一交㑹未有頻月交㑹者而襄二十一年九月十月二十四年七月八月頻食漢髙祖三年十月十一月頻食至今千餘年未有頻食者故知天度有時而變其常所以為異也家氏傳本徂徕石氏比月日食衍文畧記此與二十四年八月癸巳朔距前月食朔去交三十一度定無再食之理非常之變亦不至此並𫝊寫之誤統記曹伯來朝公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子于商任公羊穀梁皆于是年附十有一月庚子孔子生二十有二年春王正月公至自㑹夏四月秋七月辛酉叔老卒冬公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于沙隨公榖邾子下有滕子𫝊于商任沙隨皆曰錮欒氏也欒范交惡于國家未有隟而再為徴㑹于諸侯此政在大夫之效也野編公至自會楚殺其大夫公子追舒子南罪不至死故稱國以殺蘇氏二十有三年春王二月癸酉朔日有食之三月己巳杞伯匄卒孝公卒弟文公益姑立夏邾畀我来奔畀公作鼻杜氏曰庻其之黨也未知是否孔義塟杞孝公陳殺其大夫慶虎及慶寅陳侯之弟黄自楚歸于陳二慶死而黄歸制在楚也野編晉欒盈復入于晉入于曲沃欒盈自齊入曲沃自曲沃入絳而惟書復入于晉自晉敗而奔曲沃而後書入于曲沃也盈之復入晉有以激之也孔義秋齊侯伐衛遂伐晉齊始伐盟主伐衛為諼也本伐晉以應欒氏耳野編衛獻公奔齊而晉不能納欒盈奔齊而晉再㑹諸侯區區錮一逐臣晉之舉措不足以服其心矣故因欒氏之亂以報十八年之役于是見晉伯之衰而齊侯之伐盟主為罪也孔義八月叔孫豹帥師救晉次于雍榆公榖作渝晉地己卯仲孫速卒魯自仲遂殺嫡立庻公室于是失政魯卿自季孫宿廢長立㓜于是家臣效尤豐㸃廢秩立羯豎牛殺孟丙立舎皆托廢立以擅權而三桓㣲矣作俑之禍其流弊可勝言哉孔義冬十月乙亥臧孫紇出奔邾武仲傳言臧紇之奔事起以季悼子易季公鉏仲孫卒公鉏亦以羯易秩使仇臧氏何如其知也如防請後致防奔齊與入曲沃者一間爾春秋沒不書然猶曰武仲要君野編晉人殺欒盈書入于絳賊也野編齊侯襲莒夜入且于之隧亦賊也其目齊侯何也輕行掩人非千乗之君所宜有事野編二十有四年春叔孫豹如晉賀克欒氏也孔義仲孫羯帥師侵齊孟孝伯晉故也雍榆之次懼晉疑也孔義夏楚子伐吳楚自是急吳不争鄭矣孔義秋七月甲子朔日有食之齊崔杼帥師伐莒大水八月癸巳朔日有食之比月又食野編公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷儀本邢地滅邢為衛地將伐齊而不克伐野編冬楚子蔡侯陳侯許男伐鄭伐鄭所以救齊也野編公至自㑹陳鍼宜咎出奔楚陳人復討慶氏之黨其後在楚為鍼尹宜咎孔義叔孫豹如京師是時穀洛鬬毁王宫齊侯叛晉求媚天子故為王城郏而豹如京師賀焉自宣九年仲孫蔑如京師至是五十餘年矣孔義大饑二十有五年春齊崔杼帥師伐我北鄙以報孟孝伯之師也孔義夏五月乙亥齊崔杼弑其君光莊公弑弟景公杵臼立杼之無君陳文子知之伐魯而孟公綽知之齊荘不寤也方且背諸侯之盟數行侵伐外競而内傾自然之符也孔義公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷儀公作陳儀兩夷儀之㑹皆以報齊也而聞齊亂盍改為問罪之師乎不書伐齊所以治晉也此平之不得與于伯也野編六月壬子鄭公孫舎之帥師入陳楚師之伐鄭也陳師獨㬥故鄭報之孔義秋八月己巳諸侯同盟于重丘齊地亦同外楚爾野編公至自㑹衛侯入于夷儀獻夏五月會夷儀之衛侯剽也此入于夷儀之衛侯衎也不嫌兩君名實相亂乎曰衎雖無道非臣可逐剽亦非臣下所得立故衎入不名吕氏後傳此與鄭伯突入于櫟同而衛侯不名者鄭伯奪正不當入衛侯雖無道非臣下所當逐可入也孔義楚屈䢖帥師伐舒鳩舒鳩吳與國也孔義冬鄭公孫夏帥師伐陳夏公作蠆未得成也得成乃已孔義十有二月吳子遏伐楚門于巢卒遏公穀作謁諸樊卒餘祭立吳子伐楚而名何也名其卒也蘇氏門者伺其啟入焉以示無畏士之勇也非王公之勇也野編二十有六年春王二月辛卯衛寗喜弑其君剽此衛剽也以比鄭子儀則未應與弑例曰剽非儀比也儀雖在位然十四年中未嘗一與盟會也同未在位也剽異于是㑹于沙隨于邢丘于商任于夷儀盟于澶淵剽皆與焉社稷有奉諸侯安之即衛侯矣春秋所以惡寗喜也野編衛孫林父入于戚以叛書叛始此甲午衛侯衎歸于衛辛壬癸甲四日而至野編程氏云輕重之志美惡之義不可槩求之各繋其事也歸者未必盡善有以内外有援故歸為易入者不必盡惡以内外有難故入為難惟復入則甚惡也通説夏晉侯使荀吳来聘為孫氏将討衛也黨叛臣而何以令諸侯乎孔義公㑹晉人鄭良霄宋人曹人于澶淵晉以黨叛戍戚而見敗于衛乃其自取猶為此會以勤列國之衆而不知自咎春秋所深惡也補程傳魯之重在卿君㑹非所重也晉人㣲者也此為林父疆戚田爾故卿不㑹也獨鄭良霄至不可先晉不可後宋書法如是而已野編林父據邑叛君平公反取衛田以益林父由晉之諸臣各為私計諸侯之大夫互為羽翊平固無如之何也家氏傳秋宋公殺其世子痤穀作座寺人伊戾之譛也内嬖芮棄與左師向戍之證也而目君季氏以為先有奪嫡之意而後小人興䜛以為之助是宋公有欲殺太子之心者也向戌小人不足論是時樂喜為政而不能救不免於全身固寵矣孔義晉人執衛寗喜孫寗等爾一以為賞一以為僇野編晉人執之非討其弑君也討其伐戚而殺晉戍也髙氏是時趙武為政叔向為之謀而晉政無一可觀亦足以見二子矣孔義八月壬午許男寗卒于楚靈公卒子悼公立非其所也孔義請伐鄭而往野編冬楚子蔡侯陳侯伐鄭為許故野編𦵏許靈公説春秋者每于書𦵏輒云往㑹此許也孰為往哉然則何以書曰卒于楚塟于許終前事也野編二十有七年春齊侯使慶封來聘齊魯不通好者三十年景公即位來聘鄭不仇楚齊魯釋怨此宋之盟所以輯也孔義夏叔孫豹會晉趙武楚屈䢖蔡公孫歸生衛石惡陳孔奐鄭良霄許人曹人于宋奐公作湲晉楚始同主盟于蜀之㑹先書楚公子嬰齊後書公及楚人不沒其實也于宋書晉趙武楚屈䢖明乎為晉主㑹楚曷嘗駕晉哉往嵗伐鄭侵宋今也㑹于宋鄭人與焉自城虎牢楚已弭帖久矣又有吳患非復狰獰故態也趙武藩軍屈䢖衷甲經意無是也野編宋之盟向戌為之也晉伯其衰矣戍其伯者之罪人乎邵寳發㣲曰中國之事皆大夫專持之故二十九年城杞三十年㑹澶淵昭元年㑹虢諸侯莫有間者孔義曰以諸侯分為晉楚之從而交相見于是始南北二伯天下之大變也楚先㰱而春秋先晉者尊中國也於湨梁無君臣之分於宋無夷夏之防昭定哀之春秋将以終于吳越焉爾矣衛殺其大夫寗喜衛侯之弟鱄出奔晉鱄穀作專獻衛殺其大夫寗喜喜専也衛侯之弟鱄出奔晉鱄與喜要言也曰苟反國政由寗氏充子鮮之言放乎喜之專而止矣後之㦲不如衎歸鱄出不見喜之誅滅也野編秋七月辛巳豹及諸侯之大夫盟于宋諸侯之大夫為誰晉趙武楚屈䢖也不外楚于諸侯也野編荆楚之同主夏盟皆宋為之宋襄圖伯始進楚人于鹿上之盟二伯之端兆矣華元合晉楚之成盟于宋西門之外争伯之業啟于此矣今向戌以善晉楚之執政為弭兵之説而兩伯之勢遂成春秋兩書宋為地主以首禍罪宋也孔義自宋之㑹天下皆大夫專之孫氏冬十有二月乙亥朔日有食之推厯當為十一月乙亥朔左氏傳亦作十一月足證經文傳寫之誤二十有八年春無冰夏衛石惡出奔晉衛討寗氏之黨也孔義邾子来朝邾每伐魯今其来朝盖屈服也日抄秋八月大雩仲孫羯如晉孝伯告將如楚也孔義冬齊慶封来奔盧蒲嫳既道慶封殺崔杼而盧蒲癸王何復殺慶舎逐慶封癸何皆荘公倖臣也荘公死倖臣従死者十人而討賊者亦倖臣也荘固可鄙矣當時卿大夫寜不可恥乎孔義十有一月公如楚中夏之君始旅見于楚矣孔義我之事楚則不如事晉矣仲孫如晉而公乃如楚其重在卿也楚子昭卒矣据𫝊宋公亦不往盖三卿専魯懼大國之為討故以公説也野編十有二月甲戌天王崩靈王崩景王立乙未楚子昭卒廉卒郏敖麇立二十有九年春王正月公在楚公在楚罪叔孫豹也公在乾侯罪季孫意如也罪之輕重不同其罪之均也野編夏五月公至自楚庚午衛侯衎卒獻公卒子襄公惡立閽弑吳子餘祭弟餘昧立君不近刑人不邇怨吳子伐越獲俘以為閽其及宜矣孔義仲孫羯會晉荀盈齊髙止宋華定衛世叔儀鄭公孫段曹人莒人滕人薛人小邾人城杞儀公作齊公穀莒人下有邾人齊桓城縁陵淮夷之故也晉平城杞渭陽之情也人之相去豈不逺㢤野編齊城三國仲山甫之城東方也晉城杞周平之戍申也學者讀烝民揚之水二詩即可以知齊晉之得失矣列國論昭三年小邾穆公来朝季武子欲卑之穆叔不可觀此則當時大國之待小國一崇一卑在其好惡而已屬辭前志以為營丘即營陵即縁陵辨義曰桓公遷杞謂杞子不能自存遷之宇下以便擁䕶正須近乎臨淄蔡遷近吳許遷近楚二國其證也熊氏過曰武王封東樓公于杞開封雍丘是也入春秋後遷縁陵而濰州營丘已遷淳于因淳于公長國故并之淳于即古州國今髙宻有淳于城故昭元年祈午數晉之功曰城淳于又為七説以合之本年傳晉侯使司馬女叔侯来治杞田弗盡歸也杞國必在齊魯之間與營宻近一也又女叔侯對晉平公曰杞夏餘也而即東夷二證也二十三年杞成公卒書曰子杞夷也三證也昭七年晉人来治杞田二子将以成與之謝息不可竟與萊柞二山俱在齊魯之境四証也杞在淳于故助城小國為曹滕邾皆東方國既無西國定非雍丘五證也經哀公九年宋皇瑗帥師取鄭師于雍丘左傳鄭武子賸之嬖許瑕求邑無以與之請外取許之故圍宋雍丘盖杞既遷縁陵而宋得之六證也昭二十五年宋元公如晉行至曲棘而卒曲棘為其封内故杞地今外黄城中有曲棘里七證也城杞非雍丘而為淳于瞭然矣晉侯使士鞅来聘拜城杞也杞子来盟晉使魯歸所侵杞田故来盟左傳吳子使札来聘吴始聘吴始君臣並見楚子使椒秦伯使術吳子使札一也野編稱名大夫之恒辭耳胡𫝊乃謂辭國生亂而貶之過矣夫札之辭國在二十九年之後而貶之于二十九年之前無乃加非其罪乎私考按文定之説本之劉絢張洽季子凡四讓始之辭父禮也叔齊之道也繼之辭兄義也子臧之道也終之不與為簒法也叔肹之道也此三讓者得矣至于托使以亡是逃僚也逃僚何義哉苟欲潔身必明嫡長之義使國有所歸而已無與焉可也簡端録秋七月𦵏衛獻公齊髙止出奔北燕北燕始見經髙止好以事自為功且專故難及之孔義冬仲孫羯如晉報士鞅之聘三十年春王正月楚子使薳罷来聘罷公作頗報朝也楚聘魯者三至此書法與中國同孔義夏四月蔡世子般弑其君固景公弑靈公般立蔡侯為般娶于楚而通焉故及于弑君雖無道而罪不及民故稱臣以弑蘇氏五月甲午宋災宋伯姬卒公穀無宋字五月甲午宋災也宋伯姬卒不月不日自為一簡澶淵之㑹亦曰宋災不曰伯姬卒野編天王殺其弟佞夫王子瑕奔晉佞公作年佞夫為人所立瑕佞夫黨也一死一亡亂庻遄已故舜封弟而周公致辟其兄淮南驕恣罪之小者也視舜佞夫不利社稷罪之大者也視周公若醳不誅則如避之氾乎皇乎翟泉乎然則曷為書天王曰且如致辟管叔亦只得書惟周公位冡宰野編秋七月叔弓如宋𦵏共姬公共姬上有宋字叔老子三月而𦵏卿致女亦卿供𦵏矣野編鄭良霄出奔許自許入于鄭鄭人殺良霄良霄自許入鄭伐公門不勝而死不言大夫惡之也不書復入位未絶也不書叛求復位未至叛也然而稱兵矣故其殺也従討賊之詞孔義冬十月𦵏蔡景公七月而𦵏晉人齊人宋人衛人鄭人曹人莒人邾人滕人薛人杞人小邾人會于澶淵宋災故盟㑹不言所以于稷言之不言其故于澶淵言之于稷為惡而終之澶淵為善而不終野編急宋災者非為共姬之死而来徳其首倡弭兵也魯僖為成風而伐邾不名救患晉平為悼夫人而城杞不名保小晉于宋即果澶淵謀烖亦城杞類耳况乎以盟宋而私厚之也𫝊斷弑賊未討不書𦵏而蔡景公獨書刺天下之諸侯也以世子而弑其君又天下之大變也而不討澶淵之㑹㑹十三國之大夫而以宋災故故諸國之卿貶而稱人魯卿諱而不書而特書其所為此春秋大義聖人特筆也孔義本胡傳及胡寧通㫖郝仲與曰自宋之盟諸侯無兵車之㑹者三年矣二十九年㑹于把城把也今年㑹于澶淵宋災也故經書詳其事辨義三十有一年春王正月夏六月辛巳公薨于楚宫非正也秋九月癸巳子野卒胡女敬歸之子毁也野編己亥仲孫羯卒冬十月滕子来㑹𦵏諸侯始親来㑹𦵏諸侯之喪士弔大夫送𦵏以諸侯㑹𦵏非禮也孔義癸酉𦵏我君襄公十有一月莒人弑其君宻州展輿立莒人弑之也去疾也出展輿也立野編春秋平義卷九
