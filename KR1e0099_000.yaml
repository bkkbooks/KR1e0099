body:
  text: 春秋平義春秋類提要臣等謹案春秋平義十二卷國朝俞汝言撰汝言字右吉秀水人是書成於康熙丙辰書中多引舊文其自立論無幾然自宋孫復以來説春秋者務以攻擊三傳相髙求駕乎先儒之上而穿鑿煩碎之弊日生自元延祐以後説春秋者務以尊崇胡傳為主求利于科舉之途而牽就附合之弊亦遂日甚明張岐然嘗作平文以糾其謬而去取未能皆允汝言此書亦與岐然同意而簡汰精審多得經意正不以多生新解為長前有自序謂傳經之失不在淺而在於深春秋為甚可謂片言居要矣此本為汝言原稿塗乙補綴朱墨縱橫其用心勤篤至今猶可想見也朱彛尊經義考載繆泳之言稱汝言研精經史尤熟于明代典故嘗撰有宰相列卿年表其詩古文名漸川集今皆未見蓋亦好學深思之士所由與􅑎腹髙談者異歟乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀春秋平義序傳經之失不在淺而在於深春秋為甚以其筆削出自聖人必有不可測識之旨然後可以揆亂世反之正左氏以事求之叢記雜陳容飾盛而神理不居公穀胡氏諸儒以意測之探微索隱謹毛髮之細而其大體所在愈求而愈逺要其故不過二端曰春秋天子之事也聖人之刑書也以為天子之事可以進退百辟以為刑書而名稱日月無往非刀鋸斧鉞之用而聖人之意愈隱汝言泛瀾其中者有年初涉之而茫然再親之而華文瓌辨可喜可愕而不忍釋數四讀之而得其指歸聖人之筆削合乎人情宜乎時勢未嘗有矜奇異衆之舉而時措咸宜無不協乎正直剛柔之德向之可喜可愕者皆與聖人逺焉者也於是偏訪諸家著述輯成春秋平義一十二卷其言皆出於儒先不入臆測一語使其言足録不以其人而棄之言不足録亦不以其人而存之務得其平而己夫知聖人之不逺於人而人亦不逺人以求道而學術一矣而天下平矣寧獨春秋也哉丙辰仲冬二十八日漸川諸生俞汝言識
