body:
  text: 春秋平義卷一秀水俞汝言撰隱公名息姑惠公之子母聲子夫人子氏姬姓侯爵自伯禽受封十一世在位一十一年諡法不尸其位曰隱程子頥曰春秋魯史記之名也夫子之道既不行於天下於是因魯史立百王不易之大法平王東遷在位五十一年卒不能復興先王之業孟子曰王者之迹熄而詩亡詩亡然後春秋作適當隱公之初故始於隱公元年春王正月元年者正始也春周時之春也王正月夏時之十一月也髙攀龍孔義春正月者其舊文也疑若用夏正者書王見正月之為子也邵寶簡端録繫王於春所承者天之道所志者天子之事所紀者公之年不言即位有與公疑位者也羅喻義野編劉恕謂惠公愛少子立為太子國人不與而立隱隱曰我將讓焉太子徯望十年不獲而羽父弒隱於是桓曰隱攝也吾取之左氏信桓之欺故曰攝公穀信隱之詐故曰讓黃震日抄昔無今有者皆夫子所筆昔有今無者皆夫子所削也夫子之筆始於書王夫子之削始於不書即位吕祖謙集解三月公及邾儀父盟于蔑魯地凡邾公羊並作邾婁蔑公穀作昧私盟之始公與曰公也何可三月無公盟書野編我所欲曰及公攝位而欲求好於邾也儀父邾君之字也邾魯之附庸中國之附庸例稱字孔義凡記會盟於王法所不得為者皆貶若以結信於魯故得貴之則桓十七年盟趡又何為乎劉敞權衡夏五月鄭伯克段于鄢鄭地段不弟故不言弟如二君故曰克稱鄭伯譏失教也謂之鄭志不言出奔難之也左傳于鄢遠也穀梁凡弟及世子家事也目君大夫國事也繫國野編秋七月天王使宰咺來歸惠公仲子之賵王室下交諸侯之始昔者夫子序書夏商周稱王春秋繫王於天則何以異於書或曰為萬世之法也或曰不然於是有僣王者不天之繫則無以著無二之義也簡端録國有疑於公者決之曰公天下有疑於王者決之曰天王野編不曰夫人曰惠公仲子者妾稱也程傳天子而賵妾母是啓僣也趙匡纂例惠公仲子者惠公之仲子也桓之母也或徴其手文曰􅨞古文魯字夫人也君子不言知其為仲子而已矣賵曰仲子之賵宫曰仲子之宫稱天而王尊但稱王而王亦尊蓋春秋為天子之事豈得有所褒貶於天子哉惠公仲子公羊以為兼之是也成九年之書僖公成風也亦然程子以惠公之妾為惠公之仲子猶可以僖公之母為僖公之仲子則不可朱朝瑛讀春秋略記文九年秦人來歸僖公成風之禭傳曰秦人弗夫人也知此宰咺來歸惠公仲子之賵王亦弗夫人也故春秋亦弗夫人也其以夫人奉仲子失在隱不在王也書之以正隱爾野編以改葬故所以厚惠公也并歸仲子所以定桓公也辨義惠公之妾仲子也左氏以為兼賵公與仲子故在公以為緩在仲子以為豫仲子於是時蓋已卒矣君子信經邵寶左觽吕朴卿有言曰春秋周大夫不名爵從其爵單伯劉子之類是也未爵稱字家父榮叔之類是也舍是無名者矣是故經書魯隱元年天王使宰咺來歸惠公仲子之賵書名而不書氏者士也桓四年天王使渠伯紏來聘書氏及字者卿大夫也僖七年天王使宰周公來聘書官而不名氏者三公也始使士繼使大夫終使三公天子日微諸侯日強其情不甚明白哉或問九月及宋人盟于宿參盟之始惠公之季年敗宋師于莒公立而求成焉盟于宿魯志也稱及稱人皆非卿也程傳及宋人盟于宿隱公之私也隱公之初魯猶強間於齊宋鄭之間相為依附然宋鄭不兩合而皆以齊為主齊為宋則附齊而援宋齊為鄭則附齊而援鄭既盟宋矣石門與艾之盟與齊鄭成而渝宋之盟隱公之私甚矣蔡汝楠劄記經惡私盟始于蔑慮參盟始于宿公七年伐邾十年伐宋二盟尋畔坎牲加書寧足信哉張溥傳斷冬十有二月祭伯來王臣私交之始來書野編來朝也祭伯非王命而私交不與其朝也孔義先儒有王臣無外交之説非也天下有道諸侯順軌豈有內外之限其相交好乃常禮也然委官守而遠相朝無是道也周禮世相朝謂鄰國爾程傳公子益師卒衆仲大夫卒書野編公子益師孝公之子日抄稱公子公子故使為卿也或日或不日因舊史也古之史記事簡略日月或不偹春秋因舊史有可損而不能益也鄭傳朱子曰春秋一發首不書即位即君臣之事也書仲子嫡庶之分即夫婦之事也書及邾盟朋友之事也書鄭伯克段即兄弟之事也一開首人倫便盡在二年春公會戎于潛書會之始亦外交之始會戎于潛春秋之始會吳于黃池春秋之終會書野編周衰戎狄雜居中夏魯有疆埸之交不得不會之也戴溪諸侯非有天子之事不得出會諸侯况會戎哉孫復發微夏五月莒人入向入國之始入書向國也野編莒子娶于向向薑不安莒而歸莒人入向以薑氏還左傳書人微者也程傳入者得而不居也公羊無駭帥師入極駭穀作賅大夫專兵之始極國也野編無駭不氏未賜族也書帥師用大衆也非王命而入人國邑見諸侯之不臣也胡安國傳秋八月庚辰公及戎盟于唐魯地之盟戎狄始潛之會猶請盟而辭復與之盟益非義矣孔義韓愈言春秋謹嚴君子以為深得其旨何謹乎盟于唐而書日謹之也胡傳九月紀裂繻來逆女裂繻公穀作履緰冬十月伯姬歸于紀內女嫁書野編內女嫁為諸侯夫人則書逆書歸明重事也先儒謂諸侯當親迎親迎者迎於所館故有親御授綏之禮豈有委宗廟社稷遠適他國以逆婦者乎詩稱文王親逆于渭未嘗出疆也程傳為來逆非卿又為叔姬待年而書也胡寧通旨紀子帛莒子盟于密莒邑公榖作子伯此外相盟之始闕文也程傳子帛杜預以為履繻之字春秋無大夫在諸侯上者此必紀侯莒子也紀迫于齊而與于莒故相盟天下無主則小國不安而齊人滅紀之端見矣季本私考杜氏以為把子紀字誤昭公四年莒人以牟婁奔魯則為魯近矣把此時尚未遷緣陵也自此以前因莒人入向而魯為莒紀盟于密以聨其交自此以後八年公與莒人盟于浮來以成其外皆可佐證辨義十有二月乙卯夫人子氏薨穀梁謂隱之妻以不書葬知為君夫人蘇轍謂桓公之母仲子也特立之廟而不祔故不書葬黃震以歸仲子之賵卒應在隱前按後考仲子之宫為桓之母無疑鄭人伐衛諸侯專征伐之始伐書野編段之亂公孫滑出奔衛衛人為伐鄭取廪延鄭人既以王師虢師伐衛南鄙矣今復擅興師何為乎孔義三年春王二月己巳日有食之事在二月則書王二月在三月則書王三月無事則書時書首月日有食之有食之者也程傳異書言日不言朔食晦日也古之為厯者食朔則朔食晦則晦謂之平朔今之為厯者雖晦也必移之朔謂之定朔故後世無食晦者野編經書日食三十六其行有常度矣然每食必書示後世治厯明時之法也有常度則非異矣然每食必書示後世遇災而懼之意也胡傳曷為或日或不日或言朔或不言朔曰某月某日朔日有食之者食正朔也不言日夜食也不言朔朔在前也不言朔與日朔在後也蘇轍長厯推己巳實是朔日而不書朔史失之也左疏三月庚戌天王崩平王崩孫桓王立崩上墜之形四海之內皆當奔赴魯君不往罪不書而自見也程傳天王崩魯不會葬者凡七諸侯皆然當是時誰歟伯者謂之尊王不亦愧乎邵寶春秋歷十有二王桓襄匡簡景志崩志葬者赴告及魯往會之也平惠定靈志崩不志葬者赴告雖及魯不會也莊僖頃崩葬皆不志者王室不告魯亦不及也胡傳夏四月辛卯君氏卒君公穀作尹聲子也隱公將不終為君故不稱夫人不稱子氏而稱君氏何也哀公之母曰姒氏卒哀未君也隱既君矣不稱子氏而稱君氏著其君也公羊穀梁曰此尹氏也天子之大夫也天王崩為魯主故卒之王子虎劉卷皆天子之大夫也其卒未嘗不名其曰尹氏而不名非尹氏也蓋君氏也蘇轍任氏曰聲子也謂君氏猶言寡小君也王沿謂君之母氏謂如經之稱夫人氏傳稱君姬氏之類通説以夫人禮成仲子之喪則聲子猶娣姪也娣姪之喪史不書䇿於是以吾君之喪其母不可不書史法適夫人喪不用夫人禮亦書某氏卒如姒氏孟子是也而聲子獨稱君氏禮妾為女君之黨服攝為君則不為女君之黨服聲子以攝女君之貴異乎衆娣姪女君稱小君則攝如君得稱君氏故特書君氏卒以明聲子繼室之為正惠公再娶之非禮趙汸屬辭秋武氏子來求賻來求之始武氏子者天子之大夫也其稱武氏子何也未畢喪孤未爵而使之非正也不言使桓未君也歸死者曰賵歸生者曰賻歸之正也求之非正也周雖不求魯不可以不歸魯雖不歸周不可以求之蘇轍木訥趙氏曰凡書求賻求車求金皆誅諸侯不貢而天下無王也尚何責天王哉先師宗諭王貫道嘗言周凡三求求賻以平王崩求車以桓王將崩求金以襄王崩皆以喪事之有闕賻賵之不供也魯不盡臣子之職致周王下求謂魯秉周禮可乎日抄八月庚辰宋公和卒穆公卒弟殤公立諸侯卒書葬書野編崩薨者臣子之尊稱故外諸侯稱卒以别內也孔義凡諸侯同盟名於載書朝聘會問皆以名通故卒則書名不然則否左氏曰諸侯同盟死則赴以名禮君薨赴於他國曰寡君不祿臣子而名其先君非禮也蘇轍冬十有二月齊侯鄭伯盟于石門外諸侯特相盟之始齊鄭之交始此孔義齊鄭為一當時未有伯各於其黨野編書此為艾之盟張本趙木訥外特相盟不書必關於天下之故而後書莒紀無足道也齊鄭合天下始多故矣天下之無王鄭為之也天下之無伯齊為之也是故書齊鄭盟石門以志諸侯之合書齊鄭盟于鹹以志諸侯之散是春秋之終始也春秋於隱桓莊之際唯鄭多特筆於襄昭定哀之際於齊多特筆焉陳傳良後傳癸未葬宋穆公穆公穀作繆諸侯告喪魯往會葬則書程傳四年春王二月莒人伐杞取牟婁伐國取邑之始外取邑書內取邑書野編諸侯相伐取地於是始取者收奪之名孔義趙鵬飛曰莒入春秋首加兵于向今又弱杞而攘其邑然至昭五年莒牟夷卒以牟婁來奔戴溪曰徒為叛人之資耳日抄戊申衛州吁弒其君完桓公此書弒之始不稱公子身為大惡絶之於其先君也其又有以屬稱者或過其親之以啓亂或見其以親而反讐事同詞異各有義而不可例拘孔義本程傳夏公及宋公遇于清衛地書遇之始遇書魯宋為一野編古有遇禮以待不期之會亦相期也而同于不朝之簡故書曰遇及者內為志也孔義為衛謀也日抄宋公陳侯蔡人衛人伐鄭諸侯會伐之始亦東諸侯分黨之始於是齊鄭一黨也魯宋陳蔡衛一黨也東諸侯分黨而天下始多故矣衛使宋為主使大夫將故序衛人於陳蔡之下服虔宋殤不誅弒君之賊不念穆公舍其子而立已反以馮在鄭從州吁伐鄭故是役也首謀在衛而以宋主兵孔義不見人伐衛衛乃伐人耶衛風云從孫子仲平陳與宋主兵者州吁將者公孫文仲也宋公為之與夷宋之完也野編秋翬帥師會宋公陳侯蔡人衛人伐鄭大夫專將之始宋公使來乞師公不義州吁而辭焉公子翬請以師會之公弗許固請而行蘇氏羽父我之州吁也亂者治矣治夫與於亂者也與於亂者治而亂者其孤矣野編九月衛人殺州吁于濮陳地州穀梁作祝稱衛人衆詞也舉國殺之也程傳伐鄭稱人責詞也殺州吁稱人衆詞也伐鄭之役公孫文仲為主將而稱人則是指國人聽州吁號令從文仲而南行者也故曰責詞其殺州吁則石碏謀之而使右宰醜涖之稱人則是人皆有欲討賊之心亦夫人之所得討也故曰衆詞于濮者憫衛國之人著諸侯之罪也以討賊許衆人以失賊罪鄰國胡傳吁二月弒君九月方討為期也久傳者尤有不足之詞焉其得久者由宋魯陳蔡助之胡傳罪鄰國有以哉傳斷冬十有二月衛人立晉宣公以衛晉推之宋御説晉黑臀周宜無不書於䇿者何也黑臀也周也皆立於弒君者御説定意於國人故皆削不書與國伐鄭以定州吁而天子不能正故特書立晉以著衛人討賊立君之義於天下結正五國輔篡之罪也陳氏曰必若衛人討賊而後可書立是也屬辭殺州吁曰衛人立晉亦曰衛人抑何以異吾聞亂臣賊子人人得而誅未聞國君人人得而立之也此其所以異也邵寶濮陳地也請涖於衛故曰衛人殺之也晉自當立立晉者誰耶故曰衛人立之也比於蔡人殺陳他則陳有佚賊比於齊人殺無知則齊無立君天下後世知衛有人焉已矣野編五年春公矢魚于棠矢公穀作觀魯地君舉書觀魚非事也野編夏四月葬衛桓公十四日而葬討賊而始葬魯往會故書孔義秋衛師入郕公作盛衛之亂郕侵衛今故入郕左傳郕被鄰國之兵自衛始至十年齊鄭連兵入郕莊八年公及齊師圍郕而郕降於齊文十二年郕伯來奔自此不復見於經國遂滅矣木訥九月考仲子之宫初獻六羽考者始成而祀也諸侯不再娶孟子入惠公之廟仲子無祭享之所為别立宫以祀之因其來賵而正名之曰仲子之賵因其考宫而正名之曰仲子之宫而夫人衆妾之分定矣初獻六羽者始用六佾也不謂之佾而曰羽者羽以象文德婦人無武事故謂之羽而不曰佾也胡傳八佾用宗廟久矣而不自知其僣也至於考仲子之宫而用六羽春秋書之幸之也而有遺憾焉諸侯之妾之用六羽猶諸侯之用八也簡端録邾人鄭人伐宋宋人取邾田故邾人請於鄭以伐之凡班序上下以國之大小而盟會征伐以主者先邾小而先鄭主兵也蘇轍蓋事有輕重而大夫之會必以其班非有故不得以微者往其以微者會則大國大夫下於次國之卿若溫之盟陳子序鄭人下是也次國大夫下於小國之卿邾人鄭人伐宋是也先儒謂小國主兵序大夫之上者非屬辭螟螟書螽書有􅈮書有蜚書多麋書蝝生書石書鷁書鸜鵒書麟書害者災不害異野編詩去螟螣害稼也春秋書螟記災也國之大事故書胡傳冬十有二月辛巳公子彄卒臧僖伯書日見恩禮之厚胡傳宋人伐鄭圍長葛書圍之始書圍志暴也孔義六年春鄭人來渝平公穀作輸平公之為公子也與鄭人戰於狐壤止焉故與宋為黨修怨於鄭邾鄭伐宋入其郛宋來告命使者失詞欲救而止鄭人遂乘隙而輸平也和而不盟曰平蘇轍渝變也平成也六年春以前清之遇宿之盟我成於宋六年春以後艾之盟防之會我成於鄭局於此一變野編輸平者以利相結解怨釋仇離宋魯之黨也後此使宛來歸祊而魯入其地會鄭人伐宋得郜及防而魯又取其二邑是知以利相結也胡傳夏五月辛酉公會齊侯盟于艾齊地齊魯交好之始始平于齊也左傳前此魯未嘗與齊交因鄭輸平之後而公始與齊盟蓋皆鄭莊之謀也吳澄纂言秋七月此無事何以書春秋編年四時具而後為年也野編冬宋人取長葛圍其邑周一嵗而取之孔義七年春王三月叔姬歸于紀書叔姬賢之也蘇轍娣歸不書閔其無終也程傳為有歸於􅈶一事不容不書野編滕侯卒不書名史闕也程傳諸侯卒不同盟者五十二人不書名者九人餘皆書名陸氏纂例不書葬者怠於禮而不往弱其君而不會也夏城中丘書土功之始國之大役城書築書時亦書不時亦書野編凡用民力雖時且義必書見勞民為重事也僖公修泮宫復閟宫非不用民力也而不書二者為國之先務乃所當用也人君知此則知為政之先後輕重矣凡書城完舊也書築創始也程傳中丘近莒為城以偹之且為向之外應也私考齊侯使其弟年來聘列國來聘之始聘書野編先儒母弟之説蓋緣禮文有立嫡子同母弟之説其曰同母弟蓋謂嫡爾非以同母為加親也若以同母為加親是不知人理也程傳鄭語來盟黑背帥師皆罪其私也陳光奔楚而稱弟盜殺衛縶而稱兄秦針宋辰皆責其薄也胡傳以弟為貶可施於陳光秦針宋辰然段何以不弟也以不弟為無貶可施於許叔蔡季然肹與鱄何以弟也且夫年之弟也為有公孫無知也以病齊僖黑背之弟為有公孫剽也以病衛定逆探於後追論於前於文太深於事無據夫義繫於聘直云結艾之盟足矣野編秋公伐邾伐邾之始為宋討也渝蔑之盟矣孔義冬天王使凡伯來聘天王下聘之始戎伐凡伯于楚丘以歸戎患之始春秋書天王下聘者凡八責諸侯不朝而坐受天子之聘也國而曰伐此一人而曰伐天王使來聘而戎伐之書之以罪魯也穀梁以為衛楚丘考之衛楚丘自在河北周在河南是時河未南徙魯亦在其南也從魯至周不宜由衛左傳魯有卜者楚丘之父蓋以地為氏者則魯亦有楚丘也略記八年春宋公衛侯遇于垂宋衛為一野編齊將為鄭平宋衛有會期矣而宋衛先為垂之遇者有私謀也有意於從齊黨而無志於釋鄭憾也孔義三月鄭伯使宛來歸祊庚寅我入祊公穀作邴魯有朝宿之邑在王畿之內曰許鄭有湯沐之邑於泰山之旁曰祊時天子不巡狩魯亦不朝故欲以祊易許田各取其近者前此來輸平以言請之矣至是始入地也入者內弗受也程傳宛之不氏鄭大夫之未賜族者也蘇氏不結祊成隱之善也野編用是見鄭有無君之心而謂天王不復能巡狩矣用是見鄭有無親之心而敢與人以先祖所受之邑矣胡傳魯初睦宋齊恐魯助宋故為鄭求魯不應反為宋伐邾故歸祊魯得祊而始奉杜稷以從木訥鄭伯利在得許田故先使人歸祊為異日取許田之地隱不悟其計受而有之自鄭人輸平之後魯多墮鄭計而不自知岷隱夏六月己亥蔡侯考父卒宣公卒桓侯封人立辛亥宿男卒蔡未通而名者蓋通於惠公之世也宿嘗通矣其不名失之也蘇轍秋七月庚午宋公齊侯衛侯盟于瓦屋周地參盟之始齊鄭方合宋欲間之盟齊不盟鄭野編宋衛一黨也齊鄭一黨也鄭莊挾齊自強齊僖特假鄭以紏合不逾年會防謀伐宋矣要盟何益哉孔義本私考參盟者無主之盟也非以三國為限也但始於宋齊衛之三國故相承以為參耳後傳八月葬蔡宣公諸侯五月而葬宣公卒兩月耳不及期簡也孔義九月辛卯公及莒人盟于浮來浮公穀作包好莒之始亦魯君特會外大夫之始可言公及人不可言公及大夫穀梁非大夫敢盟公公自欲與盟耳特書公所以譏公之失禮明非大夫之事也陸淳纂例莒雖小國而入向伐杞能為魯患故七年城中丘以偹之至是復屈己要盟於其地孔義螟冬十有二月無駭卒駭穀作賅展氏公孫之子與異姓之臣未賜族而身為大夫則稱名無駭挾之類是也己賜族而使之世為大夫則稱族如仲孫叔孫季孫之類是也胡傳九年春天王使南季來聘天王之使至魯者於此而三魯無一答詳王使所以著隱罪也傳斷三月癸酉大雨震電庚辰大雨雪雨㿩之變甚者書野編不時災也非常為大亦災也程傳三月夏之正月也雷未可以出電未可以見而大震電此陽失節也雷以出電以見則雪不當復見而大雨雪此隂氣縱也凡失其度人為感之也胡傳挾卒公穀作俠夏城郎書不時也左傳郎邇宋城郎將為鄭伐宋也孔義本木訥秋七月冬公會齊侯于防公作邴謀伐宋也左氏曰鄭伯以王命討宋之不王豈其然乎假此以誑齊魯耳孔義十年春王二月公會齊侯鄭伯于中丘為師期也程傳防之會魯始與齊謀伐宋之舉至中丘之會復偕鄭合謀而決出師之期經傳録之著伐宋之兵所由合也汪克寬纂疏夏翬帥師會齊人鄭人伐宋三國先遣將致伐齊鄭稱人非卿也程傳三國會伐宋吾所知也宋公不王鄭伯以王命討宋於傳有之經無是也且鄭伯安知有王鄭伯而知有王蝥弧之旗魚麗之陳奉辭四伐為政於天下可也何為與虢公爭政哉野編六月壬戌公敗宋師于菅宋地辛未取郜辛巳取防魯於宋本無纎芥之隙徒以歸祊之故為鄭伯所役翬既帥師會二國公復自出竒兵以襲人之虛而取其二邑春秋書日所以著其暴辭婉而義見者也家鉉翁傳秋宋人衛人入鄭宋又連衛以報鄭鄭幸菅之敗而不偹故師還及郊宋衛已乘其虛而入之矣髙閌集注宋人蔡人衛人伐戴鄭伯伐取之戴公作載宋人衛人入鄭蔡人從之伐戴鄭伯圍戴克之取三師焉戴鄭所與也故三國伐之鄭戴合攻取三國之衆程傳蓋戴已授其繹開之於宋鄭揆其不偹攻之於後故一舉而取其師通説羅喻義曰入隱之篇大抵皆宋鄭事也宋自殤公立開怨於鄭傳所謂十年十一戰也起隱之四年宋公伐鄭一翬會宋公伐鄭二邾人鄭人伐宋三圍鄭長葛四取長葛五翬會齊人鄭人伐宋六敗於菅七取郜八取防九入鄭十伐戴十一而宋自此病矣難發於州吁衛之亂易於宋當其起也惟公子馮之求及其病也不中於在外之亡人而中於在近之逆人齊鄭同謀者也陳蔡衛親宋者也入郛以前我附於宋渝平而後我講於鄭取郜歸我取防歸我其入許也又讓於我鄭之奉我至矣來即我謀爾冬十月壬午齊人鄭人入郕公作盛討不會伐宋也程傳郕衛所與也而齊鄭入之集注齊僖與鄭同志今年入郕明年入許其後如紀惟以窺伺弱小為事爾野編十有一年春滕侯薛侯來朝諸侯朝魯之始朝書野編諸侯雖有相朝之禮而當時諸侯皆不朝王獨朝魯可乎滕薛二君不特言者又譏旅見也程傳夏公會鄭伯于時來時來公穀作祈黎鄭地謀伐許也程傳秋七月壬午公及齊侯鄭伯入許書會伐許者鄭志也書及入許者公所欲也胡傳閻開正曰隱桓二十年間事皆以鄭莊為綱魯隱半生全被鄭莊播弄冬十有一月壬辰公薨不地不葬知其有變也然春秋之意在元年不書公即位矣春秋不言即位者其皆有故乎莊閔僖不言即位故在前也隱不言即位故在後也野編不書葬不成喪也集解歐陽修曰魯隱南靣而治其國君其吏民者十餘年死而入廟立諡稱公則當時魯人孰謂息姑不為君也孔子修春秋凡與諸侯盟會行師命將一以公書之於其卒也書曰公薨則聖人何嘗異隱於他公也左氏何從而知其攝耶黃震曰隱公春秋之初也春秋之初未有伯也而伯之漸已萌蓋是時惟齊為大國惟魯為望國齊以黨鄭伐宋魯以受鄭祊田忘鄭之讐而從齊故前乎此惟兩君相會至此而諸侯參會矣前乎此惟敵國相攻至此連諸侯伐宋矣故曰伯之漸也向使齊不私於鄭而務使宋鄭相安魯不貪鄭之賂而不遽從齊天下其庶乎然則伯之萌齊僖之為而魯隱助之也春秋平義卷一
