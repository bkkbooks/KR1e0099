body:
  text: 春秋平義卷十一秀水俞汝言撰定公名宋襄公子昭公母弟夫人定姒在位一十五年諡法安民大慮曰定元年春王三月當以春王三月為句正二月無事可言也昭公既薨定公未立魯國五月無君無政固不以不書正月見也孔義春王三月也事在三月故以三月書隠莊元年皆事在三月然則何以有正月隠莊于正月即位史嘗書之矣春秋削而不書不書而存正月所以見不書故若定公則六月即位正月本無事何書之有簡端録晉人執宋仲幾于京師大夫專執于是始執宋仲幾于京師無天子也無天子而後敢執人于京師簡端錄夏六月癸亥公之䘮至自乾侯戊辰公即位六月而䘮至又六日而公即位戊辰以前無故公亦無新公也公衍公為不立矣公子宋猶遷次焉季孫之心攷校日月而可知野編秋七月癸巳塟我君昭公八月而塟公薨半年餘始歸歸又踰月而塟塟于墓道南孔子之為司寇始溝而合諸墓九月大雩立煬宫煬宫煬公之宫也于是二十世矣立煬宫非禮也季孫則為之野編煬公者伯禽之子考公之弟魯之以弟繼兄者始此此季氏又欲掩其廢嫡立弟之罪孔義本馬森辨疑冬十月隕霜殺菽未可以殺而殺舉重可殺而不殺舉輕其曰菽舉重也穀梁二年春王正月夏五月壬辰雉門及兩觀灾爾雅觀謂之闕何以謂之闕也兩表雙植中不為門闕如也野編秋楚人伐吳冬十月新作雉門及兩觀子家駒以設兩觀為僣天子矣灾而不知戒又新作之孔義三年春王正月公如晉至河乃復二月辛卯邾子穿卒二月公穀作三月莊公卒子隠公益立夏四月秋塟邾莊公六月而塟冬仲孫何忌及邾子盟于拔公作枝四年春王二月癸巳陳侯吳卒惠公卒子懐公柳立三月公會劉子晉侯宋公蔡侯衛侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯杞伯小邾子齊國夏于召陵侵楚晉楚兵交止此平丘以後無伯會此劉子之會也劉子定天王而楚納子朝于是合十八國之師與齊桓公為前後兩召陵曰侵師已入楚境矣明年王人殺子朝于楚竟成其志何意五伯之後又有劉子野編夏四月庚辰蔡公孫姓帥師滅沈以沈子嘉歸殺之五月公及諸侯盟于皋鼬公作浩油鄭地晉不能復為主矣公及諸侯盟爾野編昭公庸懦權出季氏未嘗得一㑹諸侯今皋鼬之盟定公得與聖人特書公及諸侯幸魯侯之復得及盟也木訥戴溪曰自鄢陵之後晉楚不復有大戰一旦有召陵之役六七十年無此舉也天子之老元戎啟行中國諸侯大抵皆在未有若此其盛者僅侵楚而退自相盟于皋鼬當是時楚有可亾之勢失此機㑹使吳人乗其後而收入郢之功傾天下之勢折而入于吳中國之伯于是絶矣木訥曰齊威以八國伐楚而楚来盟晉文以四國戰楚而楚大敗今三倍于威五倍于文纔一侵而退定公葢制于六卿而不能進也杞伯成卒于會成公作戍六月塟陳惠公許遷于容城許凡四遷矣畏鄭逼也孔義四遷皆出楚命葉在方城之北楚欲以為方城外蔽命之遷夷又欲成章華之臺命遷白羽又遷容城許經四遷不復能國鄭乗之遂滅許滅許者鄭致許亡者未必非楚也張漙秋七月公至自會不致伐楚公以皋鼬為重也孔義劉卷卒劉蚠王卿士不卒有闗于天下之故則卒之陳氏於襄王之難有王子虎焉於敬王之難有劉子焉孔義塟杞悼公楚人圍蔡報沈之役也然栢舉兵端起此野編晉士鞅衞孔圉帥師伐鮮虞圉公作圍東南有事未可北伐葢深避楚不能急蔡遂以伯授吳矣野編塟劉文公寰内諸侯書卒者有之矣書塟書諡書公一經特筆也野編冬十有一月庚午蔡侯以吳子及楚人戰于栢舉楚師敗績楚囊瓦出奔鄭栢舉鄭地舉公作莒吴始書子書戰栢舉之役吳之力也而蔡侯以之是亦蔡之力也竟收入郢之捷以伸召陵之志夫昭侯者世子有之子也于父為孝子于諸夏為功臣春秋書歸粟于蔡天下義是舉也野編戰書人敗書師奔書名與城濮戰書人敗書師殺其大夫書名同子玉子常之罪固同而楚之輕于任人敗師亡衆前後一轍矣孔義庚辰吳入郢公穀作楚稱吳狄之也君舎于君室大夫舎于大夫之室狄道也孔義楚陵犯中國三百年中國不能制假手于吳國幾亡然去楚而吳繼之此聖人之所傷也戴溪五年春王三月辛亥朔日有食之公作五月夏歸粟于蔡於越入吳吳入郢於越入吳吳猶越也並狄之而栢舉之功乃屬之王邦之蔡野編先是昭三十二年吳嘗伐越以賈怨故今吳入楚而越亦乗虛入吳木訥杜氏謂於發語也曰不然也昭五年越人與楚子伐吳八年楚放公子招于越三十二年吳伐越何以不從發語書於越而獨于此及定十四年於越敗吳若十三年於越入吳而書於越乎且經書者或謂之荆或謂之楚何獨於越而顯之或問六月丙申季孫意如卒平子秋七月壬子叔孫不敢卒婼之子成子冬晉士鞅帥師圍鮮虞報觀虎之役也三年鮮虞獲晉觀虎孔義六年春王正月癸亥鄭游速帥師滅許以許男斯歸速公作遫斯執元公成立因楚敗也哀元年許復見葢楚復封之也孔義二月公侵鄭公至自侵鄭晉令也自宣十八年公伐杞魯無君將者八十年至是侵鄭侵齊圍成皆書公則三桓既衰也然非公室能張實以陪臣執國托公行師耳孔義魯君之無兵三家之專也魯君之再有兵陪臣又強而三家不得專也魯之變愈降哉木訥夏季孫斯仲孫何忌如晉桓子獻鄭俘陽虎強使懿子報夫人之幣變文書介副欲以起問者見事情也孔義秋晉人執宋行人樂祁犁晉于是失宋野編范獻子以宋主于趙氏又有賄焉譛晉侯而執之此晉三卿内叛之始宋叛伯之始孔義冬城中城備齊也中城在海州木訥季孫斯仲孫忌帥師圍鄆昭三十年鄆潰二於齊矣至是欲復取之齊魯交兵始此孔義何忌不言何闕文也野編七年春王正月夏四月秋齊侯鄭伯盟于鹹衛地諸侯始復特盟離盟復見自兹以往盟會紛然一如隠桓之舊矣野編陳氏後傳特相盟自齊桓以來未之有也於是再見諸侯無主盟矣是故石門志諸侯之合也于鹹志諸侯之散也齊人執衛行人北宫結以侵衛齊侯衛侯盟于沙公作沙澤晉地即瑣此齊景争伯也野編齊衛合黨之始至哀元年而伐晉矣孔義大雩齊國夏帥師伐我西鄙齊叛晉與鄭盟故為鄭伐我且報二卿之圍鄆孔義齊自襄二十五年崔杼伐我之後四十餘年兵不至魯至是再見則以晉伯之不復振也國夏兩伐晉救無功于是而及齊平矣李氏會通九月大雩冬十月八年春王正月公侵齊公至自侵齊二月公侵齊三月公至自侵齊逾月之間再出侵齊公之進退聽之三家而不得自專矣孔義曹伯露卒靖公卒子陽立夏齊國夏帥師伐我西鄙公會晉師于瓦公至自瓦衛地晉人來援不見齊師而去不成為救以會書矣此見晉之不足賴也野編秋七月戊辰陳侯柳卒懐公卒子閔公越立晉士鞅帥師侵鄭遂侵衞士公作趙侵鄭為有鹹之盟也侵衞為有沙澤之盟也野編塟曹靖公九月塟陳懐公三月而塟季孫斯仲孫何忌帥師侵衞晉故也冬衞侯鄭伯盟于曲濮衛地葢相將去晉也晉于是失鄭衛野編從祀先公今之從祀昔之逆祀也故鬼之寃待虎發之而蒲圃事起矣野編魯祀之不順多矣僖公以兄故特躋于閔上昭公以奔故不祔于先君今始復其正也孔義按昭公之說本于馮山胡趙二氏皆從之孟子載陽虎為仁為富之言是不以人廢其言也孔子書從祀先公是不以人廢其事也通說盗竊寶玉大弓先王分器而盜得竊諸公宫無政也故失地則諱失寶玉大弓則書失之書得之書重其事也孔義簡端録虎叛不書奔不書從祀先公竊寶玉大弓得寶玉大弓則書此所謂定哀之間多㣲詞也叛易知也奔易知也祀乎器乎其于國也大矣而人或以為小也不書其可乎且書叛書奔跡也而未若二者之書之得其情與勢也汪氏曰南蒯以費叛陽虎以鄆讙龜陰叛侯犯以郈叛皆不書書竊寶玉大弓何也費也鄆讙龜陰也郈也是皆三桓之私邑非公邑也故以之叛不書寶玉大弓魯之分器其不得以私邑比明矣而可以不書乎九年春王正月夏四月戊申鄭伯蠆卒蠆公作囆獻公卒子聲公勝立得寶玉大弓陽虎既竊魯何以復得之殆虎遺于道路以為緩追之計也書曰得幸之也邵寳六月塟鄭獻公三月而塟秋齊侯衞侯次于五氏晉地兩侯五氏之次將以何待猶未敢頌言伐晉也野編此伐晉也書次者何未遂伐也三次而伐其欲逞也久矣于鹹鄭叛也于沙衛叛也及齊平魯亦叛晉諸侯無盟主有盟主非美事也無盟主非細事也孔義秦伯卒哀公卒子惠公立冬塟秦哀公十年春王三月及齊平夏公會齊侯于夾谷公至自夾谷夾公穀作頰晉趙鞅帥師圍衛晉自召陵以來凡兵書侵以義不足服人也此曰圍以力不足服人也孔義齊人來歸鄆讙龜陰田穀田上有之字前此嘗歸我濟西田矣後此嘗歸讙及闡矣皆不云來來者齊志也誠于歸矣邵寶叔孫州仇仲孫何忌帥師圍郈秋叔孫州仇仲孫何忌帥師圍郈公作費郈叔孫邑也而仲孫與焉是以二卿敵一郈也師又再舉是以兼時收一郈也武叔于是不武矣論語公山以費叛佛肸以中牟叛春秋傳南蒯以費叛虎以陽闗叛侯犯以郈叛春秋不書五叛此有深意郈若不叛何由墮乎史稱董安于之忠然趙氏安晉室危矣故春秋異于史也野編宋樂大心出奔曹宋公子地出奔陳地公作池大心與地辰佗彄雖非宋之賢臣然以國卿之重介弟之親而一朝以嬖佞逐之宋之非國可知補程傳冬齊侯衞侯鄭游速會于安甫安公作鞌齊地參盟復見葢于鹹于沙合而為安甫之會矣野編叔孫州仇如齊謝歸田又致郈也孔義宋公之弟辰暨仲佗石彄出奔陳暨字下公穀有宋字十有一年春宋公之弟辰及仲佗石彄公子地自陳入于蕭以叛夏四月秋宋樂大心自曹入于蕭辰佗彄地大心之為宋患也寵向魋故也孔義樂氏石氏公弟公子同姓之卿也辰有故而去者也以國人出甚矣又可相將俱入乎書曰宋公之弟辰戚之也而情則愈踈春秋以辰首惡仲佗石彄次之公子地又次之大心自有本末併不言叛也野編冬及鄭平叔還如鄭涖盟涖公作莅去年平齊今年平鄭逝不事晉矣野編書鄭輸平以志諸侯之合書鄭平以志諸侯之散此春秋之始終也十有二年春薛伯定卒襄公卒子比立夏塟薛襄公叔孫州仇帥師墮郈衞公孟彄帥師伐曹季孫斯仲孫何忌帥師墮費曷為帥師墮郈墮費孔子言于季孫曰家不藏甲邑無百雉之城先是南蒯以費侯犯以郈為有甲與城也則趣墮之矣子之功猶未竟乎曰己竟矣夫魯之有費郈猶晉之有晉陽朝歌也晉分為六而魯之不至析為三者賴有此墮也野編秋大雩冬十月癸亥公會齊侯盟于黄齊公穀作晉齊地十有一月丙寅日有食之推厯當為十月丙寅朔公至自黄十有二月公圍成公至自圍成三家城其邑以自利也而家臣據邑以叛則非其利也南蒯侯犯不狃薦為叔季之害叔季亦欲墮之矣故聞聖人之言輙墮焉聖人固無聲色也若公斂處父在成方有功于孟氏且曰成墮齊人必至于北門其意則私其言可聽孟氏之不肯墮宜矣雖然聖人果得志于墮成何有惜乎明年女樂入而夫子行矣孔義墮郈墮費可能也圍成不肯墮不竟其事是難能也夫墮成三子者之意也不墮何害正好與晁錯七國事對看野編十有三年春齊侯衞侯次于垂葭衛地公作瑕穀無衛侯與五氏同野編夏築蛇淵囿讙田歸而築囿于其地孔義大蒐于比蒲衞公孟彄帥師伐曹晉趙鞅入于晉陽以叛冬晉荀寅士吉射入于朝歌以叛荀寅下公有及字寅林父後荀吳之子吉射隨會後范獻子之子晉趙鞅歸于晉鞅殺邯鄲午范氏中行氏伐趙氏而鞅奔晉陽拒范中行也而直書曰叛人臣專土是無君也韓魏黨于趙氏者也故請于公逐二氏二氏奔朝歌亦曰叛者興兵首禍是無君也鞅歸于晉韓魏為請故也三家分晉本于是矣孔義薛弑其君比比弑恵公夷立稱國以弑當國大臣之罪也胡傳十有四年春衞公叔戍來奔衞趙陽出奔宋衛公穀作晉公叔戌何以奔戍將去夫人之黨夫人愬之趙陽戍黨也野編二月辛巳楚公子結陳公孫佗人帥師滅頓以頓子牂歸二月公作三月公孫作子牂作牄頓欲事晉背楚而絶陳好也書滅頓誅楚而罪陳也孔義夏衞北宫結來奔結戍黨也書三大夫奔以著衞亂之所從始孔義五月於越敗吳于檇李吳子光卒檇公作醉句踐元年闔閭卒子夫差立傷而卒也以違檇李得不書滅野編公會齊侯衞侯于牽公至自㑹牽公作堅又作掔衛地即脾上梁間齊魯為㑹止此左氏謂晉圍朝歌牽洮二會皆救范中行氏也孔義秋齊侯宋公會于洮宋未絶晉至是始從齊也孔義天王使石尚來歸脤周魯之交止此書天王止此晉伯衰矣重反在列國故石尚來也野編衞世子蒯瞶出奔宋世子蒯瞶何以奔坐欲殺少君也問殺少君事為有為無曰無之于奔宋則可知己以事攷之夫楚者許之宇下也許止不奔楚奔晉懼楚之得其情也此為弑父也宋南子之家也投之不懼此為不殺母也野編張洽取臨江常山二劉氏之說謂瞶必無殺母之事左氏所記乃南子之䜛言非當時之實録也不然宋南子家何以反奔宋乎孔義衞公孟彄出奔鄭坐世子黨也然則公叔戌趙陽北宫結亦世子黨也野編宋公之弟辰自蕭來奔大蒐于比蒲邾子來會公往嵗大蒐皆三家為之邾子來會公是比蒲有公也野編城莒父及霄城二邑懼晉也孔義無冬闕文十有五年春王正月邾子來朝鼷䑕食郊牛牛死改卜牛二月辛丑楚子滅胡以胡子豹歸去年滅頓今年滅胡以報召陵也孔義夏五月辛亥郊壬申公薨于髙寢非正也野編黄震曰定公當昭公失國之後親征伐親會盟用孔子以相夾谷用子路以墮三都三桓為之稍戢其十二公之自立者與鄭罕達帥師伐宋罕公作軒宋大國至于景公而鄭能困之則桓魋之為也許氏齊侯衞侯次于渠蒢渠公作蘧與垂葭同野編邾子來奔䘮奔䘮非禮以行于天子者行之同列補程傳昭公之世為魯所虐定公為拔之盟終其世不犯邾邾人德之故來會來朝又來奔䘮禮雖過而情則真也日抄秋七月壬申姒氏卒姒公作弋不稱夫人哀未君也公羊不稱夫人不赴且不祔也左傳八月庚辰朔日有食之九月滕子來會塟會猶愈于奔也野編丁巳塟我君定公雨不克塟戊午日下昃乃克塟昃榖作稷辛巳塟定姒辛巳在十月三日杜註書曰定姒則知其為定公之元配矣子巳嗣位而母不成䘮不書夫人與小君葢紀當時之實事也屠明靖集傳冬城漆邾庶其邑城漆謀伐邾也定公薨而三桓復啟釁矣孔義春秋平義卷十一
