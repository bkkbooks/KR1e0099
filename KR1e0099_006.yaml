body:
  text: 春秋平義卷六秀水俞汝言撰文公名興僖公子母聲姜夫人出姜在位十八年諡法慈惠愛民曰文元年春王正月公即位二月癸亥日有食之公有朔字推厯當為三月癸亥朔闕朔字天王使叔服來㑹葬夏四月丁巳葬我君僖公七月而葬天王使毛伯來錫公命晉侯伐衛既祥矣乃書晉侯成襄之伯也野編叔孫得臣如京師拜錫命也衛人伐晉秋公孫敖㑹晉侯于戚此內大夫㑹諸侯之始戚衛邑也㑹于戚衛吾溫原爾不以衛人抗晉侯也野編木訥曰孟氏自敖而専叔孫氏自得臣彭生而橫季孫氏自行父而侈前乎此大夫出㑹者皆君命至此而始專冬十月丁未楚世子商臣弒其君頵公榖作髠成卒商臣立稱世子明其親也稱君明其尊也商臣之於尊親盡矣蘇氏公孫敖如齊穆伯二年春王二月甲子晉侯及秦師戰于彭衙秦師敗績秦地凡言及者主是戰者也敗而書及惡之也宋之泓晉之韓是也勝而書及豫之也宋之甗晉之城濮及彭衙是也春秋甚美彭衙之戰晉書侯秦書師亦北杏法也秦穆身橫雕戈過周北門窺鄭北門視晉襄小子侯爾一挫于殽而為拜賜之師曰必無晉矣使勝在秦黼黻之賜豈待顯王之世哉幸而勝在晉秦不復東襄之戰十數却秦為大此襄之得與于伯也野編丁丑作僖公主作主不書以躋僖公書二月丁丑作八月丁卯躋蓋改作也野編二月已巳及晉處父盟因朝而盟始此言及則公可知矣言處父則陽氏可知矣不言地而言晉則于晉越國可知矣正傳夏六月公孫敖㑹宋公陳侯鄭伯晉士縠盟于垂隴公榖作垂斂鄭地謀衛也於是衛執孔逹以說于晉蘇氏桓文沒大夫擅諸侯㑹盟自公孫敖士縠始也大全熊氏過曰垂隴何為為伐秦也左氏誤以為伐衛衛不書而冬伐秦者正垂隴之大夫也辨義自十有二月不雨至于秋七月歷時而言不雨不憂雨也不憂雨者無志乎民也榖梁于書雨見春秋之文非一手也故僖公異詞野編八月丁卯大事於太廟躋僖公禮父子異昭穆兄弟同昭穆故閔僖不得為父子同為穆爾今升僖先閔二公位次之逆非昭穆亂也王樵輯𫝊冬晉人宋人陳人鄭人伐秦公子遂如齊納幣三年春王正月叔孫得臣㑹晉人宋人陳人衛人鄭人伐沈沈潰伯國大夫㑹諸大夫伐國自此始力分于秦故不競于楚野編伯國大夫㑹諸大夫伐國自伐沈始㑹諸大夫救患自救鄭始春秋皆人之不與大夫之專政也王氏夏五月王子虎卒天子之大夫何以卒或曰為其嘗執重以守也或曰為其嘗臨諸侯之盟也劉敞傳秦人伐晉此所謂焚舟之役封殽尸而還者也自是不復東征誓言終能踐矣秋楚人圍江報沈之役也孔義雨螽于宋異在一國而大者為天下記之野編冬公如晉此書公如晉之始十有二月已巳公及晉侯盟晉人懼其無禮于公也故請改盟雖親盟于其國猶可書也蘇氏晉陽處父帥師伐楚以救江公榖無以字晉大夫書帥師于是始伐楚而圍江之師解此所謂救江也蘇氏四年春公至自晉不朝正于廟于是始夏逆婦姜于齊出姜其不稱夫人何也為其不以夫人逆也夫納幣有公子遂而逆無其人則卿不行也當時有成風焉適可謂姑逆婦爾君逆夫人不如是也禮中焉已矣桓莊之過禮文之不及禮皆亂之本直書其事用見出姜之不允于魯有由然也野編狄侵齊間晉有秦楚之難也日抄秋楚人滅江晉侯伐秦春秋書楚人滅江晉侯伐秦責其當救而不救不當伐而伐也家氏傳衛侯使寧俞來聘蓋成公見執僖公為請今來拜僖公之賜也孔義冬十有一月壬寅夫人風氏薨僖公母妾母稱夫人自文公喪成風始仲子始僣尚未敢同嫡也孔義五年春王正月王使榮叔歸含且賵止書王者闕文木訥三月辛亥葬我小君成風仲子之宫為數特異蓋不祔于姑猶有辨焉至是有二夫人祔廟矣自成風始也孔義王使召伯來㑹葬榖作毛伯聖人立言取諸大義或曰王或曰天王無異同也在此則王不稱天而召伯稱爵豈其罪在王不在伯與在彼則王稱天而宰咺稱名豈其罪在宰不在王與且狩於河陽使毛伯來錫命使家父來求車而皆稱天王又毛伯以爵家父以字抑又何歟故知春秋之大旨固自有在非惟不繫乎王之天與不天而或書名或書字亦非必有意於其間也正旨夏公孫敖如晉秦人入鄀秋楚人滅六冬十月甲申許男業卒子昭公錫我立許男終身事楚晉文公圍之而不服晉襄公伐之而不率者也日抄六年春葬許僖公夏季孫行父如陳季友孫臧文仲以陳衛方睦故行父且娶焉季孫行父如晉文公即位六年朝晉者再貴卿往者再孔義仲氏季孫爭交于晉三家之張自文公始日抄八月乙亥晉侯歡卒歡公作歡子靈公夷臯立起殽之戰至卒凡六年此晉襄公之伯也野編冬十月公子遂如晉葬晉襄公三月而葬速僖公以前葬諸侯未有使大夫者今公子遂以卿往馴至少姜以妾媵而諸侯使卿㑹葬矣孔義晉殺其大夫陽處父晉狐射姑出奔狄射榖作夜晉殺其大夫陽處父不書晉人晉狐射姑出奔狄射姑其人也書人則射姑沒不見狐趙共晉射姑替而盾立狐氏出趙氏専矣此晉國之故也不容不見野編閏月不告月猶朝于廟是嵗秦穆公卒猶朝于廟幸其不已之辭胡𫝊七年春公伐邾三月甲戌取須句遂城郚句公作朐每中國無伯我師必出可知晉襄之為伯也野編夏四月宋公王臣卒榖作壬臣成公卒昭公杵臼立宋人殺其大夫穆襄之族率國人以攻公殺公孫固公孫鄭于公宫則稱人謂穆襄之族也此衆殺稱人之例屬辭戊子晉人及秦人戰于令狐晉先蔑奔秦蔑公作昧奔上有以師字令狐秦地戰于令狐晉背秦也晉先蔑奔秦晉背先蔑也故秦不書敗蔑不書出罪在盾也夫人太子在而外求君豈有君臣如此而相安者乎桃園之事延引嵗月爾野編晉襄之卒於是朞年豈晉至是始謀立君且左氏初言先蔑如秦次言先蔑將下軍蔑既逆雍則必不肯將兵以拒秦茍已拒秦豈容復奔秦耶秦晉自殽凡五戰今晉襄秦穆皆即世可以一洗舊憾趙盾乃修先君之怨以為是戰晉辭為曲蔑不用命而奔敵矣木訥狄侵我西鄙間秦晉之爭也孔義秋八月公㑹諸侯晉大夫盟于扈鄭地㑹盟同地㑹所以為盟也今及其盟不得云後㑹權衡羅喻義曰此春秋一大升降也𫝊曰天下有道禮樂征伐自天子出此言王也天下無道禮樂征伐自諸侯出此言伯也天下有道政不在大夫何以謂之無道無王則無道也何以謂之有道有伯則猶有道也政在大夫伯亦無之此大亂之極也晉自文以來世主夏盟其伯與非伯則君大夫分焉政在大夫雖美如棐林君子不謂伯也于扈之盟謹之諸侯不序大夫不名汪氏曰大夫盟不書名氏者三莊九年齊無君當國大夫自為主也此年趙盾專政若晉無君者然湨梁之㑹諸侯皆在而十一國大夫自盟但書大夫盟諸侯皆失政矣桓莊以前列國之大夫雖管隰狐趙之勳不見于㑹盟惟特使而與魯接者則名之以大夫無繫乎天下之故也列國之大夫雖先郤欒胥之烈不見于侵伐惟魯大夫之特將則書之以大夫惟繫乎一國之故也經繹魯欲迎公子糾不克立故莊九年蔇之盟大夫與而不辱趙盾欲迎公子雍不克立故扈之盟諸侯略而不序辨義冬徐伐莒公孫敖如莒涖盟公榖作蒞修僖公洮向之好協謀以備徐也木訥是嵗中國始無伯主日抄八年春王正月夏四月秋八月戊申天王崩襄王崩子頃王立冬十月壬午公子遂㑹晉趙盾盟于衡雍鄭地乙酉公子遂㑹雒戎盟于暴鄭地公作伊雒戎大夫專盟自衡雍始孔義魯距雒戎甚逺公子遂何為而與之盟哉其隂為趙盾植黨明耳補程𫝊兩挈公子遂臣道之甚水洊至月幾望魯其殆哉野編王樵曰大夫之專盟自是始也前此盟翟泉猶有僖公在㑹也繼此而有袁婁之盟雞澤湨梁諸侯皆在而大夫自盟矣于宋于虢則晉楚之大夫狎主齊盟而諸侯不復在矣辨義公孫敖如京師不至而復丙戌奔莒公無而字公子遂如齊至黃乃復書至而後書復今不言至而言復何也遂之如齊也欲至齊而以疾不能敖無至周之意矣故曰不至而已蘇氏其奔莒者以去年涖盟與君有舊耳左氏從已氏之說未可據補程傳螽宋人殺其大夫司馬公子卭宋司城來奔蕩意諸宋襄夫人因戴氏之族以殺襄公之孫孔叔公孫鍾離及大司馬公子卭皆昭公之黨也則稱人者戴氏之族大夫司馬者公子卭也宋人將弒昭公而立鮑則其所殺必患于昭公者故皆不名以别于討亂稱人者若陳氏謂昭公無道而殺大夫則亦不義其君失事實矣屬辭九年春毛伯來求金來求止此自是魯雖不共周無求矣夫人姜氏如齊文公嬖于敬嬴夫人如齊謀于父母為十八年歸齊張本木訥二月叔孫得臣如京師莊叔辛丑葬襄王前年公子遂如晉葬襄公今年得臣如京師葬襄王是夷周于晉也至于往㑹而不登于䇿不弔不葬而見略于經抑又甚矣孔義趙氏曰襄王使大夫來㑹僖公葬賵含成風且令之葬魯亦以公子遂如晉葬襄公而得臣並葬襄王一則以其來不可不往也一則以其如晉不可不如周也是故叔弓如晉葬平公季孫意如如晉葬昭公而後叔鞅葬景王自是葬天子魯無使卿者矣辨義晉人殺其大夫先都晉頻有誅殺趙氏除異已也野編三月夫人姜氏至自齊書至正其夫人之體也則不至者其行非禮見矣孔義晉人殺其大夫士縠及箕鄭父楚人伐鄭公子遂㑹晉人宋人衛人許人救鄭楚子伐鄭以晉君之少也趙盾率列國之師救鄭而不及楚師故書人以懲不恪孔義夏狄侵齊狄不侵齊五年矣今復侵以中國無伯也補程傳秋八月曹伯襄卒子文公夀立九月癸酉地震前此百餘年未有書地震者而自此至哀公書地震者五陽微隂盛之象也孔義冬楚子使椒來聘椒穀作荻楚君臣始並見經吳楚皆已自王楚子使椒吳子使札正之俾同于列國矣野編諸家皆謂書楚子書椒以其禮交中國而進之趙鵬飛曰楚執宋公以伐宋亦書曰楚子豈進其虐中國耶宜申謀為不道而見殺亦書曰宜申豈進其謀逆耶書楚子書椒從其國之稱而已日抄秦人來歸僖公成風之襚魯之喪諸侯蓋有來禭者矣而獨書秦始通也野編秦人弗夫人之也即外之弗夫人而見正焉榖梁秦欲伐晉而歸禭于魯猶楚欲圖北方而來聘也張洽葬曹共公十年春王三月辛卯臧孫辰卒文仲夏秦伐晉狄之也罪其報復不已孔義楚殺其大夫宜申自正月不雨至于秋七月及蘇子盟于女栗經有溫子又有蘇子左氏則以為一人野編冬狄侵宋楚子蔡侯次于厥貉厥公作屈將伐宋也宋出迎勞之而免曰次著其包藏禍心欲憑諸侯而未敢遽前也惟蔡侯首附夷狄故表而出之以均其罪孔義屬辭晉靈不君趙盾非伯者之佐不足以主夏盟故春秋于靈之世盟㑹每略諸侯不叙而楚君得稱爵于是始故次厥貉伐麇以後無役不稱爵而伐鄭伐吳稱爵主兵無異中國之伯者矣蓋中國有伯則春秋略之以正其名中國無伯則春秋詳之以著其實不正其名則不足以信攘却之義不著其實則不足以見戎狄之强然泓之戰宋公稱爵而楚子稱人不使戎狄之君得抗中國諸侯也邲之戰楚子稱爵而荀林父稱氏名見蠻夷侵叛乃中國之所得討也泓之戰宋公身傷以卒而但書師敗績為中國諱也鄢陵之戰直書楚子敗績治其罪也然則雖書君將而與待中國諸侯伯主之法不可同年而語矣十有一年春楚子伐麇公作圈楚始書君將麇者何南方之微國也伐麇圍巢禍未及中夏野編夏叔仲彭生㑹晉郤缺于承筐公穀無仲字筐作匡叔仲惠伯此大夫特相㑹之始謀諸侯之從于楚者必蔡也十五年伐蔡入之野編秋曹伯來朝自此曹從魯矣孔義公子遂如宋狄侵齊冬十月甲午叔孫得臣敗狄于鹹魯地狄八年之間三侵齊而侵魯宋者一得臣出其不虞而敗之自是有懼心惟十三年一侵衛不敢窺齊魯之藩籬則鹹之役不惟有功于魯且有功於天下也木訥十有二年春王正月郕伯來奔郕公作盛莊八年郕降于齊自是入齊為附庸此而來奔齊所逼爾孫氏紀侯州公郕伯皆所不名也野編杞伯來朝二月庚子子叔姬卒時君之女故曰子以别非先君之女也趙氏夏楚人圍巢巢吳楚間小國也孔義秋滕子來朝秦伯使術來聘術公作遂秦君臣始並見且言將伐晉孔義冬十有二月戊午晉人秦人戰于河曲晉德如秦莫能相尚其靈公與盾之世乎野編自殽至此凡六交兵秦晉亟戰而楚伯矣晉主夏盟而君幼國偷軍謀不一其始見于河曲之戰其甚見于邲之敗蓋一轍也辨義季孫行父帥師城諸及鄆公作運前此莒未嘗與魯爭今行父帥師城二邑以啓爭端魯自此與莒為仇而爭由鄆始張洽先師王貫道曰二邑近費而介于莒他年宿伐莒取鄆叔弓疆其田費于是始大然則此行父自為封殖之計也日抄此魯東鄆成四年城鄆乃西鄆也孔義十有三年春王正月夏五月壬午陳侯朔卒共公卒子靈公平國立邾子蘧蒢卒文公卒子定公貜且立自正月不雨至于秋七月大室屋壞大公羊作世大室魯公之廟也野編冬公如晉衛侯㑹公于沓下公字公羊無公一出而平衛鄭於晉明年遂為新城之盟晉以復伯終文公之世楚不敢復侵中國不為無助於晉矣孔義狄侵衛十有二月己丑公及晉侯盟公還自晉鄭伯㑹公于棐公作斐榖作還無公字鄭地自晉襄沒而諸侯不復合矣楚人見中國無伯乃伐棠圍之其勢漸逼衛鄭衛鄭二國欲從伯主蓋由公將如晉故衛侯合于㳫公還鄭伯㑹于棐蓋以魯為我國從違之計于是明年有新城之盟終文公之世楚不復侵諸侯兩㑹之力也辨義十有四年春王正月公至自晉春頃王崩子匡王立于是再不朝正于王矣文公即位十有四年而朝晉者三過於事天子之禮補程傳邾人伐我南鄙叔彭生帥師伐邾夏五月乙亥齊侯潘卒昭公卒子舍立六月公㑹宋公陳侯衛侯鄭伯許男曹伯晉趙盾癸酉同盟于新城宋地同外楚也從於楚者服扈之㑹止書公㑹諸侯晉大夫今新城之盟列叙諸侯明書晉趙盾者崔氏曰新城之盟出于諸侯而扈之盟晉大夫主㑹也秋七月有星孛入于北斗公至自㑹晉人納捷菑于邾弗克納捷公作接盾為義也捷菑晉出也貜且齊出也貜且也長乃去之盾不辦為此令狐之役晉實愧秦其以捷菑為公子雍矣曰義弗克也何害野編九月甲申公孫敖卒于齊公孫敖不卒者也齊人筍將而來叔姬不卒者也杞伯親逆而去不容不卒野編奔大夫不言卒者許其復也孔義齊公子商人弒其君舍商人弒舍自立是為懿公未踰年而曰君者成舍之為君所以重商人之弒也孔義宋子哀來奔宋髙哀為蕭封人以為卿不義宋公而出遂來奔書曰子哀貴之也孔義宋人將弒昭公而殺其司馬故司城子哀皆奔奔非無與于君故一書其官一書其字焉不名蓋自元咺至後大夫益專政出入必書關於天下之政自僖以前外大夫無以出奔書者政不在大夫也屬辭冬單伯如齊齊人執單伯齊人執子叔姬單伯者何天子之卿也子叔姬者何昭之妃舍之母也單伯何以如齊魯人請之將以王寵求昭姬焉齊人何以執單伯負人者愧人又何以執子叔姬執猶愈于弒也野編書齊人執單伯書齊人執子叔姬兩書齊人者正不欲以姬與單伯而嫌于淫也此當從左氏而公榖所𫝊殆齊人誣而執之之詞焉黃震吳氏以為魯文之女初嫁于舍而使之過者也以春秋之書子叔姬而知商人甘心辱之蓋怒魯以女為舍之援也探微十有五年春季孫行父如晉為單伯與子叔姬故也孔義三月宋司馬華孫來盟春秋以弒君書者二十四未有上通君祖母下結六卿公族以及國人盡殺大夫之忠于君者而使其黨為卿以卒成其篡弒如公子鮑者亦未有以世適嗣孫外㑹諸侯內奉宗廟前亂臣而後賊子徒擁虛器十年而坐受篡奪如宋昭公者是故昭公之大夫皆書其官不書其官則見殺而不名者嫌于曹大夫矣奔而不名者嫌于反國之蔡季來盟不稱使且不名者嫌于齊無知矣夫公子鮑之弒機動于昭公未即位之前而卒成于十年之久使非有貴戚强家囊橐其間則鮑雖姦襄夫人雖惡昭公安能拱手就戮于一婦人耶則宋人殺其大夫司馬而使華孫代之且來盟然後弒其君則知身為世卿外結援鄰國內假手于襄夫人以成鮑之篡者華氏之族也華元代公子成為右師此蓋鮑與夫人所位置者而昭公豈能用之于是華耦來盟于魯既而晉衛陳鄭伐宋討弒君者而魯不與晉人受賂立文公而還華元卒相宋公皆華氏之始謀也夫子于此特書其官學者不能深考而宋昭無道見弒之說至今稱于口而筆于書未有辨其誣者然則春秋特筆之義其可不明乎屬辭夏曹伯來朝齊人歸公孫敖之喪敖之卒與喪歸於法不得書以文伯惠叔二子之哀誠無已以敖著教也孔義六月辛丑朔日有食之鼓用牲于社單伯至自齊齊侯以晉故許單伯請單伯過魯致命而歸周喜而致之也蘇氏晉郤缺帥師伐蔡戊申入蔡厥貉從楚新城不㑹晉野編蔡自獻舞入楚至晉文敗楚而後來歸晉文後復從楚者十五年蔡無以自立故也日抄秋齊人侵我西鄙季孫行父如晉復為齊故也蘇氏冬十有一月諸侯盟于扈謀伐齊也晉侯得賂而還於是公以齊難不㑹書曰諸侯盟于扈無能為也孔義諸侯者新城之諸侯也而魯晉不與焉蓋季孫行父求晉謀齊因約諸侯聽命于扈而趙盾視如尋常恬不為意故晉人不出行父竟歸而諸侯待晉不至則自相要語以尋新城之盟而退耳故曰諸侯不序無伯之辭也十有二月齊人來歸子叔姬不言齊子叔姬來歸而曰齊人來歸子叔姬言叔姬無罪而齊人絶之也蘇氏齊侯侵我西鄙遂伐曹入其郛齊侯謂諸侯無能為也故復侵魯遂伐曹討其朝于魯也蘇氏十有六年春季孫行父㑹齊侯于陽榖齊侯弗及盟齊地齊以公不往而不盟也孔義夏五月公四不視朔公有疾也自是公無疾不視朔也公羊傳六月戊辰公子遂及齊侯盟于郪丘公作犀丘榖作師丘齊地惟遂可盟商人從其類也野編秋八月辛未夫人姜氏薨僖公夫人文公母聲姜也毁泉臺楚人秦人巴人滅庸冬十有一月宋人弒其君杵臼杵公作處昭公弒弟文公鮑立宋昭不能于其大夫國人襄夫人亦惡之公田孟諸夫人使帥甸攻而殺之蘇氏宋人者何不知何人也野編十有七年春晉人衛人陳人鄭人伐宋諸大夫伐宋卒立鮑而還安在其為討罪哉成宋之亂而已木訥夏四月癸亥葬我小君聲姜聲公作聖不稱僖姜而别為諡非也九月而葬慢也孔義齊人伐我西鄙六月癸未公及齊侯盟于榖諸侯㑹于扈平宋也書曰諸侯無功也公以齊難不與㑹孔義文十五年書諸侯盟于扈至是書諸侯㑹于扈始也魯文公後至晉侯取賂于齊無功而還故春秋略之不列序諸侯今扈之㑹文公不與諸侯成宋之亂而不能討其罪故春秋復略之戴溪秋公至自榖言至自榖則不㑹扈可知也孔義十有八年春王二月丁丑公薨于臺下臺下非正也穀梁秦伯罃卒康公卒子共公立夏五月戊戌齊人弒其君商人懿公弒兄惠公元立弒商人者邴歜閻職也而曰齊人人所同欲也而曰弒何也罪齊人也齊人黨商人而弒舍者也故不從蔡申之例以盜殺書而曰齊人不從州吁無知之例以討賊書而曰弒孔義六月癸酉葬我君文公秋公子遂叔孫得臣如齊遂賀齊惠公立得臣㑹葬懿公纍數之者偕行也非相伯介也蘇氏冬十月子卒子惡也不曰弒也不忍言也孔義夫人姜氏歸于齊上書大夫並使下書夫人歸齊中曰子卒故春秋屬辭比事而自見也孔義季孫行父如齊遂得臣行父三人皆與謀以其前後如齊而知之也沙隨程氏惡實齊之甥恐齊人聽夫人之訴而來討於是議納賂而請平焉髙氏集注襄三十一年書秋九月癸巳子野卒此書冬十月子卒曷月冬十月也曷日祕不可知則有故也莊元年春三月夫人孫于齊閔二年書九月夫人姜氏孫于邾此書夫人姜氏歸于齊子卒而歸非孫也伊可哀也季孫行父何以如齊魯之重在季須煩一往也他日季孫曰使我殺適立庶者仲也夫微此供吐亦知當爾豫所以欲行白本也問子般卒何以日子卒何以不日曰子般戕於黨氏人所知也子赤傷于宫中則不日以見此書法之精也野編莒弒其君庶其義與薛比晉州蒲同野編春秋平義卷六
