body:
  text: 春秋平義卷四秀水俞汝言撰閔公名啓方史記名開莊公之子母叔姜九歳即位在位二年諡法在國逄難曰閔元年春王正月繼弑君不言即位正也親之非父也尊之非君也繼之如君父焉者受國焉爾穀梁齊人救邢夏六月辛酉塟我君莊公國亂子弑嗣君㓜弱至十有一月而始塟張氏秋八月公及齊侯盟于落姑齊地落公榖作洛孰立閔者齊立之閔叔姜之子也盟于落姑始復季友慶父猶在樹季盖摧仲也野編季子来歸季子賢之也曰来歸喜之也公榖慶父書出不書歸不宜歸者也季子書歸不書出不宜出者也畧記冬齊仲孫来時吾君㓜不以賔禮接故不言使季友以兩臣相見故不書名𫝊言其情曰省難史録大體但言来比而觀之則齊桓不早平魯亂以致閔公再弑其失自見屬辭存魯制在仲孫非齊侯之所使也其言来非盟且非聘也蘇氏二年春王正月齊人遷陽小國夏五月乙酉吉禘于莊公不王而禘失一去䘮而即吉失二不于太廟于莊公失三五字含三義野編魯之用禘盖于周公廟而止及文王文王即周公之所自出也故此祭獨得于周公廟行之閔公時遂得于莊公廟行之以其不追配故直言莊公而不言莊宫則用其禮耳而不追配文王也陸淳纂例灌甫曰按春秋用禘與左氏所説俱以禘為盛禮盛樂國君福矣孔主入廟必用此以為榮美此𫝊曰夏吉禘于莊公速也言其方在䘮中用之太速非譏其别立莊廟吉祭耳故晉人曰以寡君之未禘祭故魯禘于太廟用致夫人又曰魯有禘樂賔祭用之則有時用禘可知矣辨義秋八月辛丑公薨公薨不地故也共仲為賊踰年之中再行大事野編不書塟不成䘮也蘇氏問季友何如人曰英雄也非聖賢也昔周公抱成王召公為保史佚為傅以佑冲子夫以肺腑之親外接强齊武闈何地卜齮之刄何以得𤼵且季之適陳也脱身獨出其適邾也則與僖俱楚邱父之繇成風之屬已流傳人間矣吁嗟季子君臣父子兄弟之間詎謂無功可以為難矣仁則吾不知也野編簡端録魯無弑非無弑也凡弑曰薨或曰卒魯無殺非無殺也凡殺曰刺或曰卒魯無出非無出也凡出曰孫或曰如為國諱禮也九月夫人姜氏孫于邾公子慶父出奔莒公薨矣夫人若為孫公子若為奔其故可知也罪人得矣野編哀姜不奔齊而奔邾者畏齊桓故不敢歸齊也纂言宋萬奔陳雖殺之不書慶父奔莒雖殺之亦不書所以嚴佚賊之責也陳氏夫人孫邾不齊入也慶父奔莒不齊奔也則桓之故也於是乎季子介然以親賢鎮于内髙子儼然以伯命莅乎外而内外大釁溘其定也牙卒而逆黨孤仲縊而禍本㧞夫人薨而國定矣魯于是危而復安二子之力也二子之力桓公之徳也鄧元錫經繹冬齊髙子来盟盟者何立僖公也其曰髙子何也季友親之也野編善其能恤魯伊川齊桓使髙子来盟因魯無君季友接之以二臣相見故不言齊侯使無所致命也公羊曰不稱使我無君也宋人將弑昭公而立公子鮑華孫為公子鮑来盟非其君使来故不言宋公使無所受命也屬辭十有二月狄入衛狄大入邢衛之間衛滅矣餘邢在也野編臣昔嘗謂河南劉奕曰史氏記繁而志寡如班固書載諸王淫亂等事盡削之可也奕曰必若此言仲尼刪詩如墻有茨鶉之奔奔桑中諸篇何以録于國風而不削乎臣不能答後以問延平楊時時曰是載衛為狄所滅之因也故在定之方中之前因是攷于歴代凡滛亂者未有不至于殺身亡家國者也然後知古詩垂戒之大胡𫝊黄正憲曰先儒皆以衛自盟幽以来背齊不㑹及齊見伐又復不從故桓公棄衛不圖而盡力救邢非也衛自宣公淫亂國勢崩解狄人猝至遂爾播遷一時未有救者聽其避狄處清以俟後舉非棄之也若邢與衛隣實當狄人歸路之衝藉狄乗勢邢之不能支而入于狄則北一帶狄得恣意出没後雖欲恢復境土為邢衛計難為力矣故帥宋曹之師遷于夷儀遂帥二國城之以固其根本邢存則磁澶雒聶之間彼此猶得聮絡立制不為狄所侵害庶人民安堵可以為勞成還定之計而楚丘之故因可漸舉已是救邢亦所以存衛也辨義鄭棄其師鄭獨惡髙克其師何罪而寘之河上是謂棄之嗚呼此隐桓莊閔之春秋也春秋第一君首罹大變内無作異之人外無相存之使故曰害哉諸侯無覇讀閔之篇平難者来作難者去春秋一大開闢也誰之力也哉所致疑者姜氏死于夷共仲死于宻賊已討矣而不書塟夫豈無意明年賜季友汶陽之田及費至于易世宗伯議禮猶嫌故鬼之小閔之可閔有自来矣野編春秋平義卷四
