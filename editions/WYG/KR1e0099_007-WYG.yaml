body:
  text: 春秋平義卷七秀水俞汝言撰宣公名倭或作接文公庻子母敬嬴夫人穆姜在位一十八年諡法善問周達曰宣元年春王正月公即位即位之禮行則書不行則否文成以下六君皆行之隠以為攝而不必行荘閔僖則繼故而不忍行者也桓之行桓之志也宣之行宣之志也邵寳繼故書即位宣一桓也野編公子遂如齊逆女逆女書公子遂遂一翬也三月遂以夫人婦姜至自齊脱氏字伊川婦有姑之詞也公羊敬嬴欲結齊恵懼為出姜所謀故喪娶其女如是之亟也孔義逆婦姜于齊病文公也以婦姜至自齊責敬嬴也胡氏上書夫人姜氏歸于齊矣此書曰夫人姜氏至自齊則嫌于出姜之反魯矣故書婦姜以别之馬森辨疑夏季孫行父如齊前年行父如齊告立也亦約昏也而逆女者遂也今年行父如齊請㑹也亦許賂也而致田者遂也堂堂國卿借面𫝊語妾不衣帛馬不食粟清矣以為社稷臣吾不知也野編晉放其大夫胥甲父于衛河曲之戰撓㬰駢之謀者趙穿也軍門之呼穿與甲父共也而獨放胥甲者趙盾之私也胡氏狐氏先氏胥氏誅夷畧盡晉其殆哉野編公㑹齊侯于平州齊地定公位也孔義自齊而言亦曰成魯亂爾野編公子遂如齊東門襄仲致濟西田也野編六月齊人取濟西田事同郜鼎辭異鄭璧野編秋邾子来朝楚子鄭人侵陳遂侵宋楚稱子鄭稱人鄭為楚下大為中國患矣野編陳氏後傳曰南北之勢於是始也後十五年而宋楚平後五十年而晉趙武楚屈䢖同盟于宋諸夏之君分為晉楚之從矣晉趙盾帥師救陳宋有弑君之罪不當救故畧之張洽宋公陳侯衛侯曹伯會晉師于棐林伐鄭棐公作斐鄭地不言趙盾之師君不會大夫之辭也孔義冬晉趙穿帥師侵崇公作栁自伐書陽處父入書郤缺侵書趙穿而後凡役書大夫崇秦之與國晉将求成于秦故侵崇秦弗與成蘇氏晉人宋人伐鄭伐鄭所以救宋也穀梁報北林之役也孔義二年春王二月壬子宋華元帥師及鄭公子歸生帥師戰于大棘宋師敗績獲宋華元戰皆書大夫帥師自此始大棘宋地宋鄭自治兵相攻無與楚事傳謂歸生受命于楚伐宋未必然也經直据勝負為辭爾韓之戰不言敗績君止而師未衂也大棘之戰軍將皆没野編秦師伐晉以報崇也左秦晉自河曲之戰七年不交兵矣孔義夏晉人宋人衛人陳人侵鄭報大棘之役也野編秋九月乙丑晉趙盾弑其君夷臯公作獋靈公弑成公立堂上之甲方興桃園之攻隨至及其反國非獨置賊不討反使往迎新君則盾之為弑又誰掩乎孔義董狐在當時身親其事知其謀出于盾故以律所謂造意者當之其曰亡不越竟反不討賊蓋折盾之辭非以二端故而輒加以大惡之名也簡端録盾若誅穿歸生若誅宋春秋必曰二臣能討賊也穿不死則盾也首惡宋不死則歸生也首惡何嘗輕以弑君獄人哉傳斷冬十月乙亥天王崩定王立許氏曰文公使公子遂𦵏晉侯叔孫得臣𦵏襄王是均周晉也昭公使叔弓葬宋公滕侯叔鞅𦵏景王是均周宋滕也成公𦵏晉景不𦵏定王襄公𦵏楚康而不𦵏靈王是不臣於周而屈於晉楚也畧記三年春王正月郊牛之口傷改卜牛牛死乃不郊猶三望𦵏匡王四月而𦵏簡也補程傳楚子伐陸渾之戎陸公作賁公穀無之字陸渾在王畿之側窺周室也補程傳或曰僖文以来楚多稱子何也曰楚僣王也僖文而後漸同真王抑就五等所以正之也吳楚書子以為許之以為進之皆非也野編夏楚人侵鄭即鄭及晉平可知此後再及楚平再及晉平所謂犧牲玉帛待于二竟野編秋赤狄侵齊赤狄始見經宋師圍曹宋文即位盡逐武穆之族二族以曹師伐宋宋師圍曹報武氏之亂也孔義冬十月丙戌鄭伯蘭卒穆公卒靈公夷立𦵏鄭穆公公作繆𦵏速禮不備也孔義四年春王正月公及齊侯平莒及郯莒人不肯公伐莒取向及者内為志也伯姬在焉爾莒人不肯為己甚矣伐莒取向罪在莒也野編秦伯稻卒共公卒桓公立夏六月乙酉鄭公子歸生弑其君夷靈公弑弟襄公堅立經書鄭公子歸生弑其君夷賊乃歸生也不知為公子宋也左氏有先經後經外經附見之例作意與經出入盾若非弑何以有下宫之難歸生若非弑何以有斲棺之事野編赤狄侵齊秋公如齊公至自齊冬楚子伐鄭争中國耳非討罪地孔義五年春公如齊夏公至自齊齊恵立十年公五如齊何縁有止公事久于齊樂而忘歸也野編秋九月齊髙固来迎叔姬公榖叔上有子字公如齊髙固使齊侯止公請叔姬秋来逆焉曰来者公自為主也諸侯嫁女于大夫主大夫以與之為體敵也而公自為之主卑朝廷辱宗廟矣孔義叔孫得臣卒荘叔冬齊髙固及子叔姬来反馬不躬至歸寜無並行家鉉翁楚人伐鄭六年春晉趙盾衛孫免侵陳曷為侵陳為救鄭也所得惟衛無復棐林之盛矣野編陳即楚故也晉楚争陳自此始矣孔義夏四月秋八月螽冬十月七年春衛侯使孫良夫来盟通我于晉以有黑壤之會然我終事齊不事晉野編夏公會齊侯伐莱秋公至自伐莱平莒及郯公所欲也故書及繼以取向即所欲者可知矣伐莱齊志也故書會繼以伐莱即師行之危亦可知矣胡傳大旱冬公會晉侯宋公衛侯鄭伯曹伯于黑壤魯地即黄父會而不盟者有矣夫未必公見止也野編經翌在㑹六侯而以簒弑得國者居其四魯以仲遂殺惡而宣立晉以趙盾弑夷臯而成立宋以甸徒弑杵臼而文立鄭以歸生弑夷而襄立何以薦信于神明哉八年春公至自會逾年而至其故可知矣自是遂不敢如晉孔義夏六月公子遂如齊至黄乃復齊地疾而復非禮也大夫以君命出聞喪徐行而不返未致事而死以尸將事孔義辛已有事于大廟仲遂卒于垂壬午猶繹萬入去籥垂齊地襄仲不書公子遂如齊至黄乃復不知仲之卒于外也有事于大廟仲遂卒于垂倒句也既不廢祭亦不廢繹野編戊子夫人嬴氏薨嬴公穀作熊宣公母敬嬴一成風也野編晉師白狄伐秦白狄始見經侵崇之曲在晉至此七年而未已復㑹狄而伐秦不書及偶晉于狄也晉成秦桓之交兵又始于此孔義晉以狄伐秦秦亦以狄伐晉野編楚人滅舒蓼公作鄝舒蓼猶舒庸也羣舒之一也野編秋七月甲子日有食之既推厯當為十月甲子朔闕朔字冬十月己丑𦵏我小君敬嬴公穀作頃熊襄仲死于道路後八日而敬嬴亦死與哀姜慶父先後即誅相類孔義雨不克𦵏庚寅日中而克𦵏即事書之左氏以為禮穀梁以為非禮榖梁之言曰𦵏既有日不為雨止禮也雨不克𦵏喪不以制也謂不為雨備也然亦有非常之變不可以備者如之何唐吕才曰春秋己丑𦵏敬嬴雨不克葬庚寅日中而克𦵏是不擇日也左義優矣時當事者季文子孟獻子也野編熊氏過曰士喪禮潦車載蓑笠庻人縣窆不封不樹不為雨止則大夫以上塟為雨止矣然則禮葬不為雨止送塟不辟塗潦固為庻人言耳辨義城平陽懼晉故也補程傳楚師伐陳九年春王正月公如齊公至自齊夏仲孫蔑如京師孟獻子宣公享國九年于周纔一往聘其在齊則又再朝矣補程傳齊侯伐莱秋取根牟東方夷國邾婁之邑也公羊八月滕子卒昭公卒文公立九月晉侯宋公衛侯鄭伯曹伯㑹于扈鄭地晉荀林父帥師伐陳討不睦也陳侯不會荀林父以諸侯之師伐陳不書諸侯之師而曰林父帥師者在㑹諸侯皆以師聽命而林父兼将之也晉主夏盟又嘗救陳所宜與也而惟楚之即夫豈義乎胡傳辛酉晉侯黒臀卒于扈成公卒子景公獳立伐陳討其不㑹宜有諸侯之師晉侯卒而還故略之也冬十月癸酉衛侯鄭卒成公卒子穆公速立衛成公自復國以来抑狄事晉自伐沈之後諸侯之事無役不從國内以安皆用寗俞之效也孔義衛成事晉甚謹魯宣獨深向齊及黑壤止公扈之會魯獨不往二國以喪赴亦皆不會以私怨而廢禮忘親矣晉成公何以不𦵏魯不㑹也衛成公何以不𦵏魯不㑹也所謂無其事而闕其文也胡𫝊宋人圍滕楚子伐鄭楚荘之立加兵于鄭者凡四而兩書楚子書楚子者君為将也書楚大夫者大夫為将也日抄晉郤缺帥師救鄭自是晉楚交伐鄭陳殺其大夫􅂥冶公穀作泄冶􅂥冶諫而死明年五月平國弑殺諌臣之效也孰謂春秋不褒􅂥冶野編十年春公如齊公至自齊齊人歸我濟西田夏四月丙辰日有食之已已齊侯元卒恵公卒子頃公立齊崔氏出奔衛崔氏者以族奔也崔氏出而能反反而能弑者以其宗强于此舉氏辨之早也自此至崔杼弑荘公凡五十一年必非杼也孔義三桓七穆自中葉出也獨崔氏出齊丁公故族莫大于崔氏野編公如齊公如齊止此五月公至自齊公親奔喪非禮也孔義癸巳陳夏徵舒弑其君平國靈公弑子成公立六月宋師伐滕滕自宋人執嬰齊之後遂為宋私屬故宋之盟叔孫豹曰滕宋私也成周之城仲畿曰滕宋役也今不事宋故屢虐之孔義公孫歸父如齊𦵏齊恵公親往奔喪貴卿㑹𦵏事齊謹矣歸父仲遂之子其後為子家氏孔義晉人宋人衛人曹人伐鄭鄭及楚平諸侯之師伐鄭取成而還補程傳秋天王使王季子来聘王聘止此王季子即劉康公宣公享國十年不朝周而比年如齊不奔王喪而奔齊喪微者㑹匡王𦵏而歸父㑹齊侯𦵏而王季子来聘自是王聘益輕春秋不復録矣孔義本任氏戴氏公孫歸父帥師伐邾取繹公作蘱大水六年螽七年大旱今復大水矣孔義季孫行父如齊冬公孫歸父如齊宣公聘齊止此行父聘齊歸父何必繼往盖取繹之謀成于歸父恐齊罪之自往解釋耳補程傳齊侯使國佐来聘國武子饑楚子伐鄭十有一年春王正月夏楚子陳侯鄭伯盟于辰陵榖作夷陵陳地于是辰陵之盟楚子主之矣野編公孫歸父會齊人伐莒伐邾伐莒皆以歸父將兵會齊會楚皆以歸父特㑹以見宣公之徳仲遂而寵其子也孔義秋晉侯會狄于欑函狄地于是齊方有事于莒晉方有事于狄莫與楚争也野編冬十月楚人殺陳夏徴舒丁亥楚子入陳納公孫寜儀行父于陳寜公作寗楚入中國書爵始此楚人殺陳夏徵舒已書于前則楚子入陳為納二子而已少西氏之討乃非本情惟春秋别之諸儒猶墮雲霧也野編􅂥冶入諫公請改過不罪言者公孫寜儀行父請殺之公弗禁是殺冶者二嬖也楚既復陳不誅而反納之左氏不咎楚荘之縱惡而美二子之補過将欲庇淫人而與石碏季友等也其可乎𫝊斷世稱楚荘五伯之一夫一相處内二伯處外古之道也伯不尊王何名為伯是役也若能封􅂥冶之墓問株林之從尸南冠衵服之大夫獻捷京師豈非桓文之舉哉惜其入陳之後圍鄭滅蕭敗晉伐宋七八年間諸夏騷動健者為清丘之盟以自保孱者至為宋之㑹脅息奔命是伯所懲也而譽荘以敵桓文譽子文子反以敵管隰狐趙恐齊晉君臣正當割席分坐且彼己為王即諸儒致伯彼亦不受也凡言五伯必曰齊桓晉文明乎伯在齊晉何與秦楚野編十有二年春𦵏陳靈公二十二月而𦵏討此賊者非臣子也何以書𦵏楚已討之矣臣子雖欲討之而無所討也公羊傳楚子圍鄭鄭既受盟于辰陵又徼事晉故楚子圍之按左氏楚子縣陳盖滅之矣而止書入其于鄭也入自皇門至於逵道盖即其國都矣經止書圍一則以聽申叔時之言而反之一則以鄭伯肉袒之逆而遽許之平與其悔過也孔義夏六月乙卯晉荀林父帥師及楚子戰于邲晉師敗績鄭地救鄭不書無及于鄭也以晉主自戰而罪歸林父者林父身為元帥不能治先縠違命濟師之罪乃妄従韓厥分惡之言楚師既乗又不能力戰鼓于軍中以先退為賞邲之敗實林父之所為也孔義秋七月冬十有二月戊寅楚子滅蕭楚荘滅蕭所以逼宋而不能有其地觀定十一年辰佗彄地入蕭以叛猶為宋地可知矣晉人宋人衛人曹人同盟于清丘衛地大夫同盟之始諸侯懼而盟野編原縠違命喪師而主是盟人之宜矣孔義宋師伐陳衛人救陳穀梁每救稱善清丘在彼亦不能謂救陳善也野編十有三年春齊師伐莒公作伐衛夏楚子伐宋陳鄭既皆歸楚得宋則可圖天下矣至又明年之平而南北之勢成矣孔義秋螽冬晉殺其大夫先縠穀作穀討邲之敗也盡滅其族不已甚乎十有四年春衛殺其大夫孔達討救陳也衛成公與陳共公有舊好孔達但知先君有約言而不知同盟外楚之不可以貳如此而死則匹夫耳傳斷夏五月壬申曹伯夀卒子宣公廬立晉侯伐鄭何以目晉侯存中國也敗餘猶伐鄭也野編秋九月楚子圍宋輕舉陳師以見伐今復輕殺其使以見圍宋之㡬亡自取之也孔義𦵏曹文公冬公孫歸父㑹齊侯于榖魯近宋豈以楚師圍宋而謀之乎十有五年春公孫歸父會楚子于宋吾大夫始會楚棄宋已矣又會楚于宋野編夏五月宋人及楚人平清丘之盟宋猶能伐陳以伉楚而平于楚而莫之救則無望矣野編楚人圍宋九月于此宋之憊至易子而食析骸而爨而晉聽伯宗之言不出一師待其威單力盡徐自解罷書曰宋人及楚人平傷中國之失道也外平不書闗于天下之故而書楚人得宋天下将有南北之勢春秋特致意焉孔義楚之将圍宋也使申舟聘于齊亦使公子馮聘于晉則齊晉之不出而禦楚非不能禦也盖貪其厚幣惑其甘言自以為無患而魯謀不省宋難不救不知魯宋即楚楚且弱齊并弱晉矣伯宗賢者亦曰天方授楚未可與争所謂未識人倫焉知天道者乎畧記六月癸卯晉師滅赤狄潞氏以潞子嬰兒歸潞子與晉婚姻其相酆舒弑君夫人傷君目而不能討則潞之當討者酆舒耳執其君滅其國何為乎潞之㨗不足以掩邲之敗野編秦人伐晉報八年晉與白狄伐秦之役也補程傳王札子殺召伯毛伯王札子者天子之庻兄也一朝殺二大夫札子之擅殺可知矣王政之不行又可知矣秋螽仲孫蔑㑹齊髙固于無婁杞地公作牟婁必謀晉楚之故也于是往斷道之盟矣孔義黄正憲曰魯之服齊齊雖不振魯未敢背故欲使歸父㑹楚子則先為殽之㑹今意欲從晉則先使其卿與髙固會皆觀其强弱以為行止耳孔義禮之始失也諸侯非王事而自相㑹不自天子出矣無何諸侯與大夫㑹無何大夫與大夫㑹又不自諸侯出矣田氏簒齊三桓専魯六卿分晉職此之由郝解初税畝税畝者税其私田履畝十取其一也其公田仍在非廢助用税也孔義冬蝝生始生曰蝝既大曰螽秋螽未息冬又生子也孔義饑春秋饑三而宣公有其二孔義十有六年春王正月晉人滅赤狄甲氏及留吁帥師者士㑹畏遜强楚威加赤狄謂諸侯何孔義夏成周宣榭火榭公作謝火公榖作災宣王中興常講武于東都于是有榭焉後王思其功因以為宫而祀之樂器蔵焉亦固其所然非制廟也故不曰宫而曰榭云簡端録秋郯伯姬来歸出也冬大有年宣公六年螽七年旱十年水十三年螽十五年螽連年凶荒今忽大有年聖人云胡不為之喜日抄有年則有之大有年則大有之聖人何心哉以為紀異者天下後世之論也邵寳十有七年春王正月庚子許男錫我卒昭公卒靈公立丁未蔡侯申卒文公卒子景公固立夏𦵏許昭公𦵏蔡文公六月癸卯日有食之按是年六月無癸卯其食限亦不在六月推厯當為五月乙亥朔入食限從亥子初日四千一百定亥度陽厯十度依法變不食亦傳寫之誤也統紀己未公會晉侯衛侯曹伯邾子同盟于斷道晉地時宋為楚得中國危甚幸而衛復反為中國恐曹衛復背而南嚮故晉侯為是盟以固魯衛曹邾之心書曰同盟齊貳也康侯因郤克之見笑以此㑹為謀齊不思徵會乃在未見笑之先豈預知其見笑故為之㑹以謀之耶日抄秋公至自會冬十有一月壬午公弟叔肹卒其曰公弟叔肹賢之也宣弑而非之也非之則曷為不去也曰兄弟也何去而之與之財則曰我足矣織屨而食終身不食宣公之食穀梁傳稱弟不稱字則如弟年之例而不見其賢稱字不稱弟則又季友之比而不昭其貴故書弟書字以褒之也探㣲十有八年春晉侯衛世子臧伐齊此則以不與斷道之盟故也齊自恃伯國未嘗服晉文公之伯嘗懼而從之晉越四世齊未嘗從也孔義公伐杞自是内不書君將征伐在大夫也宣公而下征伐在大夫是故自伐邾取繹凡取皆不書其人自伐杞凡伐皆不書公杞世婚于魯僖文之世各一来朝宣公殺惡及視而杞不来故伐之孔義夏四月秋七月邾人戕鄫子于鄫穀作繒凡自虐其君曰弑自外曰戕于鄫刺其臣子不能救君難也左以邾之小而肆毒于鄫曾無一人詆訶之信乎其為春秋之世也木訥齊桓薨而中國無伯則邾文公用鄫子晉景弱而中國無伯則邾定公戕鄫子兩鄫子之不得其死其伯國之恥乎張洽甲戌楚子旅卒旅公作吕楚始書卒莊卒共審立吳楚之君不書𦵏辟其號也公羊公孫歸父如晉子家魯謹事齊斷道之盟始改事晉故始聘晉左氏謂歸父謀之于公欲以晉人去三桓則何以不謀于素厚之齊而遽請于新交之晉及為行父所逐又何以不奔請去三桓之晉而又奔齊耶恐不然孔義冬十月壬戌公薨于路寢歸父還自晉至笙遂奔齊笙公穀作檉笙魯地歸父奔齊則以父素謹事齊也歸父逐而三家之張甚矣孔義東門氏世與諸儒結死後之縁仲遂圽于路恨恩禮之未至歸父被遣走之齊謂之奔者捐殯奔其父謂奔者為墠帷反命為不失禮縂不過曰還自晉善辭也云爾不書歸父還自晉若為書之文子大似成季慶父歸父禽制畧同雖然其于斲削公室兹四人者皆斤斧也野編春秋平義卷七
