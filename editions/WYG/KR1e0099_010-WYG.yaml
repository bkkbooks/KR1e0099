body:
  text: 春秋平義卷十秀水俞汝言撰昭公名稠襄公之子母齊歸夫人孟子在位二十五年在外七年凡三十二年諡法威儀恭明曰昭元年春王正月公即位叔孫豹會晉趙武楚公子圍齊國弱宋向戌衛齊惡陳公子招蔡公孫歸生鄭罕虎許人曹人于虢鄭地弱公作酌齊惡作石惡罕作軒虢作漷穀作郭此會乃楚公子圍帥諸侯之大夫尋宋之盟也經先趙武所以抑楚而存中國也宋之盟齊人不盟今齊又從楚矣中國㣲弱可知也髙氏集註三月取鄆公作運此伐莒取鄆也言伐莒疑于討莒亂直取鄆爾野編夏秦伯之弟鍼出奔晉六月丁巳邾子華卒悼公卒莊公穿立夏荀吳帥師敗狄于大鹵公作太原晉地此戰也毁車崇卒變古戰法之始孔義秋莒去疾自齊入于莒去疾是為著丘公前言齊無知弑其君後言小白入于齊前言莒人弑其君後言去疾入于莒則不與弑之詞也前言衛侯入于夷儀後言衛寗喜弑其君前言齊陽生入于齊後言齊陳乞弑其君與弑之詞也故曰屬辭比事春秋教也陳氏後傳莒展輿出奔吳公穀無輿字叔弓帥師疆鄆田疆者正其界用師者備莒因莒亂也孔義塟邾悼公未四月而塟冬十有一月己酉楚子麇卒楚公子比出奔晉麇公穀作卷郟敖卒靈立或曰以申之會為中國諱也則弑賊不討如成宋亂宋灾故聖人皆明著其罪而又何以諱為也竊以列國冊書皆承其赴謂聖人因魯史舊文其說為長不必更鑿也孔義書之為十三年乾谿之事起也補程傳公子圍為麇之叔父而專楚國之政不臣之跡彰彰在人耳目故推其疑而以為弑君是實非弑也經亦書其實耳然則比何以出奔葢麇之死圍因廢其子而自立比長次圍既不能制又恐見忌故出奔也畧記郝敬曰讀春秋而後知聖人不得已也亂臣賊子滔天之惡必致慎致詳然後直之稍涉微曖則委蛇含容寧從其疑至諸傳所書非禮猥瑣之事一切不書誠不忍盡言伏讀而歎聖人天地之心博大寛仁之至也二年春晉侯使韓起來聘夏叔弓如晉秋鄭殺其大夫公孫黒冬公如晉至河乃復季孫宿如晉辭公而受季孫野編郭氏曰公如晉弔少姜之役晉以非伉儷辭在晉未為失禮見公之妄動自取屈辱也公既返遣宿將命以終其事亦禮之常公穀妄生意見非春秋之意按晉之拒公始于十三年此時初立固未有間之也畧記三年春王正月丁未滕子原卒原公作泉成公卒悼公寧立夏叔弓如滕五月塟滕成公滕始書塟卿共小國之塟過厚杜氏謂塟襄公滕子來會故魯厚報之補程傳秋小邾子來朝八月大雩冬大雨雹北燕伯款出奔齊簡公多嬖寵欲去諸大夫而立其寵人燕大夫比以殺公之外嬖公懼奔齊孔義四年春王正月大雨雹公穀作雪夏楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷會于申楚子專會諸侯始此楚地申之會晉之從諸侯齊魯曹衛皆弗與而淮夷與焉是夷之令也無與諸夏事也野編楚圍求諸侯於晉大國若齊秦次國如魯衛小國若曹邾皆不能致宋太子後至則東諸侯終未肯以事晉者事楚也雖其臣舉六王二公之事其君用齊桓而諸侯己知其不濟宋鄭大夫亦幸其不能為吾患也則雖侈然一時亦何能為哉屬辭楚人執徐子徐既世事楚而又服于吳徐子又吳出也故楚人執之孔義秋七月楚子蔡侯陳侯許男頓子胡子沈子淮夷伐吳楚圍之暴不北犯中原東伐吳其猶憶虢之會乎前後凡三伐跳躑之勢盡于東嚮莫善于鬬吳楚野編申之會楚不能致魯衛曹薛邾杞至伐吳則中國諸侯皆去惟屬楚者從亦可以觀人心矣孔義黄正憲曰楚之與抗者晉所畏者惟吳今晉既已通好則思為拒吳之計而拒吳之計先于絶中國之通吳者淮夷居魯之間淮夷合則中國通吳之道絶宋鄭諸國合則楚入中國之路通辨義王氏曰東遷之後天子受制于諸侯文公之後諸侯受制于大夫申之會中國後天子制于楚人故序楚子于諸侯之上通説執齊慶封殺之慶封以襄二十八年奔魯齊讓而又奔吳吳與朱方居之不曰楚執不與楚以討齊慶封也猶曰諸侯執之焉耳孔義亦義殺也何以不曰殺齊慶封如殺陳夏徵舒例曰夫使官為討捕是殺賊也以賊殺賊則相殺而已矣野編遂滅賴弃疾城賴也野編賴葢依違吳楚之間者也孔義黄震曰晉主夏盟所以抗楚也楚日以強而晉通吳于會正結之以抗楚也自宋向戍謀弭兵合晉楚之成宋之盟楚已先晉虢之盟楚用舊書至今申之會晉遂不敢復出而盡遜之楚矣皆宋之盟啟之也楚昔之所仇者在晉今晉既遜之為盟主則所求者吳耳故一出而執徐子者以徐為吳之出也伐吳而殺慶封以慶封吳所封也而又滅賴亦以示威于吳也春秋之有伯主正以楚之害中國今反遜楚為中國伯主此莫大之變也九月取鄫鄫葢至此始滅野編内凡云取者皆滅也襄六年經明書莒人滅鄫以是夷其社稷而廢其宗廟鄫之役固不可得而考必非附庸乎晉也或問冬十有二月乙卯叔孫豹卒穆子五年春王正月舎中軍此中分魯也于是舎三從二季孫有其一孟氏叔氏有其一以二當一明季之富也始貢于公民莫在公而乾侯事起矣野編名雖舎實增之也戴溪舎中軍毁三而為四也不曰作四軍而曰舎中軍葢中軍既舍則勢不得不二不得不二則不得不四以今之舎叅昔之作季孫之罪著矣簡端録四分公室季氏擇二仲孫叔孫各一而叔氏無與焉時魯卿之有軍者意如也與世叔要結也彼叔氏之父安得一軍而並之哉或問楚殺其大夫屈申以為二於吳也孔義公如晉昭公如晉者七見止者一及河五惟此年善往返而以莒人之訴幾不免辱孔義夏莒牟夷以牟婁及防兹來奔牟夷莒大夫以地叛雖賤而書名重地也牟婁本紀邑隠四年為莒所取防兹莒二邑名襄二十一年公如晉季氏納邾庶其今公如晉季氏又納牟夷庻其牟夷邾莒之盜季孫宿魯之盜也以盜納盜又何怪焉孔義秋七月公至自晉戊辰叔弓帥師敗莒師于蚡泉蚡公作濆穀作賁魯地秦伯卒景公卒子哀公立冬楚子蔡侯陳侯許男頓子沈子徐人越人伐吳越始見經吳楚徐越夷也蔡陳許頓沈變于夷者也夷自相伐無與諸夏事也故子楚而人徐越所惡于夷者為滑夏也野編自合晉楚之成諸侯不為晉伐楚而嘗為楚伐吳未見兵之可弭徒為夷狄役耳日抄陳氏後傳通吳以制楚者晉謀之失也通越以制吳者楚謀之失也孔義此為楚通越制吳之始六年春王正月杞伯益姑卒文公卒平公立塟秦景公秦始書塟秦入春秋至此始書塟日抄夏季孫宿如晉納牟夷叛邑自結于伯國而免討也孔義塟杞文公宋華合比出奔衛宋公以伊戾而殺世子痤以柳而逐合比父子君臣皆刑人敗之可畏也夫孔義秋九月大雩楚薳罷帥師伐吳楚䖍三伐吳而終不得志孔義冬叔弓如楚四年公不會申將朝楚故以叔弓先之也孔義齊侯伐北燕將納簡公也受賂而還故止書伐孔義七年春王正月暨齊平燕暨齊平也野編齊將以正燕而納女及賂反求平焉書曰暨齊平所以病齊也齊魯未嘗不平而何為平乎蘓氏魯暨齊平也襄二十四年我侵齊二十五年齊伐我齊魯之好遂絶是時齊將納燕伯恐魯之議其後也左傳暨齊平齊求之也暨齊平正文及齊平及鄭平相似而下文又有叔孫婼如齊盟正與叔還盟之事相類且左氏謂齊求之也正解齊魯之平癸巳以下方終齊燕之事辨義三月公如楚叔孫婼如齊涖盟婼公作舎夏四月甲辰朔日有食之秋八月戊辰衞侯惡卒襄公卒子靈公元立九月公至自楚自如楚七越月矣孔義冬十有一月癸未季孫宿卒武子子悼子不見經十有二月癸亥𦵏衞襄公八年春陳侯之弟招殺陳世子偃師夏四月辛丑陳侯溺卒哀公卒是年楚滅陳十三年復封陳惠公吴立陳侯于留有欲立之意于偃師無欲殺之心招逆其邪志而成之陳侯葢不勝其大恚也孔義叔弓如晉賀虒祁也楚成章華之臺則朝之晉成虒祁之臺則朝之公自此亦有臺沼之樂矣郎囿所自築也畧記楚人執陳行人干徵師殺之陳公子畱出奔鄭偃師曰世子畱曰公子别嫡庶也高閌秋蒐于紅書蒐始此蒐狩不書違禮必書桓莊之狩必言公昭定之蒐不言公事在三家師乗非復公有矣孔義桓莊之時皆稱公者公志也昭定之時不書公者非公志也論其書法不無㣲意耳若畧而不書是則刻求之過也或問陳人殺其大夫公子過殺世子二人同事也招歸罪于過而殺之孔義大雩冬十月壬午楚師滅陳執陳公子招放之于越殺陳孔奐公作瑗殺陳世子偃師者招也陳侯之弟也欲易世子立公子留者陳侯溺也過也奐也從之者也干徵師行人而已家禍移之國招實為之而獨生乎刑之失平楚靈之為固無足道也野編塟陳哀公黎氏曰與莊公四年齊侯𦵏紀伯姬同辨義九年春叔弓會楚子于陳每楚入犯我輙往會之野編許遷于夷楚遷之也夷一名城父本陳地滅陳故遷許于此孔義夏四月陳灾公穀作火閔陳而存之也塟陳哀公亦當爾耳野編秋仲孫貜如齊自叔老聘齊至此二十年杜註冬築郎囿十年春王正月夏齊欒施來奔子雅之子齊欒施高疆皆嗜酒而惡陳氏鮑氏陳鮑及其醉而攻之不勝遂來奔高疆不書非卿也蘇氏秋七月季孫意如叔弓仲孫貜帥師伐莒武子孫平子戊子晉侯彪卒平公卒子昭公夷立九月叔孫婼如晉塟晉平公婼公作舎三月而塟十有二月甲子宋公成卒成公作戍平公卒子元公佐立無冬闕文杜預十有一年春王二月叔弓如宋塟宋平公二月公作正月三月而塟夏四月丁巳楚子䖍誘蔡侯般殺之于申楚公子棄疾圍蔡䖍穀或作乾楚子䖍何以書不信也不信以幸雖得千乘之國不為也雖討捕弑父賊寧佚賊也野編以棄疾圍蔡繼之楚䖍誘般之下見楚欲滅蔡非討賊耳孔義五月甲申夫人歸氏薨昭公母敬歸之娣襄公妾也大蒐于比蒲魯地䘮不廢蒐非禮仲孫貜會邾子盟于祲祥公作侵羊高氏曰始也盟蔑盟趡皆魯君也自是皆大夫與盟矣孔義秋季孫意如會晉韓起齊國弱宋華亥衞北宫佗鄭罕虎曹人杞人于厥憖意公作隱厥憖公作屈銀謀救蔡也晉人使狐父請蔡于楚弗許而止此韓起之罪也孔義會于厥憖天下同患楚矣野編九月己亥塟我小君齊歸冬十有一月丁酉楚師滅蔡執蔡世子有以歸用之有穀作友父為人誘殺應無降理子死于父可以為子矣故曰世子有也野編春秋書滅國未有如此其暴者書誘書殺書圍書執書用聖人傷中國之㣲而戎狄之暴也孔義十有二年春齊高偃帥師納北燕伯于陽燕地款播越在外十年矣藉齊之力僅能納于别邑葢為強臣所拒也不名者諸侯失國諸侯納之正也不以高偃挈燕伯也孔義三月壬申鄭伯嘉卒簡公卒子定公寧立夏宋公使華定來聘公如晉至河乃復季孫氏使不得遂乎晉也穀梁五月塟鄭簡公三月而塟楚殺其大夫成熊公作然穀作虎秋七月冬十月公子憖出奔齊憖公作整憖何以出南蒯請以費為公臣以憖更季孫事泄而出也野編此則季氏之仇而魯忠臣矣權衡楚子伐徐楚雖執徐子而徐終不服楚徐雖同楚伐吳而吳終厚徐僖公以來勢重在楚徐不能舎楚而事齊昭公以來勢重在吳徐不能舎吳而事楚也列國論晉伐鮮虞曰晉狄之也曷為狄晉陳蔡方亂晉師不出已矣而惟狄之求是狄而已矣野編屬辭文十年秦伐晉成三年鄭伐許楚合諸侯于申伐吳滅陳誘蔡侯般殺之滅蔡而晉人方以詐滅肥伐鮮虞甘心于羣狄故伐鮮虞稱國責其棄中國于楚非復諸侯之盟主也葢狄秦則諸侯之從楚者絶意于中國矣狄鄭則諸侯之反覆乎晉楚之間者不足賴矣至于狄晉則天下諸侯皆楚之從而晉之為盟主也末矣此春秋所以治在夷狄也以為逺者有不可得而詳也事之小者亦然皆非所以為褒貶輕重也以晉伐鮮虞而書之則荀吳帥師伐鮮虞何以不救之也或問居仁曰夫事有大小則地有詳畧晉伐鮮虞其事則闗乎天下故書晉畧辭也書楚書吳皆畧之之辭爾十有三年春叔弓帥師圍費家臣以邑叛不書叛書大夫圍則邑叛可知矣克之不書非他國邑也孔義夏四月楚公子比自晉歸于楚弑其君䖍于乾谿穀作溪楚地比入楚而䖍在乾谿以䖍由比死原起書弑然比若為稱公子明乎未君也嗚呼己受天下惡名而人收其利見利而動者亦知懼哉野編弑䖍繇衆亂而所恃為主者棄疾也何以歸獄于比曰比已立也䖍兄也比弟也䖍君楚國比自外歸為君而䖍死不曰弑可乎孔義楚公子棄疾殺公子比殺公作弑䖍之縊非比令也而比實逼之故曰比弑比之自殺非棄疾令也而棄疾惴之故曰棄疾殺䖍君也比臣也下殺上曰弑比棄疾皆公子兩下相殺曰殺簡端錄秋公會劉子晉侯齊侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于平丘八月甲戌同盟于平丘晉自城杞之役于今十六年不得齊自雞澤之盟于今四十二年不勤王是盟也晉昭公欲修文襄之業納諸侯以承天王且服齊也鄭樵止齋曰晉之合諸侯止此公不與盟黒壤之曲全在魯故諱而不書沙隨平丘之曲雖在晉然沙隨以僑如之譛魯實無罪平丘以邾莒之訴魯亦不能無責故不見公與公不與亦小不同也李氏晉人執季孫意如以歸公至自會蔡侯廬歸于蔡陳侯吳歸于陳廬隠太子有之子吴悼太子之子厥憖之會為楚䖍所厭平丘盛矣會者十有三國革車四千乗天子之老元戎十乗受邾莒之訴治魯君臣大邦畏其力小邦懐其徳方城之外若蔡若陳棄疾因之以敝䖍安知晉不因之以敝楚固能使楚封而復之非楚歸兩侯平丘之功也抑亦可以為伯矣蔡侯廬歸于蔡陳侯吳歸于陳此之謂序績野編陳蔡之復雖楚復之實晉之力晉乗楚亂而合諸侯于平丘故懼而復陳蔡陳蔡之廟復血食者晉也木訥冬十月塟蔡靈公蔡滅五年今廬復國故靈公始得塟日抄公如晉至河乃復吳滅州來楚邑間楚之亂也野編十有四年春意如至自晉三月曹伯滕卒武公卒子平公頃立夏四月秋塟曹武公八月莒子去疾卒著丘公卒子郊公立是年奔齊著丘公之弟庚輿立是為共公春秋于莒卒惟此一書孔義冬莒殺其公子意恢十有五年春王正月吳子夷末卒末公作昧子僚立二月癸酉有事于武宫籥入叔弓卒去樂卒事夏蔡朝吳出奔鄭朝公作昭無出字朝吳為蔡忠臣楚之䜛人費無極害其寵也孔義六月丁巳朔日有食之推厯當為五月丁巳朔秋晉荀吳帥師伐鮮虞冬公如晉平丘之會故也孔義十有六年春齊侯伐徐晉伯既衰齊侯始欲争伯徐楚之與國也孔義楚欲閉吳而徐通之則楚師集于徐齊欲通吳而楚執徐以斷之則齊師亦集于徐吳與中國非徐莫往來也久而滅徐勢所必然列國論楚子誘戎蠻子殺之蠻公作曼戎蠻子嘉楚子之誘一也或名或不名何也夷狄相殘畧之也孔義夏公至自晉踰三時而始返諱不書止公考其時則事著矣孔義秋八月己亥晉侯夷卒昭公卒子頃公去疾立平丘一會足以殿伯功也五伯備矣野編九月大雩季孫意如如晉冬十月塟晉昭公三月而塟速十有七年春小邾子來朝夏六月甲戌朔日有食之推厯當為九月甲戌朔秋邾子來朝自襄七年朝魯于是復至孔義八月晉荀吳帥師滅陸渾之戎陸公作賁公穀無之字以其睦于楚也自是凡滅稱大夫矣滅不書大夫者吳也孔義按用師郊圻之側使警戎備不虞震驚王室乎晉之不恭孰大于是冬有星孛于大辰大辰心也心為天王前星太子後星庶子後五年景王崩劉單立王猛為東王尹召立子朝為西王野編楚人及吳戰于長岸楚邑吳屢受楚兵襄二十五年吳雖伐楚門于巢卒兵亦未必至楚也至是始入楚境自後楚日削吴日張矣木訥十有八年春王三月曹伯須卒平公卒子悼公午立夏五月壬午宋衞陳鄭灾灾而加異四國同日野編六月邾人入鄅鄅妘姓小國秋塟曹平公冬許遷于白羽自葉遷也楚遷之而以自遷為文者許畏鄭而樂遷也孔義十有九年春宋公伐邾為鄅故伐之元公舉事近正野編鄅夫人宋向戌之女也孔義五月戊辰許世子止弑其君買親有疾召醫而弗擇進藥而弗甞也謂之不孝况自為之藥乎飲止藥而死是死于藥也非止而誰雖然止悔而奔以死非不孝子也而不知重其親不知重其親無父之漸于是乎在故春秋謹之簡端録己卯地震經書地震者五昭公之世再見孔義秋齊高發帥師伐莒時郊公在齊庚輿不事齊故也孔義冬塟許悼公弑而塟者尚多有之未必赦止野編二十年春王正月夏曹公孫會自出奔宋穀作夣曹邑會子臧之子也公羊公孫也自其邑出也野編秋盜殺衞侯之兄縶公穀作輙公孟以衞侯之母兄而盜得殺之無政刑矣孔義責在衞而不在盜則盜不必名左氏謂求名而不得未聞殺人犯上以求名者木訥以周事子而歸死于公孟此宗魯所欲求之名也而卒以盜稱故曰求名不得邵寶冬十月宋華亥向寧華定出奔陳寧公作寗宋惟有華向爾安得有公今何以偕出也攷之宋元公為魯如晉卒于曲棘葢憤強臣而強主威者三卿連彚可謂衆矣然主權禾移不可為衆也天下諸侯有如是君者死亡之憂吾知免矣景如是君陳氏何以有齊頃如是君趙氏何以有晉傳謂元公無信而多私厚誣賢者野編君子違不適讐國陳宋之讐也三大夫往奔是欲依陳以為亂也私考十有一月辛卯蔡侯廬卒左作盧平公卒子朱立二十有一年春王三月塟蔡平公夏晉侯使士鞅來聘書聘止此宋華亥向寧華定自陳入于宋南里以叛公作畔凡叛有入于戚蕭晉陳朝歌者皆不繋之國其所食私邑也若南里則宋國城内里名故繫之宋亦見叛臣逼脅其君之甚也胡傳秋七月壬午朔日有食之八月乙亥叔輒卒輒公作痤叔弓子冬蔡侯朱出奔楚朱穀作東悼公東國立費無極令蔡人逐之也孔義公如晉至河乃復二十有二年春齊侯伐莒自是莒服于齊矣孔義宋華亥向寧華定自宋南里出奔楚三叛入犯國門出適仇國天下之大惡也傳曰宋公惡華向即如傳言宋公知所惡矣野編大蒐于昌間公作安夏四月乙丑天王崩景王崩子王猛立六月叔鞅如京師塟景王如京師止此以天王三月而塟矣孔義王室亂此特書也太子壽之殂也母弟二人猛也匄也匄經書天王即敬王也庶長有寵者一人王子朝也王崩子朝争立京師大亂非京師亂王室亂也春秋正本之書也野編戴溪曰自入春秋以來周室葢三亂矣其禍皆生于父子兄弟嫡庶不明惠王寵子帶幾危世子齊威盟世子于首止而位定襄王復寵帶出居于鄭晉文公納王王室遂定向㣲二伯周室之亂豈减敬之時然則春秋書王室亂者憫周室之㣲弱嘆威文之不復有也劉子單子以王猛居于皇秋劉子單子以王猛入于王城以者何能左右之也猛在是矣夫二子者或左之或右之也王矣曷又名之以别子朝也野編冬十月王子猛卒是為悼王弟敬王立胡旦曰王子猛者仲尼之變文也若獨書子則為魯公在䘮之文若稱王子則是周王庶子之號若言子猛乃同子般之名若獨書王則是二王之事不言王猛又與子朝無别故書王子猛上言王則著周王之號下言猛乃當繼位之文非王無以定君位非猛無以明嗣君通説昭之二十有二年景之崩年也猛無所繫之故曰王子猛卒野編十有二月癸酉朔日有食之二十有三年春王正月叔孫婼如晉婼公作舎癸丑叔鞅卒晉人執我行人叔孫婼公穀作舎武城人取邾師愬于晉晉人來討叔孫婼如晉晉人執之書執我行人不以其罪也孔義晉人圍郊郊子朝邑也晉為方伯徒以㣲者帥偏師薄為之援書晉人圍郊而罪自見矣孔義夏六月蔡侯東國卒于楚悼公卒弟昭侯申立朱也東國也奔于楚卒于楚固是一人傳不足徵秋七月莒子庚輿來奔虐而國人逐之齊納郊公不書㣲之也孔義戊辰吳敗頓胡沈蔡陳許之師于鷄父楚地胡子髠沈子逞滅獲陳夏齧父榖作甫逞公作楹榖作盈夏齧徵舒𤣥孫吳伐州來楚帥諸侯之師救之六國先敗楚師遂奔故不書楚君死曰滅生得曰獲大夫生死皆曰獲此見吳之強而楚人益弱也孔義鷄父之役夷自相攻無與諸夏事也所惡于夷者為猾夏也野編天王居于狄泉尹氏立王子朝擁悼立敬者劉卷也不書苐書曰天王居于狄泉夫定䇿之功人臣所不敢居也居之乃為大罪子朝之立刺尹氏也野編八月乙未地震冬公如晉至河有疾乃復河下公榖有公字二十有四年春王二月丙戌仲孫貜卒孟僖子婼至自晉婼見執于晉以禮自持不為所屈及意如逐君而面責之意如有異志而自祈死其魯國之良矣孔義婼不言叔孫前見也吕氏夏五月乙未朔日有食之秋八月大雩丁酉杞伯郁釐卒郁公作鬰平公卒子悼公成立冬吳滅巢亡郢之始也野編吳將謀楚先滅其與國滅州來滅巢滅徐滅沈滅頓皆楚之與也木訥塟杞平公二十有五年春叔孫婼如宋夏叔詣會晉趙軮宋樂大心衞北宫喜鄭游吉曹人邾人滕人薛人小邾人于黄父詣公榖作倪晉地即黑壤大心公作世心謀王室也于是敬王立三年矣越在狄泉僴然西望曰伯父尚胥顧予而大夫實會猶曰明年將納王故黄父之會春秋無美辭也野編有鸜鵒來巢鸜又作鴝公作鸛魯故無鸜鵒野編鸜鵒不踰濟而至魯豈非氣自南而之北之騐哉當此之先楚雖為中國患而齊晉猶足以抑之自此之後晉伯不競吳楚越皆以南夷迭主夏盟諸侯事之則知鸜鵒來巢之異不特昭公出奔之兆而已張氏集註秋七月上辛大雩季辛又雩旱太甚矣野編九月己亥公孫于齊次于陽州己亥榖作乙亥陽公作楊昭公謀去季氏不克而棄國日抄奔也以為孫爾季孫意如出君矣或曰東門氏行大事衞之孫寗改立君季孫皆無之以自孫為文公自取也曰不然凡行大事者有所求也政自之出久矣又何求乎夫意如之情可知己齊楚淮夷其三窟也晉之從政者范鞅知躒亦皆與之既得其政又攝其祭者八年此工于竊國者也事之起也禘于襄公萬者二人其衆萬于季氏故臧孫郈孫奮其謀子言之矣是可忍也孰不可忍正指此事葢比之弑也野編齊侯唁公于野井齊地夫以千乗之君窮來歸我而虚辭慰藉又不于國都于野井其終也己不待子猶之貨也野編冬十月戊辰叔孫婼卒昭子昭公在外而特書日以卒表賢也孔義十有一月己亥宋公佐卒于曲棘宋地元公卒子景公頭曼立于鄵善鄭伯也于曲棘善宋公也則魯之故梁丘據曰宋元公為魯如晉卒于曲棘叔孫昭子求納其君無疾而死此雖巧言遂為魯事實録矣野編十有二月齊侯取鄆取之為己有以居公也故取繫于齊孔義二十有六年春王正月塟宋元公三月而塟三月公至自齊居于鄆夏公圍成此圍者齊師公安得有師而曰公圍成畧之也齊不足道也野編秋公會齊侯莒子邾子杞伯盟于鄟陵鄟陵之謀魯黄父之謀王室齊晉一道也野編叅盟自齊桓以來未之有也于是再見晉不復主盟也孔義公至自會居于鄆九月庚申楚子居卒平卒昭立冬十月天王入于成周尹氏召伯毛伯以王子朝奔楚五年而小定朝猶在也經書天王入于成周不言納之者也傳曰晉知躒趙鞅納王入于成周經書尹氏召伯毛伯以王子朝奔楚從亂有召伯也傳曰召伯盈逐王子朝逆王于尸傳如可信則經為疎矣是亂也實尹氏召毛與劉單為敵不勝而走晉楚皆未勤師也野編二十有七年春公如齊公至自齊居于鄆夏四月吳弑其君僚僚弑公子光立是為闔廬諸樊之子也吳子光弑僚而稱國何也僚越光而代札是自禍也故弑不書主名孔義傳載僚事大非人情是時僚數用兵國人怨之故弑僚而還國于光光之與聞乎弑則未可知也季札之賢不一問其死欲信浮說而還責以大逆聖人所不敢且存疑可也畧記楚殺其大夫郤宛郤公作郄秋晉士鞅宋樂祈犁衞北宫喜曹人邾人滕人會于扈外大夫自為會謀魯也鄟陵齊侯親在無若公何扈之諸大夫猶我大夫也豈有望哉野編冬十月曹伯午卒悼公卒子聲公野立邾快來奔邾叛臣也賤而書誅季氏也孔義公如齊公至自齊居于鄆二十有八年春王三月塟曹悼公六月而塟公如晉次于乾侯晉地于是違齊即晉矣野編夏四月丙戌鄭伯寧卒公作寗定公卒獻公蠆立六月塟鄭定公三月而塟秋七月癸巳滕子寧卒公作寗冬塟滕悼公二十有九年春公至自乾侯居于鄆齊侯使髙張來唁公公如晉次于乾侯夏四月庚子叔詣卒叔詣欲納公而卒補程傳秋七月冬十月鄆潰畏季而潰也公無歸矣野編三十年春王正月公在乾侯是晉之寓公也春秋曰我公也在乾侯也野編曰公在乾侯所以存公也蘇氏夏六月庚辰晉侯去疾卒頃公卒子定公午立秋八月塟晉頃公三月而塟亦大夫之簡其君也日抄冬十有二月吳滅徐徐子章羽奔楚羽公作禹三十有一年春王正月公在乾侯季孫意如會晉荀躒于適歴晉地其謂之會何為可以執之也晉嘗執季孫意如于平丘矣若執諸適歴豈不堂堂乎伯討哉野編夏四月丁巳薛伯榖卒獻公卒子襄公定立入春秋以來惟莊三十一年書薛伯及此始書名髙氏晉侯使荀躒唁公于乾侯躒公穀作櫟罪晉也陰交其臣陽唁其君孔義秋塟薛獻公亦始書塟集註冬黑肱以濫來奔肱公作弓邾黑肱也脫邾字野編邾快黑肱相繼來奔季孫當國以類至也孔義十有二月辛亥朔日有食之三十有二年春王正月公在乾侯取闞葢鄆潰季孫以闞輸公取之而弗居也野編闞魯羣公墓所在公不得奉宗廟祭祀而先君墳墓所在特以取書著賊臣據國拒君之罪也孔義夏吳伐越吳越搆兵始此野編秋七月冬仲孫何忌會晉韓不信齊髙張宋仲幾衞世叔申鄭國參曹人莒人薛人杞人小邾人城成周世叔穀作太叔公莒人下有邾婁人穀有邾人世叔申世叔儀之孫國參子産之子偹子朝之黨也守不在四夷在王都矣野編諸侯不勤王事久矣今猶能從王命以安王室衰世善事也孔義張漙曰惠王寵子帶齊桓公盟首止不煩言而世子位定襄王出居于鄭晉文公納之踰年而王室安敬王之亂數年始靖時無伯也然晉頃會黄父晉定城成周二君猶能知義君子姑進之矣十有二月己未公薨于乾侯孫于陽州薨于乾侯中間所書皆誅意如也野編意如之逐昭公也狡矣始而公伐之也陽為不敵請盟請亡以緩公而待兩家之援公既出矣請改事君稽首叔孫偽求復公公之奔齊晉也則賂齊晉公之在外也則車馬遺于外齒及君則憂恤之言不絶于口君之左右衣屨不絶于餽是以内有逐君之實而外連強大結歡羣小昭公昏庸不斷忠言不入卒之大行而不返也悲夫郝解春秋平義卷十
