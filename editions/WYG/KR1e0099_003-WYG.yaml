body:
  text: 春秋平義卷三秀水俞汝言撰莊公名同桓公子母文姜夫人哀姜在位三十二年諡法勝敵克亂曰莊元年春王正月繼弑君不書即位先君不以其道終子不忍即位也故莊閔僖皆不書孔義恐國亂不行即位之禮耳日抄三月夫人孫于齊文姜不稱姜氏削也絶不為親也云孫見其無所容而絶之也趙子嘗曰上書公與夫人姜氏如齊則下書夫人孫于齊者即如齊之姜氏也上書夫人姜氏薨于夷則下書夫人氏之䘮至自齊者即薨夷之姜氏也此是古史簡具之體辨義夏單伯送王姬送公榖作逆單伯天子之卿也王將嫁女于齊故使魯主之而單伯送之蘓氏秋築王姬之館于外為外禮也為外之於禮何居夫築館而受昏猶畫宫而受弔也然且為之齊侯不如把梁之妻也楚公子圍娶于鄭館之于外以為野賜然且為之齊侯不如令尹單伯不如太宰州犂也齊故親我我故仇齊築為王姬外為齊侯此為亡于禮者之禮與野編仇讐非所以接婚姻也衰麻非所以接弁冕也其不言齊侯之來逆不使齊侯得與吾為禮也糓梁築于外之為禮不若辭而不主之為正也孔義本孫氏冬十月乙亥陳侯林卒莊公卒子宣公杵臼立王使榮叔來錫桓公命書錫命之始不稱天王闕文也蘓氏豈有貶天王之理日抄王命魯主婚故追錫桓公以寵之高氏集註王姬歸于齊齊師遷紀郱鄑郚書遷之始紀之滅始於此矣孔義二年春王二月葬陳莊公夏公子慶父帥師伐于餘丘慶父公之庶兄公子已為卿也孔義孟氏之孽基于此木訥秋七月齊王姬卒外夫人不卒此何以卒檀弓曰齊告王姬之䘮魯荘公為之大功糓梁曰為之主者為之服也孔義冬十有二月夫人姜氏㑹齊侯于禚齊地莊公不能防閑其母失子道也胡傳乙酉宋公馮卒莊公卒子閔公立三年春王正月溺㑹齊師伐衞衞侯朔在齊㑹齊師伐衞謀納朔也日抄夏四月葬宋莊公五月葬桓王王崩至是七年矣公羊曰改葬也孔義秋紀季以􅈶入于齊紀邑齊欲滅紀故季以邑入齊為附庸存先祀也紀侯之命也故不書奔不書名孔義冬公次于滑鄭地公糓作郎書次之始將㑹鄭伯謀紀鄭伯辭以難胡氏春秋紀兵伐而書次以次為善救而書次以次為譏公糓曰欲救紀而不能也孔義四年春王二月夫人姜氏享齊侯于祝丘魯地享公糓作饗書孫則去其族書㑹書享掲其姓氏蓋示之有别亦所以討其亂倫之罪家氏傳饗甚矣饗齊侯所以病齊侯也糓梁三月紀伯姬卒卒者為下紀侯去國齊葬伯姬起也孫復夏齊侯陳侯鄭伯遇于垂謀取紀也張洽鄭伯突也非子儀也胡傳紀侯大去其國紀侯圖存不獲委宗廟於其弟而去之故不書奔而曰大去不書名而曰紀侯罪齊而閔紀也張洽責季不應以地入齊紀侯大去其國責侯不應去其國六月乙丑齊侯葬紀伯姬不書齊滅紀至是而齊侯滅紀之罪著矣孫復曰甚齊侯之詐也孔義紀自入春秋來與齊為難逆女於我不得免焉送后于京師不得免焉既遷郱鄑郚又為垂之遇雖有公次于滑夫人持之無能為也紀侯何以不書出以國與季無所出矣齊侯何以不書滅叔姬歸于􅈶有紀存焉伯姬何以書葬甚齊侯也履緰所逆我不往㑹莫敢葬也齊侯取而葬之然則其目齊侯何也曰善事不目不知為誰之善也惡事不目不知為誰之惡也野編紀亡本末魯史悉書非苐以魯為故也紀自有齊難魯兩世君臣悉心謀畫既不能偏師相援又不敢號呼控人其悱惻咨嗟之意眞有不可自明者紀國一時君臣夫婦所處盡善固皆可以為春秋萬世法者其亦我一念無己之至情見於立辭者耶辨義程氏罪魯之不奔使齊侯葬之既書於此又記於彼通説秋七月冬公及齊人狩于禚公糓作郜齊人者齊侯也其曰人何也卑公之敵所以卑公也糓梁齊詩揚之水美公射御蓋詠此事野編五年春王正月夏夫人姜氏如齊師前日㑹于禚享于祝丘猶曰托享㑹之禮也今三軍之衆而掩然無忸怩之心無耻極矣木訥秋郳犂來來朝郳公作倪犂公糓皆作黎郳國犂來名其後王命為小邾子繁露曰附庸字者方三十里名者方二十里孔義冬公㑹齊人宋人陳人蔡人伐衞是齊侯宋公也曰人何也人諸侯所以人公也人公何也逆王命也糓梁傳六年春王正月王人子突救衞公作三月書救始此自救衞無功王命益不行於天下程子曰子突救衞而字之善之也善子突則善王命也榖梁曰善救者則伐者不正矣夏六月衞侯朔入于衞子突周之下士而書字朔衞之故君而書名王人書救不書敗衞侯書入不書復權衡定矣傳斷秋公至自伐衞五諸侯伐衞伐天子所立者也非事闗京師王人若為救耶朔竟入衞矣公子黔牟何以不見不可言也朝廷有掩覆之德春秋有深隱之文野編惡事不致此其致何也不致則無用見公之惡事之成也榖梁螟冬齊人來歸衞俘公榖作寳歸俘者衞也而曰齊人歸惡于齊也野編朔以寳賂齊而齊以分於三國也春秋書此結正諸侯之罪也野編七年春夫人姜氏㑹齊侯于防魯地左氏曰齊志也夏四月辛卯夜恒星不見夜中星隕如雨辛卯夜榖作昔隕公作霣異書野編恒星不見夜明也星隕如雨與雨偕也左傳秋大水無麥苖麥苖即麥之苖也日抄冬夫人姜氏㑹齊侯于榖齊地蓋一嵗而再㑹矣孔義八年春王正月師次于郎以俟陳人蔡人甲午治兵治公作祠夏師及齊師圍郕郕降于齊師郕公作成秋師還魯欲違齊而多兵則不能欲從齊與操戈又不樂故師次于郎徘􅆦不進而甲午治兵故為陳其師旅整比戎行以濡滯其行雖同齊圍郕而曰郕降齊師則必有緩征徐戰之法而致郕自降非加兵毒死逼郕于險矣秋師還味此二字有不事戰闘善師而還之意當時魯人以彊國之令黽勉從師夫子前後所書二十餘事而一段夷猶悱惻委蛇周旋之意俱可想見辨義書次書俟書治兵書還内書兵事莫詳于此者師出師入皆有公在而不見公野編冬十有一月癸未齊無知弑其君諸兒襄公于是齊魯之怨終矣野編九年春齊人殺無知殺無知者雍廪而曰齊人者討賊也孔義公及齊大夫盟于蔇公榖作暨魯地齊無君也左夏公伐齊納子糾公榖無子字齊魯之怨又結開數年兵端也野編齊小白入于齊杜註子糾小白皆僖公庶子而糾長荀卿亦謂桓公殺兄以争國獨史記載薄昭諫淮南厲王有曰齊桓殺其弟以反國程子取此以證子糾之為弟未知誰是孔義凡當立者不言納與入宋襄公之納齊孝公言伐而已不言納與入也糾之言納而不言入納而未得入也小白之言入自入也蘇氏子糾小白皆僖公子也而曰仇人之子不當立吾所不觧者一左氏伐齊納子糾二傳伐齊納糾然論語稱公子糾矣而曰糾不書子明不當立也吾所不觧者二伐齊納糾為一事小白入齊為一事兩簡各書糾自䝉伐齊之文小白上自應著齊而曰以小白繋齊明宜有齊也吾所不觧者三子糾兄也小白弟也聖人莫肯致言由賜親承答問緒言猶在無費紙墨也野編秋七月丁酉葬齊襄公九月而葬八月庚申及齊師戰于乾時我師敗績乾時水名齊地春秋甚耻乾時之戰當齊無君其制在公而遷次三時事中變矣辟在下道喪其戎路亦可醜也野編書我師敗績則凡例謂内不書敗者謬矣吕氏九月齊人取子糾殺之言取病内也猶曰取其子糾而殺之云爾糓梁齊人取子糾殺之不予齊人之使魯殺其親也故使齊人尸之且曰有國而不能庇一人亦所以病魯也蘇氏小白既為君矣糾遜焉可也必取而殺之是糾罪薄于太叔而小白忍于鄭莊也傳斷冬浚洙畏齊也守國在人不在險也齊于我深矣所不至譚遂我者其長勺之戰乗丘之金僕姑柯之手劍乎而浚洙奚為野編十年春王正月公敗齊師于長勺魯地二月公侵宋書侵之始侵書野編時魯與齊仇宋與齊合故有此舉補程傳三月宋人遷宿遷國之始遷國書野編宿介宋魯間宋人以為貳于魯而遷之蓋移之封内以為附庸自是宿不復見矣孔義遷者猶未失其國家以徃者也榖梁夏六月齊師宋師次于郎公敗宋師于乗丘魯地長勺之戰謀于曺劌乗丘之戰謀于公子偃一嵗再勝春秋所喜也敵來而應釁不在魯義榮于乾時矣傳斷秋九月荆敗蔡師于莘以蔡侯獻舞歸舞榖梁作武荆猾夏之始也荆楚始封國至成王頵改稱楚李濓曰執君滅國皆始此年天下無王齊為之天下無中國楚為之也孔義此蠶食諸姬之始故謹書之野編冬十月齊師滅譚譚子奔莒滅國之始滅國書野編書奔不書出國亡無所歸也猶書爵强暴所加非其罪也孔義十有一年春王正月夏五月戊寅公敗宋師于鄑魯地秋宋大水外灾也何以書一曰吊則書齊大災不聞吊也一曰告則書陳災陳亡矣一曰非常水也天下莫不聞故書野編比嵗交兵怨不廢禮古意之猶存也孔義冬王姬歸于齊二傳過我也非我主之野編元年始而逆終而卒書不厭詳此止一書者前之王姬歸襄公此之王姬歸桓公也傳斷十有二年春王三月紀叔姬歸于􅈶存紀也野編叔姬始以媵歸紀紀侯去國而歸魯蘇氏至是紀侯卒而始歸􅈶宗廟在焉義當歸也孔義紀侯去國太王之養人也紀季入齊微子之存祀也叔姬歸􅈶共姜之矢志也辨義夏四月秋八月甲午宋萬弑其君㨗及其大夫仇牧㨗公作接閔公弑桓公御説立仇牧與太宰督同死而督不書則弑君之賊也孔義宋亂而齊起事有名所謂伯王之資也野編冬十月宋萬出奔陳陳人與于北杏知得宋萬矣野編十有三年春齊侯宋人陳人蔡人邾人㑹于北杏齊侯榖作齊人齊地衣裳之㑹一此伯㑹第一也先書宋亂繼以北杏經營中夏自此始遂伯矣人四國所以大齊侯也家氏曰著衆望之所原也何以謂之伯也此即分陜舊名敬仲用齊始倡為之或問五伯為誰齊桓晉文秦穆宋襄楚莊謂之五伯矣曰非也是中夏之五伯也襄伯而未成穆西戎之伯也莊南服之伯也然則古有昆吾大彭豕韋及桓文而五謂之五伯矣曰非也是春秋之五霸也昆吾夏之伯也大彭豕韋殷之伯也五伯定為誰齊得其一桓也晉得其四文襄悼昭也平丘之㑹盛矣伯始於北杏終于平丘何以終于昭也傳曰天下有道禮樂征伐自天子出天下無道禮樂征伐自諸侯出自諸侯出蓋十世希不失矣夫齊未有世其伯者晉自文襄靈成景厲悼平昭世主夏盟及頃而失之則十世也故伯以昭為斷何以始于桓也周自平王而東至于桓王伐鄭鄭伯射王當魯桓五年經書蔡人衞人陳人從王伐鄭至于莊王救衞無功當魯莊八年經書王人子突救衞蓋周魯兩桓兩莊之間天下無王乆矣為無伯也至于僖王元年諸侯㑹于北杏明年齊請師于周經書單伯㑹伐宋而天下始知有周故有伯而後有王人知攘楚為齊桓功不知披髪左袵之歎在此不在彼也是故盟莫大于葵丘伐莫大于次陘狩莫大于河陽戰莫大于城濮偏戰莫大于彭衙㑹莫大于蕭魚葵丘尊周次陘怗楚河陽逐狄彭衙却秦蕭魚服鄭葵丘盟而不㰱禮之大也次陘伐而不戰德之大也河陽狩而不伐義之大也彭衙戰而不㑹勇之大也蕭魚㑹而不盟信之大也此皆春秋所材以成其書無五伯春秋不作或曰即如是何不遂起北杏曰書為虞夏作而始堯明繼治也春秋為桓文作而始隠明繼亂也野編屬辭曰學者見左傳孟子戰國策皆有五伯之文而荀卿書以齊桓晉文楚莊呉闔廬越勾踐為五伯因欲退闔廬勾踐而進宋襄秦穆以當之傳記齊國佐之言以五伯對四王與孟子五伯對三王言不異則杜氏謂夏伯昆吾商伯大彭豕韋周伯齊桓晉文者近之若夫楚莊呉闔廬越勾踐乃中國大義所當攘却而所謂勤而撫之以役王命者於宋襄秦穆亦何取焉夏六月齊人滅遂討其不㑹于北杏也蘇氏滅之則甚矣稱人將卑師少也自此至閔二年遷陽凡齊兵皆稱人孔義以管仲為政未嘗興大衆也伊川秋七月冬公㑹齊侯盟于柯曺劌刼盟始及齊平也齊威圖伯其先結宋其次結魯宋魯從而小國皆從之矣故為此盟戴溪反稷之㑹而為北杏忘長勺之敗而為柯盟桓之所以能為諸侯主也傳斷柯齊阿邑也孔義十有四年春齊人陳人曹人伐宋三國稱人為以單伯主伐也野編夏單伯㑹伐宋於是諸侯初用王師單伯天子卿也㑹伐宋則齊請之宋人服從天子之功也二傳以單伯為吾大夫非也乾時而後北杏之㑹我未有與焉柯之㑹非好㑹也即齊人徴㑹公當自徃敢以大夫徃乎以大夫徃如公子結之于鄄而西鄙受兵矣謂單伯吾大夫未諳於齊魯之故者也野編秋七月荆入蔡文齊威圖伯三年得魯而失宋諸侯蓋未恊也而又入蔡齊威蓋患之而未有制也其後凡十二年諸侯恊從中國無釁而後伐之亦足見楚之强不可俄而服而齊威之持重有謀不為不審之計以敗中國也木訥自是蔡人不復與齊㑹盟孔義李濓曰蔡之始録于經則㑹鄧以懼楚終録于經則遷州來以避楚楚之始見于經曰敗蔡終録于經曰圍蔡齊晉之伯其極盛則侵蔡以伐楚其極衰則㑹召陵以救蔡而不能終于栢舉之戰吳操中國之權又以蔡故原一蔡之始終而中國消長之形荆楚强弱之㑹皆可見矣辨義冬單伯㑹齊侯宋公衞侯鄭伯于鄄衛地衣裳之㑹二諸侯㑹王臣之始春而㑹伐冬復㑹焉齊以得單伯為重矣野編衞朔入國不通諸侯者九年鄭突自遇垂不通諸侯者十一年今不敢不至矣宋服故也徂徠石氏十有五年春齊侯宋公陳侯衛侯鄭伯㑹于鄄衣裳之㑹三齊桓始伯三合諸侯而不盟也野編左氏曰齊始伯也木訥曰未也踰年再㑹懼諸侯之離也伯當在十六年幽之盟爾夏夫人姜氏如齊秋宋人齊人邾人伐郳公作兒伐郳伐鄭伐徐宋故也即以宋人主之野編郳即小邾齊桓助宋争郳以脅魯也至僖公時魯既親齊則進郳為小邾仍使服魯矣孔義鄭人侵宋間諸侯伐郳而侵宋也孔義侵伐皆行師之名雖衝狄亦書伐伯者之兵亦書侵義之是非係其事之得失不以是為褒貶也汪氏冬十月十有六年春王正月夏宋人齊人衞人伐鄭南北争鄭於是始中國諸侯宋為大既為之服郳又為之報鄭宋自是與齊為一宋親而中國諸侯定矣許氏此亦將卑師少宋故以主兵在上也與伐郳同通説秋荆伐鄭齊方圖伯楚亦侵强而鄭當其衝中國得鄭可以拒楚楚得鄭可以窺中國自是鄭為齊楚必争之地矣孔義自鄭從幽之盟楚不敢窺鄭者十有餘年齊桓伯之力也木訥冬十有二月㑹齊侯宋公陳侯衛侯鄭伯許男滑伯滕子同盟于幽宋地公作公㑹公榖許男下有曹伯衣裳之㑹四齊桓初主盟也自是無特相盟者矣齊自北杏以後有㑹無盟至此而鄭服始合九國之君而為此盟此桓公糾合諸侯一匡天下之始呉澂見雖諸侯同欲而宋桓實鼓舞之故齊桓之伯頼宋為多自後滑滕諸小國不與齊盟者桓公事從簡便使附于大國也伯政下衰盟㑹数而賦役煩大國容有不至而小弱莫不奔命焉得失可知矣孔義公在不書不成其㑹也我貳于鄭明年鄭詹來二幽之盟前失鄭詹後失衞不害其同也同者一之于周也孰能為異哉野編邾子克卒儀父卒子𤨏立凡再同盟皆書字今卒稱子者北杏之㑹邾人在焉齊桓請王命以為諸侯也傳斷十有七年春齊人執鄭詹公作瞻伯討也以侵宋故野編夏齊人殱于遂殱公作瀐齊師滅譚譚子奔莒著其君不詘也齊人滅遂齊人殱于遂著其民不歸也孟子謂伯者以力服人非心服也力不贍也許翰春秋觧秋鄭詹自齊逃來逃鄭所以義齊也莫恥于逃也野編魯受之又罪魯也孔義詹不逃鄭而逃來則知其為鄭之罪人也木訥冬多麋麋隂類也以多為異野編十有八年春王三月日有食之推厯當為五月壬子朔闕壬子朔字不言日不言朔夜食也穀梁夏公追戎于濟西此未有言侵伐者而書追戎是不覺其來已去而追之也為國無武偹而不知警危道也胡傳秋有􅈮公作蜮此魯所無也故以有書孔義冬十月十有九年春王正月是年王室有子頽之亂王出居于櫟明年鄭伯與虢叔納王王賜鄭伯武公之畧自虎牢以東于傳有之經未見也必無此事此語當出鄭志左氏兼睬諸國語遂以入傳也恐與經亂不可無辨爾野編夏四月秋公子結媵陳人之婦于鄄遂及齊侯宋公盟鄄衞地也結送媵至鄄聞齊宋方盟而强與焉野編媵禮之輕也盟國之重也以輕事遂重事惡之也孔義夫人姜氏如莒冬齊人宋人陳人伐我西鄙見伐之始公之事齊後于諸侯又受鄭詹未討齊宋在鄄將以陳人伐我而結知之故權國重而與之盟示先下之以禮齊宋以公子之盟未足以結成也故卒來伐而取服焉襄陵許氏二十年春王二月夫人姜氏如莒夏齊大災秋七月冬齊人伐戎榖作我戎在徐州之域最近齊魯故先治之張洽二十有一年春王正月夏五月辛酉鄭伯突卒厲公卒子文公㨗立簒弑竊國而春秋始終君之且復記其卒所以著亂賊得終王法不行世之所由亂也張洽秋七月戊戌夫人姜氏薨薨寢祔姑赴于諸侯故以小君禮書之補程傳冬十有二月葬鄭厲公八月而葬鄭伯不免諡為厲者周室雖衰公議尚在臣子私諡不敢妄加美名古意猶可攷也王氏二十有二年春王正月肆大眚公羊作省是年以前知有夫人不知有公兩宫之間釁孽多矣一切除之不如是人心不安故曰觧天下之大結肆大𤯝之謂也野編癸丑葬我小君文姜婦人法無諡生以夫國冠之韓姞秦姬是也死以夫諡冠之莊姜定姒是也乃别為之諡曰文而不繫于桓可乎孔義文姜之惡如此然則孰謂不書葬者為貶哉日抄陳人殺其公子禦冦禦公穀作御專殺之始禦冦陳世子也未命于王故曰公子何以殺之欲立嬖􅁎子欵也殺者宣公而歸之陳人者何陳人之志猶公之志也是以與申生異爾邵寳國亂無政衆人擅殺而不出于其君則稱人也胡傳經謂殺大夫舉其槩之辭也殺公子舉其親之詞也稱名以其實也得其人也不稱名者得其名也不得其實也通説夏五月春秋未有以五月言時者先儒以為下脱文或五字誤日抄秋七月丙申及齊髙傒盟于防魯地盟者公也不及其君而盟其大夫于竟上故不書公也曷為從其大夫于竟上為媾也齊于我深矣則夫人之故子糾小白兄弟也夫人親糾仇小白矣長勺以前猶相枝柱聞齊伯而始懼也夫人何以如齊欲親于齊也夫人何以再如莒不得于齊而求通于齊之與國納桓者莒也然終無益也及是夫人薨矣始為防之盟將議昏焉此魯事變也野編冬公如齊納幣納幣昏禮也為初立夫人乎有孟任生子般矣許為夫人矣有妾成風生僖矣此何為者曰亦求好于齊爾納幣不自行求而徃故無所用禮也野編二十有三年春公至自齊祭叔來聘夏公如齊觀社襄二十四年齊社蒐軍實使客觀之蓋齊俗毎因祭社蒐軍實以夸衆而聚人觀之莊公托此為名以如齊也吳氏公至自齊荆人來聘楚交中國始此荆遂人矣伐鄭擾邊常事通問上國夷道之盛春秋惡之也野編公及齊侯遇于榖齊地蕭叔朝公蕭叔宋附庸書朝公公在外也於外非正也孔義秋丹桓宫楹公將娶于齊以誇示齊女非禮也蘓氏冬十有一月曹伯射姑卒莊公卒子僖公夷立十有二月甲寅公㑹齊侯盟于扈鄭地遇于榖盟于扈皆要結盟好也孔義二十有四年春王三月刻桓宫桷葬曹莊公夏公如齊逆女諸侯無越境逆女之禮張洽秋公至自齊八月丁丑夫人姜氏入哀姜入者内弗受也以宗廟弗受也穀梁公不與夫人皆至夫人不從公而自入失夫婦之正也蘇氏戊寅大夫宗婦覿用幣大夫宗婦者同宗大夫之婦非謂大夫與宗婦也胡瑗文姜起嬴之㑹迄弟年之聘其事有六哀姜起防之盟迄宗婦之覿其事十有四書之不辭繁􅃨聖人所以致謹也野編大水莊公即位三十年書大水者三於羣公為最甚岷隠冬戎侵曹曹羈出奔陳赤歸于曹羈者莊公嫡子而赤其庶子戎逐羈而歸赤也孔義郭公闕誤也杜註二十有五年春陳侯使女叔來聘諸侯交聘之始夏五月癸丑衞侯朔卒子懿公立衞朔殺二兄抗王命以簒逆得國其卒也亦書侯春秋未嘗褒貶人也郝敬直觧六月辛未朔日有食之鼓用牲于社鼓禮也用牲非禮也野編推厯當為七月辛未朔按左氏𫝊言唯正月朔慝未作於是乎伐鼓用幣詳其傳意疑此食不在正月之朔故言唯以明其非禮不在正月之朔則不得謂之六月矣書六月者傳冩之誤統紀伯􅁎歸于把若時君女則加子字以别之此桓公女公之姊妹也髙氏集註秋大水鼓用牲于社于門凡天灾有幣無牲非日月之𤯝不鼓左冬公子友如陳内大夫出聘之始報女叔之聘也日抄此内大夫出聘之始孔義二十有六年春公伐戎公無春字曹羈以戎難奔陳女叔之來蓋為曹謀戎也故冬報聘而春伐戎也畧記夏公至自伐戎曹殺其大夫專殺大夫之始史佚其名也野編羈出赤歸之際必有不附于赤者故殺之孔義秋公㑹宋公齊人伐徐冬十有二月癸亥朔日有食之二十有七年春公㑹把伯􅁎于洮魯地夏六月公㑹齊侯宋公陳侯鄭伯同盟于幽衣裳之㑹五陳鄭服也魯宋陳鄭皆至而衞獨不來故明年伐衞孔義秋公子友如陳葬原仲公子慶父公子牙公子友皆莊公母弟慶父牙通乎夫人以脅公季子不忍見也故以葬原仲適陳遂不復歸三十二年公以病召而始歸也孔義原仲稱字杜氏孫氏謂其已死不名通説冬杞伯􅁎來春㑹于洮冬又歸魯故知其不當來也孔義莒慶來逆叔􅁎莒大夫也何以稱字大夫自逆則稱字為其君逆則稱女何以書諸侯嫁女于大夫而公自主之非禮也胡傳杞伯來朝公㑹齊侯于城濮衞地謀伐衞也岷隠二十有八年春王三月甲寅齊人伐衞衞人及齊人戰衞人敗績幽之盟衞人不至一齊人伐之不以煩諸侯也敗而書及罪之也不至罪也不聼罪罪也齊再勝而衞再敗也野編夏四月丁未邾子𤨏卒文公蘧除立秋荆伐鄭公㑹齊人宋人救鄭公宋人下有邾婁人㑹諸侯救始此楚成鄭侵宋則伐之荆伐鄭則又救之何得非伯野編是役始書公㑹者兼美魯侯不顧荆人之聘而善相齊桓也傳斷楚與中國爭鄭自此始日抄冬築郿公穀作微大無麥禾書於冬者五穀畢入計食不足而後書也蘓氏臧孫辰告糴于齊不言如齊告糴而曰告糴于齊者言如齊則其辭緩告糴于齊則其情急所以譏大臣任國事治名而不治實之蔽也魯人悦其名而以急病讓夷為功君子責其實而以不能務農重糓節用愛人為罪劉敞按緩急之説本于服䖍二十有九年春新延厩冬築微春新延厩以其用民力為已悉矣榖梁夏鄭人侵許許介楚鄭之間鄭逼於楚每以許為藩蔽許一入楚其後八年之間楚伐鄭者三失許援也木訥秋有蜚蜚色青非中國所有南越盛暑男女同川淫氣所生劉向負蠜今之蜚盤虫其氣惡能熯稲使不蕃野編冬十有二月紀叔􅁎卒紀國雖滅叔􅁎執節守義故繫之紀而録其卒葬賢而得書也孔義城諸及防三十年春王正月夏次于成公榖次上有師字齊將降鄣故出兵以偹之蘇氏秋七月齊人降鄣紀之遺邑也八月癸亥葬紀叔􅁎去年十二月卒今八月始葬婦人之失所未有如􅁎之甚者林堯叟九月庚午朔日有食之鼓用牲于社推厯當為十月庚午朔冬公及齊侯遇于魯濟魯地㑹于城濮謀衞也而公不與伐衞遇于魯濟謀山戎也而公不與伐戎若盡𤼵以行何益于事野編莊公事齊也緩而從伯也專桓公所頼以服諸侯而成伯者莫親于魯伐徐救鄭既皆與公主兵㑹城濮而伐衞遇魯濟而伐山戎又皆即謀于我今假戎㨗欲至魯庭以修兩君之好耳曹在齊西南燕在東北戎皆侵之為中國患者幾半天下齊桓安得晏然而已乎已而救邢却狄服楚尊王伯業赫然戎功其首焉辨義齊人伐山戎此齊侯也縣車束馬過師無人之竟莫有知者書曰齊人㣲之也微乎㣲乎遇魯濟獻㨗皆見齊侯中忽鷗沒管子用兵春秋注筆兩臻其妙野編北燕之不通于上國山戎蔽之也桓公為之伐而燕始逹鄭樵三十有一年春築䑓于郎戎在魯之南界其南為宋而郎近之其西為曹而秦近之其東為齊而薛近之皆相屬于魯南鄙者也築䑓而可察戎之出沒矣辨義夏四月薛伯卒薛始稱伯降班以告終也張氏春秋降爵之國薛自侯降為伯滕自侯降為子杞自公降為侯又降為伯又降為子雖其所以降不可知固以見其國勢朘削日就卑替或曰薛與滕杞自入春秋不與諸侯㑹盟者各百餘年至成五年蟲牢始書杞伯成十三年伐秦始書滕人襄元年圍彭城始書薛人其日就陵替者何也齊晉侯爵也常序于宋公之上邾子爵也常序于曹伯之上復有在邢侯之上者甚而至于蜀之盟秦序宋上鄭序齊上皆習亂之事也故統紀並依王爵爵同以親晉當先齊以齊為霸者之倡特列居侯爵之首荆吳僣號王爵不加焉故附于五等之後凡此庶㡬春秋聖人所以為道名分之意云齊履謙諸國統紀築臺于薛魯地六月齊侯來獻戎㨗自魯濟向燕今來獻㨗前入路乃歸路也故善用兵者千里之逺如行國中野編秋築䑓于秦秦魯西境也一嵗三築䑓直書而自見矣孔義冬不雨三十有二年春城小榖齊邑曲阜西北有小榖城杜元凱以小榖為齊邑為管仲城之則何不係之齊而以内辭書耶孫氏發㣲夏宋公齊侯遇于梁丘曹邾之間去齊八百里梁丘近宋逺齊齊侯身至梁丘是能以齊為宋下也終春秋之世書宋公齊侯獨此而已野編秋七月癸巳公子牙卒僖叔牙欲立慶父弑械成矣故季子酖之誅不得辟兄君臣之義也使託若以疾死然親親之道也書卒示無譏也孔義八月癸亥公薨于路寢魯十二公得終路寢者三莊宣成而已冬十月已未子般卒已未公穀作乙未般也遇弑共仲為賊也隠之故書卒爾在䘮稱子踰年稱君禮之失也文十四年書夏五月齊侯潘卒九月齊公子商人弑其君舎此未踰年稱君春秋之法也野編有子則廟廟則書葬無子不廟不廟則不書葬公羊傳公子慶父如齊共仲程子以如齊為奔而胡氏因之非也郭氏以子般雖卒國人未嘗聲慶父之罪何遽犇乎葢慶父自托如齊求立已歸而閔公已立不遂其意故弑之畧記狄伐邢狄入伐之始凡書狄侵伐皆言狄强也夷見則中國憂矣野編當恵王世戎狄荆楚交伐諸夏使無齊桓攘服定之豈復有中國哉許氏春秋平義卷三
