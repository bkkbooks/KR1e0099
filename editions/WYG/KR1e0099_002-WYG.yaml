body:
  text: 春秋平義卷二秀水俞汝言撰桓公名軌史記名允惠公子隠公弟母仲子夫人文姜在位一十八年諡法辟土服遠曰桓元年春王正月公即位繼故不言即位先君不以其道終子弟不忍即位也繼故而言即位則是與聞乎弑也孔義隠不求為君不書即位桓求為君書即位隠不書即位不害其真也桓書即位不害其偽也野編糓梁有桓無王之説竊以夫子於繼隠之後而書公即位則桓之志見矣奚待去其王以為貶耶顧炎武日知録三月公㑹鄭伯于垂衞地鄭伯以璧假許田欲求好者公也欲田者鄭也為此㑹也此其以璧假之與曰否以祊易之易之則其言假之何鄭人之辭也知為賜田不可易也則亦書曰璧假許田可以觧魯可以諱周可以甚鄭伯之為諼野編隠公於宛來歸祊特欲啗魯以借其力為離宋計耳未嘗有易許之萌今桓立而輙以許田假之蓋扼其吭而抉取之也謂以璧者庶乎有詞且曰請復祀周公借是為義而要之也馬駢探㣲加璧焉鄭伯必得之計也非祊薄於許也邵寳歸祊後復書我入祊重取地也假許後不書以許歸鄭重失地為内諱也黄澤補註夏四月丁未公及鄭伯盟于越近垂地祊成已結假不反矣野編上書㑹所以惡鄭下書及所以惡魯王氏箋義秋大水書水災之始災書野編書時不書月則水之泛溢為害蓋歴時而未平也纂疏春秋書大水凡九魯居其八其一言宋日抄冬十月二年春王正月戊申宋督弑其君與夷及其大夫孔父殤公弑莊公馮立人臣死君難書及以著其節稱大夫不失其官也程傳孔父先死曰及何也糓梁曰書尊及卑春秋之義也孔義父與甫通孔父字嘉猶杜甫之字美也略記滕子來朝把最小初稱侯己稱伯稱子滕亦小初書侯己書子蓋弗給於朝覲貢賦自降為子聖人因其實而書之孔義本朱子按滕初稱侯後稱子以為自降可也把初稱侯後稱伯又稱子繼復稱伯卒又稱子其升降不一者於前説難通矣則惟時王黜陟之説為可從二邾自附庸升而為子説者以為數從齊桓故為請於王命為諸侯王能升二邾獨不能降滕把乎畧記三月公㑹齊侯陳侯鄭伯于稷以成宋亂稷宋地為賂故立華氏也㑹未有指言所事指言所事特書也孔義諸侯以宋有弑君之亂而徃平之耳後書取鼎於宋而討賊之事無聞焉則其義自見或問夏四月取郜大鼎于宋戊申納于太廟取者得非其有之稱宋始以不義取之故係其器於郜賂公者宋也而書曰取蔽罪於魯也以成亂之賂器置周公之廟公其受之乎孔義前書成宋亂兼責四國也此書取郜鼎納于太廟專責魯也家氏傳秋七月把侯來朝公糓作紀蔡侯鄭伯㑹于鄧懼楚之始㑹於鄧謀楚也春秋微言之以示入蔡伐鄭之漸不惟不言楚併不言荆用見中國無人不能制之於早爾野編春秋之初諸侯盟尚少也自是而後則漸衆矣伯興而世道降其可見於是乎簡端録汪氏纂疏曰于鄧外諸侯相㑹之始而實楚患之萌蘖北杏外諸侯列㑹之始而實覇者之濫觴其闗於天下之故不小矣九月入把公糓作紀左氏曰討不敬也七月來朝九月入把何也曰七月來朝把侯當作紀侯程子已言之矣或問公及戎盟于唐冬公至自唐書至之始出告反至常事爾何以書或以去國踰時之乆或以㑹盟侵伐之危或以黨惡附姦之罪唐之至危之也弑君之賊使戎而不如鄭齊陳之黨惡則討之矣孔義本程傳三年春正月公㑹齊侯于嬴齊地不書王闕疑孔義不書王者孔子循史之舊文而非削也若以削王為罪天王不討賊則是仲尼貶周天子矣其尊周正統之意安在哉探微㑹于嬴左氏曰成昏於齊也冬娶齊急於得齊以固齊援也木訥夏齊侯衞侯胥命于蒲衞地胥命者何相命也相命近正也古者不盟結言而退公羊隠八年齊欲平宋鄭十年齊從鄭伐宋而衞亦從宋入鄭齊衞不過各附其所與實未常有怨至桓二年遭華督之禍而衞其所附齊鄭㑹於稷以成宋之亂而宋已附於齊無仇可觧何俟乎盟故書曰胥命耳木訥六月公㑹把侯于郕魯地公糓作紀郕公作盛杞本侯爵諸傳必欲易之為紀者以恒六年夏四月亦有公㑹紀侯於郕之文故並二而一之也至十二年曲池之㑹與莒子之盟者猶書犯侯之子靖侯也終桓之世凡三見稱侯不異至莊二十有七年始稱伯非因桓公而貶也探㣲秋七月壬辰朔日有食之既推厯當為八月日食三十六食既者三皆臣子僣逆夷狄暴橫之兆此年而後荆楚僣王鄭敗王師宣八年而後楚荘圍宋伐鄭伐晉襄二十四年而後齊崔杼衞寗喜弑君呉楚横行中國汪氏公子翬如齊逆女逆女書公子翬則是隠以為仇桓以為親也野編九月齊侯送姜氏于讙魯地公㑹齊侯于讙夫人姜氏至自齊越竟送女非禮也孔義將以何稱非女非婦則姜氏而己矣公徃㑹之野編為齊侯爾非為親迎也以翬徃而不言以至者公親受之齊侯也孔義桓公失禮兆敝笱之刺於是見之傳斷冬齊侯使其弟年來聘致夫人也桓娶夫人書之者數春秋惡文姜之終不得不詳其始傳斷有年謂桓不當有年為異而書則螽與大水無氷皆當為桓之常又何為書春秋豈專記人之凶荒而不幸人之豐熟哉各書其實爾日抄蓋有感也幸祈民之未殄頼有是年以生養之不然則靡有孑遺矣探㣲四年春正月公狩于郎蒐狩之始狩不書于郎遠也野編郎今之單父魯臺土也地近宋昭九年築郎囿木訥夏天王使宰渠伯糾來聘詩曰家伯維宰仲允膳夫宰與膳夫作對其官可知而或以為冡宰吾不知也經書宰咺宰孔惡冡宰而數兼使職必無是也是年及七年不書秋冬史之闕文野編五年春正月甲戌脱文陸淳長厯甲戌前年十二月二十一日杜預先儒疑下有陳佗殺太子一事木訥己丑陳侯鮑卒桓公卒陳佗弑太子自立左傳再赴也公糓曰甲戌之日亡己丑之日死而得故以二日卒之俱不可信夏齊侯鄭伯如紀外相如不書何以書襲紀也野編紀人來告存而弗削以著齊人滅紀紀侯去國之由胡傳天王使仍叔之子來聘仍糓作任仍叔之子弱也左傳四年天王使宰渠伯糾來聘今又使仍叔之子桓固魯賊周何親之也至及觀伐鄭然後知王屡聘魯謀鄭故也魯桓宋督俱未暇討反遣使入魯蓋欲專圖鄭也傳斷葬陳桓公城祝丘齊將襲紀公欲助紀而畏齊故城以偹之程傳秋蔡人衞人陳人從王伐鄭王師敗績于繻葛不書書蔡人衞人陳人從王伐鄭逆中取順法也王師敗績於茅戎何以書茅戎戎也鄭諸夏也矢集王躬天下寧有是事從王正也伐鄭鄭伯之有罪明矣野編大雩書大雩之始旱也雩而雨雩而不雨旱野編魯諸侯而郊禘大雩嵗以為常不能悉書故雩以非時而書孔義簡端録凡王所建皆曰太太廟太學之類是也凡王所舉皆曰大大蒐大閲之類是也曽謂魯可行之乎螽公作􅏑冬州公如曹外相如不書何以書違把難也野編州河内地邑名也張洽州公嘗為三公程子六年春正月寔來杜註寔實也名曰如曹實來魯也在公糓俱不言州公之名胡傳獨以為名不知何據賀仲軾歸義言寔來者承上文也州公一出而私交二國徃外曰遂内來曰寔皆兼事之辭也統紀此來者州公遂不復矣州公存其來紀侯表其去蓋謹志之也野編夏四月公㑹紀侯于成公糓作郕魯地諮謀齊難也左秋八月壬午大閲書大閲之始簡車馬也懼齊鄭故孔義盛夏大閲妨農害人無事而為之妄動也有警而為之教之不素得以保其國乎程𫝊蔡人殺陳佗厲公躍立佗者殺世子自立者也公子躍者蔡出也為立躍也以為誘之則自送也以為故侯君位未定故曰蔡人殺陳佗野編淫獵乎蔡人不知其是陳君也而殺之糓梁蔡侯殺之而書蔡人天下之大惡人皆得而誅也孔義九月丁卯子同生君嫡子生以太子生之禮舉之則史書之啖助冬紀侯來朝欲公請王命求齊成公告不能七年春二月己亥焚咸丘劉氏曰咸丘邑也火田而咸丘焚也王貫道曰咸丘即鉅野郎之近地日抄夏糓伯綏來朝鄧侯吾離來朝糓鄧何為者比於介郳則稱爵比於滕薛則稱名蓋是時東南有偽王者故相抜而來後亦改事楚矣野編糓鄧皆在南陽越蔡許陳曹宿邾而朝於魯蓋為楚所逼失地而奔不見容者懼楚也至魯遠於楚故朝於魯以失地故書名終春秋不復見於經意其滅於此也木訥八年春正月己卯烝烝不書以五月丁丑烝書野編天王使家父來聘至是三聘矣孔義髙抑崇曰謀納后也辨義夏五月丁丑烝黷祀也志不敬也孔義秋伐邾冬十月雨雪建酉之月未霜而雪書異也程傳祭公來遂逆王后于紀書遂始此天子娶后當使同姓諸侯主其辭命祭公逆后于紀使我主其禮也劉敞權衡祭公至魯遂徃逆后此天王之命非祭公自為之紀魯甥咨謀于魯而行戴溪齊將滅紀魯勢不能芘紀於是而為之謀俾納女于王托王為重焉祭公因不及命而遂逆王后也齊侯繼此不復犯紀襄公始滅紀納女亦延紀數年木訥桓王取后于紀命魯主昏嘗使家父來聘則其事前定矣既己納幣契成故祭公來受辭于主昏而徃逆后于紀皆禮之宜也天子不自主故祭公不稱使成使于我故言遂屬辭九年春紀季姜歸于京師其稱紀季姜何自我言紀也父母之於子雖為天王后猶曰吾季姜公羊自逆者而言從天王所命而稱王后示天下之母儀也自歸者而言從父母所子而稱季姜化天下以婦道也胡傳夏四月秋七月冬曹伯使其世子射姑來朝諸侯相朝正也有故而使世子攝事蓋禮之變也蘇轍朝不言使明年曹伯終生卒為射姑地也有曹伯之使則可野編十年春王正月庚申曹伯終生卒桓公卒子莊公射姑立夏五月葬曹桓公秋公㑹衞侯于桃丘弗遇衞地衞侯失信也衞中變而從齊鄭于是乎有郎之師孔義冬十有二月丙午齊侯衞侯鄭伯來戰于郎鄭太子忽救齊敗戎師于是諸侯之大夫戍齊齊人餼之使魯為之班魯以周班後鄭鄭忽怒故以齊衞來戰于郎稱來戰無詞也鄭雖主兵而先書齊衞猶以周班正之也蘇氏集觧王明逸曰魯以周班後鄭事已乆遠釁所由來必更有他事是時齊方圖紀而鄭助之其嗛魯也蓋以紀故與畧記十有一年春正月齊人衞人鄭人盟于惡曹此郎之諸侯戰未得志故盟爾野編夏五月癸未鄭伯寤生卒莊公卒世子忽立是為昭公鄭莊一時之雄也射王陷弟害隣謀立宋莊身沒未幾而世嫡出奔庶孽奪正國内大亂為宋莊反噬為不善者可以鍳矣孔義秋七月葬鄭莊公三月而葬九月宋人執鄭祭仲書執之始稱字非賢之也尊王命貴正卿著其罪而深責之也突歸于鄭突不稱公子不可以有國也曰歸易辭也以祭仲易惡祭仲也孔義鄭忽出奔衞書奔之始忽以國氏正也不能有其位故不爵伊川經説柔㑹宋公陳侯蔡叔盟于折大夫㑹盟諸侯之始内大夫㑹外諸侯盟始此孔義于折于夫鍾于闞于糓丘于虚干龜大抵為平宋鄭也前年成宋亂今復成鄭亂耶宋人辭平而始改從鄭為武父之盟為宋之戰及宋以諸侯伐鄭太宫之椽不保公亦不能救也謀之數年竟成何事野編公㑹宋公于夫鍾郕地冬十有二月公㑹宋公于闞魯地鄭忽嘗救齊伐魯今突入鄭而忽出奔故魯桓拳拳黨鄭者欲固突而拒忽爾日抄十有二年春正月夏六月壬寅公㑹杞侯公糓作紀莒子盟于曲池魯地公作歐蛇秋七月丁亥公㑹宋公燕人盟于糓丘宋地即句瀆之丘燕人姞姓非比燕也野編八月壬辰陳侯躍卒厲公卒莊公林立公㑹宋公于虚公作郯冬十有一月公㑹宋公于龜虚龜皆宋地黄正憲曰按桓夫鍾之㑹是宋欲親魯伐鄭故數㑹于魯地宋為之也此虚龜之㑹是魯期于宋鄭公不愛平故數㑹于宋地魯為之也丙戌公㑹鄭伯盟于武父鄭地棄宋即鄭野編鄭伯突也突簒其兄而立春秋以君許之不沒其實也雖君而實簒雖簒而實君皆因其實而已不然不能君也衞州吁陳佗是也孔義君臣六㑹而宋不許平辱甚矣於是遂有武父之盟蘇轍丙戌衞侯晉卒宣公卒惠公朔立日同而地異故兩書焉即書者紀事之職追書者承赴之本邵寳按石經衞侯晉卒在盟于武父之前衞上有丙戌二字糓梁傳誤簡於此辨義十有二月及鄭師伐宋丁未戰于宋來戰者罪在彼戰于郎是也徃戰者罪在内戰于宋是也孔義十有三年春二月公㑹紀侯鄭伯己巳及齊侯宋公衛侯燕人戰齊師宋師衛師燕師敗績以為鄭與宋戰者左氏也公羊謂宋與魯戰糓梁謂紀與齊戰趙匡考據經文内兵則以紀為主而先於鄭外兵則以齊為主而先於宋獨取糓梁之説然十年齊侯衛侯鄭伯來戰於郎主兵者鄭也隠四年宋公陳侯蔡人衞人伐鄭主兵者衞也此紀先於鄭未必為内兵主也齊侯序宋公上終春秋之世此齊先於宋未必為外兵主也紀雖畏齊固當從我吾從左氏野編三月葬衞宣公既與衞人戰曷為葬宣公怨不棄義怒不廢禮古人以葬為重也衛宣未葬朔乃即戎從吉行事據事直書而自見孔義諸侯在䘮而有境外之事以䘮行者稱子以吉行者稱爵趙匡夏大水秋七月冬十月十有四年春正月公㑹鄭伯于曹曹在衞南而東北為齊界所以伺齊衞之徃來虞其報救把之怨也孔義無氷時燠也孔義夏五傳疑也鄭伯使其弟語來盟語糓作禦使來盟盟前定矣伊川公㑹鄭伯于曹修武父之盟也鄭使弟語來盟修曹之㑹也傳斷秋八月壬申御廪災乙亥嘗嘗不書以御廪災書野編惡不敬也以為未易災之餘而嘗也糓梁不時也秋嘗以物成而薦新為義夏之六月未可嘗也胡傳冬十有二月丁巳齊侯禄父卒僖公卒襄公立宋人以齊人蔡人衞人陳人伐鄭師而曰以者能左右之以行其意也以一國而用諸侯之師於是始孔義蔡陳與宋盟折者也齊衞與鄭盟惡曹者也今鄭既背齊黨魯則齊亦背鄭黨宋夫齊强於宋何亦聽其節制深仇鄭也仇鄭則嫉魯可知春秋翼十有五年春二月天王使家父來求車王者無求用見當時上供多闕諸侯無王也野編三月乙未天王崩桓王崩荘王立是後莊王僖王不書崩見王室不告魯不赴而諸侯不臣益見矣孔義夏四月己巳葬齊僖公五月鄭伯突出奔蔡突何以出辟祭仲也野編鄭世子忽復歸于鄭事之初起兩亡人爾今反正也莫先正名矣彼奔者突伯也此歸者忽世子也夫其書伯也不如世子世子義嗣也奪正而伯簒也野編世子書而無突天王書而無朝名正於此而義黜於彼聖人之筆大矣簡矣邵寳突忽並争不書名何以别日抄許叔入于許即穆公新臣隠十一年鄭使莊公之弟許叔居許東徧以奉其􅀕祀鄭亂故許叔入許孔義公㑹齊侯于艾公羊作鄗糓作蒿齊地謀定許也左傳魯本怨忽許實怨鄭定許所以撓忽也日抄自郎之戰齊不通魯至是齊復通彭生之禍始此木訥邾人牟人葛人來朝按郳黎來朝稱名蕭叔來朝稱字知此稱人必非其君凡朝必以禮接於廟非諸侯不言朝曺伯使其世子來朝把伯姬來朝其子皆是子代父來行禮知此稱人者亦是其世子凡來朝同時俱至必以先後行禮若滕侯薛侯是也陳氏項氏皆謂此與滕薛皆譏旅見自參以上貶人之非也楚雖僣王猾夏其㑹諸侯亦曰用齊桓而已楚猶不敢僣天子之禮以臨諸侯而况魯乎魯君朝而稽首於伯主晉人曰天子在而君辱稽首寡君懼矣齊侯稽首於魯君魯君拜齊人怒魯人曰非天子寡君無所稽首稽首猶且不敢而况旅朝乎屬辭秋九月鄭伯突入于櫟突非正也而忽不能君故國人君突諸侯助之春秋書爵所以戒居正者已不能保則人取之矣伊川櫟有鄭伯鄭安得有伯髙伯因之賊昭公齊襄因之賊子亹傅瑕因之賊子儀春秋皆削不書苐書鄭伯突入于櫟蓋曰突已得鄭矣野編衞宣未葬而朔書衞侯見諸侯之無父世子據鄭而突書鄭伯見諸侯之無君歸義何以不言忽之出奔忽之為君㣲也祭仲存則存矣祭仲亡則亡矣公羊冬十有一月公㑹宋公衞侯陳侯于袲伐鄭袲公羊作侈宋地納突也野編袲宋地日抄十有六年春正月公㑹宋公蔡侯衛侯于曹謀伐鄭也左夏四月公㑹宋公衞侯陳侯蔡侯伐鄭突善結諸侯也齊氏曰自入春秋蔡常先衞自是遂序衞之下先儒以為後至實則以勢之强弱相上下而不復用周班矣伊川秋七月公至自伐鄭致伐之始以見勤勞於鄭突伊川一簒國公子勤諸侯三㑹再伐又弗克納其致踰時也自冬十有一月至于秋七月何多日也野編冬城向言冬通後月之詞孔義地在魯莒境上魯莒之争自城向始日抄十有一月衞侯朔出奔齊朔譖殺二兄而有其國詩刺二子乗舟誠罪人也自兹及于莊六年而入于衞中間宜有立君公子黔牟周所立也春秋筆法空處最竒隠之薨也前不書即位後不書葬知有亂者桓之薨也前書公與夫人姜氏遂如齊後書夫人孫于齊知有淫者蔡人衞人陳人從王伐鄭知有自將之天子王人子突救衞知有天子所立之公子黔牟不知者以為斷爛知者以為完整之極也野編十有七年春正月丙辰公㑹齊侯紀侯盟于黄齊地平齊紀且謀衞也左紀魯之姻國而衞朔在齊故齊欲納朔而魯欲平紀也然二年之後齊遽遷紀三邑六年之後魯卒㑹齊納朔則齊魯之强弱見矣纂疏二月丙午公㑹邾儀父盟于趡魯地下書伐邾則惡自見矣孔義夏五月丙午及齊師戰于奚魯地糓梁作郎公闕夏字齊魯交兵之始齊魯之兵始於奚而終於艾陵盟未幾而齊來侵境平紀之信豈可恃乎吳澂六月丁丑蔡侯封人卒桓侯卒哀侯立秋八月蔡季自陳歸于蔡許叔入于許許男新臣也蔡季歸于蔡蔡侯獻舞也父子繼也兄弟及也為國求君倫序為重故稱叔季爾説春秋者疑獻舞非賢未應書字謂别有一蔡季糓梁曰蔡之貴者也何氏增之曰賢者也能譲國曹臧衞郢呉札何以不書野編癸巳葬蔡桓侯三月而葬稱爵或曰請諡於王者也或曰傳失之孔義及宋人衞人伐邾宋志也左傳以二月盟以秋八月伐不書公削也野編冬十月朔日有食之推厯當為十一月庚午朔闕庚午字十有八年春王正月公㑹齊侯于濼濼水名齊地公與夫人姜氏遂如齊公無與字濼之㑹不言及夫人以夫人之伉也糓梁夫人驕伉公不能制也故曰與與則匹敵而無尊卑之别也罪公也治其本也孔義夏四月丙子公薨于齊丁酉公之䘮至自齊濼之㑹不書夫人出以遂如齊見之䘮至不書夫人入以孫于齊見之孔義秋七月冬十有二月己丑葬我君桓公九月乃葬公薨不地何也隠之故不地也今而書地桓惡無可隠也我知之矣隠之忠臣襄公諸兒也桓之孝子公孫無知也野編桓公之書葬者賊既討也魯人却尸以讓于齊曰請得彭生除君之惡徒知彭生之賊云爾齊强而魯弱故君子以為討矣劉敞意林春秋平義卷二
