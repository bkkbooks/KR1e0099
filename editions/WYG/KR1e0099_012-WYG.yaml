body:
  text: 春秋平義卷十二秀水俞汝言撰哀公名蔣定公子母定姒四歲即位在位二十七年春秋止十四年春諡法恭仁短折曰哀元年春王正月公即位楚子陳侯隨侯許男圍蔡報栢舉也隨自楚武王見伐之後不復見者一百四十餘年栢舉之敗楚王逃隨而隨芘之故楚今復列之諸侯宣六年許已為鄭所滅此復見者亦楚封之也日抄鼷鼠食郊牛改卜牛榖郊牛下有角字夏四月辛巳郊秋齊侯衞侯伐晉晉伯盡矣遂有頌言伐晉者野編冬仲孫何忌帥師伐邾邾事魯恭何以伐為其田為之灾也野編二年春王二月季孫斯叔孫州仇仲孫何忌帥師伐邾取漷東田及沂西田癸巳叔孫州仇仲孫何忌及邾子盟于句繹邾地書盟止此盟而受田葢賂也三卿將二卿盟當定之世乾侯事未逺三家少戢至是復張公方㓜弱壯弗堪矣實孫越之漸野編夏四月丙子衛侯元卒靈公卒孫輙立滕子來朝滕朝止此諸侯來朝亦止此晉趙鞅帥師納衛世子蒯瞶于戚世子也何用納為納者内不受也不書納衛世子不知輙之為拒父也何以不繫戚于衛國其國也春秋已君蒯瞶矣父不可拒父而可拒子道之盛春秋惡之此其一也孫不可立夫人之黨立之叔戌以謀逐夫人之黨出也夫人而有黨妻道之盛春秋惡之又其一也當是時蒯瞶實當立徒以兩宫隔絶國人立孫兩屬之說者謂得罪君母可爾而曰得罪于父又曰得罪于國人文逾深而去之逾逺野編秋八月甲戌晉趙鞅帥師及鄭罕達帥師戰于鐡鄭師敗績鐡公作栗又作秩衛地鞅師納蒯瞶之師鄭師助齊人輸粟范氏之師邀擊而敗之也孔義鐡衛地也在戚城南勝而書及予之也明乎予鞅也而事之不速亦正坐是齊鄭貳于晉出師撓之遲蒯聵十年入衞野編冬十月塟衞靈公七月而塟鐡之戰既罷而後塟十有一月蔡遷于州來蔡殺其大夫公子駟書遷止此州來吳滅之今以處蔡蔡終事吳不事楚駟與楚者不適有居殺之矣野編三年春齊國夏衛石曼姑帥師圍戚蒯瞶所居蒯瞶在戚曼姑主兵而齊為首者不以子圍父也不繫戚于衛者不以子制父也蒯瞶出入稱世子圍戚先國夏戚不如彭城書衛春秋筆削之情見矣孔義夏四月甲午地震五月辛卯桓宫僖宫灾桓僖親盡矣宫何以存季仲孫皆桓公子季友相僖公叔仲之後皆僖所立故三家尊桓而德僖宜毁不毁而天灾之孔義季孫斯叔孫州仇帥師城啟陽公作開陽魯邑啟陽近邾城之以防邾也孔義本木訥啟陽鄅之别名也補程傳宋樂髠帥師伐曹曹伯陽奉樂大心入蕭以叛故也孔義秋七月丙子季孫斯卒桓子卒庶子肥立是為康子蔡人放其大夫公孫獵于吳放之者以其公子駟之黨也補程傳冬十月癸卯秦伯卒惠公卒悼公立叔孫州仇仲孫何忌帥師圍邾四年春王二月盜殺蔡侯申殺公作弑二月公作三月昭侯殺子成侯立曷為稱盜以殺仇楚即吳非弑道也如曰不知何人殺吾蔡侯盜者為誰公孫氏也則既已書之矣或云栢舉之戰自取滅亡請看頓胡陳許孰是不亡之國野編宣十七年書蔡侯申卒塟蔡文公至是方五世不宜與祖同名恐傳者誤也木訥屬辭凡言弑其君者不以君有道無道異詞所以正弑逆之罪左氏不知經意曰凡弑君稱君君無道也稱臣臣有罪也葢溺于邪說而不見正于孔氏之徒也傳記師曠對晉侯論衞人出君史墨對趙簡子論魯人出君皆釋臣而歸罪于君皆當時之邪說也晉靈之世史狐以首惡書盾而猶有托為夫子之言謂趙盾為良大夫者自大夫專政士民皆知有大夫而不知有君是以君多謗而臣多譽且見弑之君無道者莫甚于齊襄莊晉靈楚䖍經皆書弑者名氐而議不及其君蔡昭公非有四君之惡也獨以無道稱而弑者免于討豈春秋之法乎由不知聖人有存䇿書之大體之義也蔡公孫辰出奔吳書盜殺蔡侯申蔡公孫辰出奔吳則辰與聞乎殺矣後傳塟秦惠公宋人執小邾子夏蔡殺其大夫公孫姓公孫霍姓也霍也昭侯之盜也春秋有所討皆曰殺其大夫野編晉人執戎蠻子赤歸于楚蠻公作曼書執止此何以不言畀楚人北宫子曰譬伯晉而京師楚也晉一至此野編城西郛備晉也孔義六月辛丑亳社灾亳公作蒲亳社商社也亡國之社必屋故灾之蘇氏秋八月甲寅滕子結卒頃公卒子隠公虞母立冬十有二月塟蔡昭公十一月而塟蔡亂故塟緩塟滕頃公五年春城毗公作比又作芘備晉也孔義夏齊侯伐宋為其伐曹執小邾子也此舉差近伯而遲暮可惜野編晉趙鞅帥師伐衞以衞助范氏故假納蒯瞶為名孔義秋九月癸酉齊侯杵臼卒杵公作處景公卒安孺子荼立冬叔還如齊閏月塟齊景公䘮事不數閏譏其以閏月塟也蘇氏六年春城邾瑕公作葭邾邑邾瑕者何猶繫舊國而設版焉明我之遽也野編晉趙鞅帥師伐鮮虞鮮虞納荀寅于栢人故也孔義吳伐陳不正其伐諸夏仍狄之矣野編夏齊國夏及高張來奔國高出而陳氏之勢成安孺子之黨孤野編叔還會吳于柤吳伐陳還至柤魯懼而往會之孔義秋七月庚寅楚子軫卒昭卒惠立齊陽生入于齊齊陳乞弑其君荼公作舎荼弑悼公陽生立春秋書弑君多矣衞剽之弑衎猶在夷儀晉州蒲之弑周猶在京師齊陽生入于齊齊陳乞弑其君何也曰後入者迎之為君先入則乗其約而馴之陳氏已有齊矣用見齊之為田而乞之雄于竊國也野編冬仲孫何忌帥師伐邾宋向巢帥師伐曹七年春宋皇瑗帥師侵鄭既伐曹又侵鄭報罕達之師孔義晉魏曼多帥師侵衞衞不服也孔義夏公會吳于鄫穀作繒鄫近邾夫差至此而公往會之孔義秋公伐邾八月己酉入邾以邾子益來宋人圍曹宋之曹我之邾晉之鮮虞嵗嵗尋師不必問所從起野編冬鄭駟𢎞帥師救曹鄭與曹疎所以救曹非志于義也欲報皇瑗之師也補程傳八年春王正月宋公入曹以曹伯陽歸何以不言滅言入不忍言也曹竟滅矣先是我入邾以邾子益來是嵗歸邾子益于邾安知宋不歸陽乎而曹竟滅矣始滅莫如紀晚滅莫如曹文皆有異野編止齋曰檜亡東周之始也曹亡春秋之終也夫子刪詩於檜之卒篇曰思周道也傷天下之無王也於曹之卒篇曰思伯也傷天下之無伯也吳伐我不言四鄙而直言伐我兵加于國都也於是為城下之盟而還不書諱之也蘇氏夏齊人取讙及闡公作僤賂齊也為以邾子益來齊人以為討野編歸邾子益于邾懼齊討也孔義秋七月冬十有二月癸亥杞伯過卒僖公卒子閔公維立齊人歸讙及闡既歸邾子亦歸我二邑野編九年春王二月塟杞僖公三月而塟宋皇瑗帥師取鄭師于雍丘宋地夏楚人伐陳陳即吳故也孔義秋宋公伐鄭冬十月十年春王二月邾子益來奔吳人討邾奉太子為政而後奔公會吳伐齊吳自欲伐齊我不能異以有郊之戰野編三月戊戌齊侯陽生卒悼公卒子簡公壬立荼之弑歸獄于陳乞陽生之罪固在也齊人叛之宜何如書曰弑則無以討昔之亂賊不曰弑而曰殺是以亂討亂也春秋之法不以亂易亂而可以亂討亂乎故因其以卒赴而卒之此所謂時措從宜之權也簡端錄陽生實卒非弑也孔義夏宋人伐鄭晉趙鞅帥師侵齊吳猶遭齊䘮而去之晉乃乗齊䘮而伐之孔義五月公至自伐齊哀公會吳者五獨此會于黄池致擇其甚危者書之孔義塟齊悼公不及五月而塟國有兵寇而簡也衛公孟彄自齊歸于衛王貫道曰彄歸則蒯瞶歸之漸也薛伯夷卒夷公作寅秋塟薛惠公冬楚公子結帥師伐陳吳救陳書救止此救反在吳晉之恥也其狄之何也不使夷狄伯中夏也野編十有一年春齊國書帥師伐我書伐我止此報去年會吳伐齊之役也孔義此所謂郊之戰也政在季孫禦諸竟而曰不能猶賴冉求之義汪錡無殤孟之側不伐稱于孔子野編夏陳轅頗出奔鄭轅公作袁五月公會吳伐齊公會吳伐齊剟書于前不使公與戰也此戰而捷曷為不使公與戰因人成事君子不貴也野編甲戌齊國書帥師及吳戰于艾陵齊地齊師敗績獲齊國書書戰書獲止此齊魯交兵亦止此戰不言公公會伐而不會戰也蘇氏敗而書及罪之也以是為國子罪也野編秋七月辛酉滕子虞母卒隱公卒冬十有一月塟滕隠公衞世叔齊出奔宋春秋書内外大夫奔者六十君之股肱故重而書之然春秋之末何其出奔之多也是時政在大夫各欲自專始則相猜相忌終乃相攻相逐也孔義十有二年春用田賦其謂之田賦何田對里言之古者田出租里出賦田之所出稯禾秉芻缶米也賦則錢刀布幣征之市㕓以繕甲攻車故曰稅以足食賦以足兵而以田賦農始病矣魯之變法三莫不善于田賦田非所以為賦也今用之野編夏五月甲辰孟子卒不言夫人諱取同姓也不薨不成䘮也不塟不成塟也孔義歸義夫人君之敵體乃子氏不塟君氏不薨孟子不氏何以訓有家乎公會吳于槖臯吳地秋公會衞侯宋皇瑗于鄖公作運吳地在今泰州木訥趙氏曰吳夫差躬敗齊師于艾陵魯故也魯以為惠故會吳于槖臯修鄫之好也公既睦于吳而吳將圖伯故為之會宋衛于鄖合宋衛以從吳也故明年為黄池之會晉好于吳非争伯也紓吳患也諸侯東向事吳者魯為之也四書公會吳繼書公會宋衞明年公會晉侯及吳子于黄池則魯之罪著矣日抄宋向巢帥師伐鄭宋鄭之怨于是十三歲矣兵端雖起于鄭罕達然六年之間宋四伐鄭明年罕達遂取宋師逞兵不戢亦何戒哉木訥冬十有二月螽十有三年春鄭罕達帥師取宋師于嵒報雍丘之師也孫復夏許男成卒成公作戊元公卒公會晉侯及吳子于黄池書會止此衛地開封縣有黄池吳欲因魯交中國晉欲交吳以弭兵故魯請而二國從之以為會孔義黄池之會參會也諸侯不至東方小國亦莫有至者而謂以會兩伯為辭吾不知也然則吳曷為稱子曰晉徳如吳晉侯猶吳子爾此非吳進乃晉侯退也野編或曰春秋不敢進退諸侯其然乎曰有王命則敢無王命則不敢周爵五等王之命也四夷稱子王之命也吳王矣楚王矣春秋退而子之以從王命而天下之名分于是乎定何不敢哉簡端録黄震曰晉自定四年召陵之會合十七國不能救蔡不見經者己二十四年吳自是年冬救蔡入楚既而救陳伐齊得志中國亦已二十四年是時晉弱吳強固也然吳方在會而於越入吳之報倐至内惕而不復固争其先晉人恐誠有如左氏之言春秋所書之次第乃其實也春秋不列叙諸侯不書盟此特晉吳二大國結好而魯預焉耳非伯也楚公子申帥師伐陳間吳之出孔義於越入吳越乗吳之不備也孔義經翌曰書於越入吳春秋葢傷諸夏之失䇿使天下之勢竟歸夷狄而不可復返也葢春秋之始為中國患者惟楚自齊桓倡伯稍能服楚乃其子孫弗率則楚氛復熾而不可撲滅浸淫至于晉文繼伯功埒齊桓其子孫亦弗克自振則當時諸侯往來于晉楚間而勢不歸一故晉不能有加于楚而楚之強自若也迨悼公援吳制楚楚日削弱矣而平定之際懦弱不振則威楚之功竟讓于吳而天下之勢亦歸于吳中國諸侯但知自相攻伐而于吳則不敢迫視也魯哀公欲息夷夏之争故為黄池之會而於越入吳則天下之勢又不在吳而在越矣夷狄代興中華失勢此聖人之所甚傷者也豈徒為吳越之故而書以示後世哉屬辭自晉厲公始通吳于上國而悼公又汲汲于會吳皆欲以吳撓楚魯昭違禮昏吳亦由晉衰欲倚以敵齊楚也而皆不稽其終是時魯賦于吳八百乗邾賦于吳六百乗徵百牢藩衞侯之舎囚子服景伯長此安窮是故春秋于吳晉之盟終諱之然吳入越不書而再書越入吳固知吳之將為沼矣秋公至自會晉魏曼多帥師侵衞公無曼字伯國侵伐止此晉事止于此矣孔義塟許元公不書月日畧也或史缺也九月螽冬十有一月有星孛于東方于東方何見于旦也其辰安在周十一月夏九月也日在房心孛日並出與昭十七年孛于大辰政同于昏言其次于旦言其方野編盜殺陳夏區夫公羊作彄夫區夫徵舒之後高閌十有二月螽十有四年春西狩獲麟春秋何以終獲麟適終也鄭樵程子曰述作之意舊矣但因麟而發麟不出春秋亦必作也故謂聖人感麟始成春秋則可謂感麟始作春秋則不可孔義易止未濟樂亂闗雎春秋竟十有四年春終則有始相與為無窮也野編春秋非感麟而作感麟而止也書止魯哀以言乎時則久矣以言乎事則多矣以言乎典禮命討則庶幾乎備矣聖筆將絶而麟出且踣焉故以是歲止簡端録蘇轍曰春秋始于隠公而終于哀公何也自周之衰天下三變而春秋舉其中焉其始也雖幽厲失道王室昏亂而禮樂征伐猶出于天子諸侯畏周之威不敢肆也及其中也平王東遷而周室不競諸侯自為政周道陵遲夷于列國迨隠之世習以成俗不可改矣然而文武成康之徳猶在民未忘周也故齊桓晉文相繼而起莫不秉大義以尊周室會盟征伐以王命為首諸侯順之者存逆之者亡雖齊晉秦楚之強義之所在天下予之義之所去天下叛之世雖無王而其法猶在也故孔子作春秋推王法以繩不義知其猶可以此治也及其終也定哀以來齊晉既衰政出于大夫繼之以吳越夷狄之衆横行于中國以勢力相吞禮義無所復施刑政無所復加雖欲舉王法以繩之而諸侯習于凶亂不可告語風俗靡然日入戰國是以春秋終焉由此觀之則春秋起于五伯之始而止于戰國之初隠哀適其時耳朱熹曰十二公各不同隠桓時王室新遷號令不行天下皆無所主莊僖時伯政自諸侯出天下始有統一宣公時楚莊強盛夷狄主盟成公時晉悼公出楚始退聽繼而吳楚又入争伯定哀時政自大夫出終春秋之世無如之何愚按公羊有所見所聞所傳聞三世之說雖不可盡拘然孔子未生以前自隠元年至僖二十四年八十六年王命不行齊桓倡伯尊周攘楚是一段僖二十四年至襄二十年八十四年晉文至悼歴世繼伯帖服秦楚是一段襄公二十一年孔子生至哀十四年七十二年晉楚並盟吳復争長諸侯相率去晉是一段作三段看世道升降較明春秋時伯權為盛衰二百四十二年分為五節隠公元年己未至莊公十二年己亥四十一年時無伯主諸侯自擅王政不行莊公十三年庚子至僖公三十三年甲午五十五年桓文迭伯尊王攘楚稍能統一文公元年乙未至成公十八年戊子五十四年晉襄繼伯歴靈成景厲大夫專政晉楚争鄭襄公元年己丑至昭公十六年乙亥四十七年晉悼復伯歴平昭大夫專政晉楚之從交相見昭公十七年丙子至哀公十四年庚申四十五年吳楚争衡越又間之陪臣執命諸侯相次叛晉無伯之世亂益甚矣故其始也傷天下之無王其後也傷天下之無伯鄧元錫曰以五伯為亂賊而誅之也不若以伯為伯亂賊為亂賊之為質也求過于功而誅之也不若以功為功以過為過之為質也因物付物而吾無與焉其斯為曲直之繩墨也春秋平義卷十二
