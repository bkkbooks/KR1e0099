body:
  text: 春秋平義卷八秀水俞汝言撰成公名黑肱宣公子母穆姜夫人齊姜在位一十八年諡法安民立政曰成元年春王正月公即位二月辛酉葬我君宣公無冰三月作丘甲舊法九夫為井四井為邑四邑為丘四丘為甸甸出車一乘甲士三人步卒七十二人四丘而出三甲新法即丘出一甲謂之丘甲則甸出甲士四人步卒九十六人三甸又得甲士三人步卒七十二人即增車一乘矣今謂之丘甲昔可謂之甸甲也作為也盡廢舊版改為之也再變矣助變而稅甸變而丘野編夏臧孫許及晉侯盟于赤棘晉地及者我及之也歸父往矣開怨于齊不能不即晉野編秋王師敗績于茅戎茅公穀作貿不言戰莫之敢敵也言敗績于茅戎自敗也孔義冬十月二年春齊侯伐我北鄙魯之事齊甚謹易世而聘㑹不絶及與晉盟斷道而怨隙成再盟赤棘而北鄙伐矣胡傳夏四月丙戌衛孫良夫帥師及齊師戰于新築衛師敗績衛地衛書大夫帥師于是始曷為使良夫主之非齊加衛衛方事晉故欲絶齊野編六月癸酉季孫行父臧孫許叔孫僑如公孫嬰齊帥師㑹晉郤克衛孫良夫曹公子首及齊師戰于鞍齊師敗績首公穀作手鞍齊地四卿並出見魯之亂也婦人笑客事竒然斷道在彼我之北鄙衛之新築微客怒晉師必出齊侯佚獲亦竒野編魯是時止有二軍行父將一軍許佐之僑如將一軍嬰齊佐之耳至襄十一年始作三軍辨義秋七月齊侯使國佐如師己酉及國佐盟于袁婁袁穀作爰齊地去齊五十里袁婁之盟何如召陵曰紀甗玉磬得似包茅之問否不言國佐來盟于師曰及國佐盟及者我及之也揖而去之幾失國佐野編齊自翟泉以來不與晉盟者踰四十年而袁婁以後三十餘年無㑹不同無役不與則鞍之敗挫之也孔義八月壬午宋公鮑卒文公卒子共公固立庚寅衛侯速卒速公作遫穆公卒子定公立取汶陽田夫使齊人歸之汶陽我之舊也使晉人反之以充鞍之進至用師圍棘與外取何異野編冬楚師鄭師侵衛十有一月公會楚公子嬰齊于蜀魯地楚書公子自嬰齊始魯衛受盟于晉從于伐齊故楚為陽僑之役侵衛侵魯魯不書以賂退也以中國諸侯降班失列下與夷狄之大夫會辱已甚矣孔義丙申公及楚人秦人宋人陳人衛人鄭人齊人曹人邾人薛人鄫人盟于蜀于是乎畏晉而竊與之盟謂之曰匱盟左傳按齊在衛鄭下非卿也蜀之盟諸侯從楚者十一國晉不敢爭其後四十二年晉趙武楚屈䢖合諸侯于宋然後晉楚之從得交相見又八年楚靈王求諸侯于晉晉人許之然後諸侯始從楚皆蜀之盟啓之也是會也魯倡之楚主之蘇氏屬辭齊桓公卒陳穆公請修好諸侯以無忘桓公之德盟于齊楚人得與中國盟㑹于是始宋襄不度德量力求諸侯於楚而為鹿上之盟至有盂之執辱泓之敗績于是魯挾楚師抗齊為東諸侯事楚之始陽僑之役納賂請平公㑹楚公子嬰齊及十一國之大夫盟于蜀則夷夏之分蕩然矣故三盟列國大夫皆奪其恆稱責其墮中國之大義也至晉楚為宋之盟南北諸侯交相見乃從其恆稱者齊與鹿上召陵之威烈未泯蜀之盟雖曰東方諸侯皆在而猶有晉也故皆奪其恆稱以示義晉悼公卒晉知不競于楚而遂以諸侯與之則春秋將何所辨乎故晉楚之盟會大夫亦從其恆稱以見實而已三年春王正月公會晉侯宋公衛侯曹伯伐鄭蜀之盟中國之恥鄭為之也伐鄭以雪恥也宋衛未葬亦書爵如曰兵革變亂正為此設于蜀稱人伐鄭稱爵髙飛者鎩其六翮垂翅者假其羽毛野編左氏以為討邲之役邲之役晉救鄭而自敗于楚非鄭之罪矣無亦以前年冬楚師鄭師侵衛之故與夫使晉能距楚則鄭必服今兵力盡于齊而區區摟諸侯于從楚之餘宜其不得鄭也孔義辛亥葬衛穆公六月而葬二月公至自伐鄭甲子新宫災三日哭宣宫也不曰宣宫者神主未遷也宫成而主未入遇災而哭何禮㦲孔義乙亥葬宋文公七月而葬文公卒始厚葬始用殉君子謂華元樂舉為不臣左傳夏公如晉拜汶陽之田鄭公子去疾帥師伐許許恃楚不事鄭故也孔義公至自晉秋叔孫僑如帥師圍棘汶陽田也棘其邑也野編大雩晉郤克衛孫良夫伐牆咎如牆穀作牆公作將赤狄之餘也冬十有一月晉侯使荀庚來聘衛侯使孫良夫來聘丙午及荀庚盟丁未及孫良夫盟聘而遂盟之于是始鄭伐許曰鄭狄之也變于楚也野編四年春宋公使華元來聘宋入春秋聘魯始此孔義三月壬申鄭伯堅卒襄公卒悼公費立杞伯來朝夏四月甲寅臧孫許卒宣叔公如晉葬鄭襄公踰月葬秋公至自晉冬城鄆公羊作運鄆有三在魯者二成十六年公待于鄆此西鄆今所城也文十二年城諸及鄆此東鄆莒魯所爭者也莒之别邑亦曰鄆九年莒潰楚人入鄆是也野編鄭伯伐許喪未踰年以吉禮從金革之事故特稱伯孔義五年春王正月杞叔姬來歸僖公女仲孫蔑如宋報華元也孔義夏叔孫僑如㑹晉荀首于穀首公作秀齊地宣伯荀首如齊逆女也孔義不㑹于魯而㑹于齊地趙氏所謂銷齊侯議魯之謀破魯人謀己之諼左氏志其㑹而不知其故是也辨義梁山崩秋大水冬十有一月己酉天王崩定王崩子簡王立十有二月己丑公會晉侯齊侯宋公衛侯鄭伯曹伯邾子杞伯同盟于蟲牢鄭地能為異者鄭也盟于蟲牢鄭地也之謂同矣野編六年春王正月公至自㑹立武宫武宫武公之宫也于是十有一世矣立武宫非禮也野編武公之諡武也必嘗有功于武矣季孫行父以鞍之功不勝其侈于是乎有武宫之立故漢儒因是以擬武世室焉邵寶按明堂位曰魯公之廟文世室也武公之廟武世室也以武公比武王世世不遷不知何德以堪此也取鄟鄟國也野編衛孫良夫帥師侵宋夏六月邾子來朝公孫嬰齊如晉子叔聲伯叔肹子壬申鄭伯費卒悼公卒弟成公睔立秋仲孫蔑叔孫僑如帥師侵宋謂魯衛侵宋為受晉命可爾野編楚公子嬰齊帥師伐鄭楚始書大夫將爭鄭也野編救鄭書侵蔡則不書善晉之救而成之也伐鄭書救蔡則不書惡楚之伐而黜之也略記冬季孫行父如晉賀遷也左傳晉欒書帥師救鄭救公作侵救師出而楚還侵蔡而遇楚救蔡之師晉帥之欲戰者八人欒書決于三卿之言全師而還可謂善御下矣孔義七年春王正月鼷鼠食郊牛角改卜牛鼷鼠又食其角乃免牛以異書再食異甚野編吳伐郯吳始見經吳距郯稍逺越江淮以伐之爭中國之端也孔義荆之始見也入蔡吳之始見也伐郯中國莫之問故駸駸焉交亂中國戴溪夏五月曹伯來朝不郊猶三望秋楚公子嬰齊帥師伐鄭公會晉侯齊侯宋公衛侯曹伯莒子邾子杞伯救鄭八月戊辰同盟于馬陵衛地蜀之盟楚無晉矣馬陵之盟差足厭之野編莒自晉文之卒至是始與盟孔義公至自會吳入州來楚邑下蔡州來楚與也吳入州來以撓楚楚之憂中國之喜狄而中國則中國之矣此其曰吳何也昔者貫澤之盟有江黃無徐徐已稱王可以為援不可移以自近吳猶徐也而于柤于向通于上國又生一楚書曰吳入州來謹之也野編吳楚之爭自入州來始日抄冬大雩舉時則三月矣大旱也孔義衛孫林父出奔晉扈之盟書晉大夫于是衛有孫氏魯有季氏皆怙于晉乃知春秋之慮早也野編八年春晉侯使韓穿來言汶陽之田歸之于齊汶陽魯田自齊歸魯曰歸可也自魯歸齊安得謂之歸曰歸之者强歸之詞補程傳晉欒書帥師侵蔡蔡自翟泉以來不與中國盟㑹者四十八年矣而再致師大國爭衡而小國受敗春秋矜焉孔義經言侵蔡傳言遂侵楚又言侵沈獲沈子揖侵楚應書獲沈子揖又應書不足信也野編公孫嬰齊如莒宋公使華元來聘夏宋公使公孫夀來納幣或言共姬之嫁納幣致女皆卿媵者四國何也曰姬穆姜息女公女弟也漢有公主長公主大長公主禮數不同又宋大國也故大國皆來媵非郯杞可比說者以為録共姬誤矣野編晉殺其大夫趙同趙括討靈公之賊若同括為莊姬譛之則武田何為見奪野編莊姬譛殺同括不應併廢其子意當時欒郤為政追論靈公之弒而殺同括趙武以莊姬故而得免然以罪人之後廢不得立故以田與祁奚逮三郤誅欒書沒始以韓厥言而復之左氏詳其始末併載于此非一時事也以國殺而不去其官以弒逆之罪不在後嗣廢之可也殺之不可略記王樵曰屠岸賈殺趙朔自一事也趙莊姬殺同括又一事也辨義秋七月天子使召伯來賜公命賜公穀作錫錫命止此春秋書天子惟此此有天下者之號也故一書為萬世法其他書王者蓋周之稱于天下久矣繫之天尊之也簡端録自諸侯言之則曰天王自諸臣言之則曰天子誼得曰錫私恩曰賜冬十月癸卯杞叔姬卒晉侯使士燮來聘叔孫僑如會晉士燮齊人邾人伐郯討其事吳也恨不以此為救郯之師野編衛人來媵媵小事不書伯姬之嫁諸侯皆來媵之故書以見其賢一女子之賢尚聞于諸侯况君子乎伊川九年春王正月杞伯來逆叔姬之喪以歸公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子杞伯同盟于蒲衛地尋馬陵之盟也為歸汶陽之田故公至自㑹二月伯姬歸于宋穆姜女成公姊妹夏季孫行父如宋致女顧炎武日知録庶出之子不書生故子同生特書庶出之女不書致不書媵故伯姬歸于宋特書晉人來媵三國來媵則為十二女矣宋以先代後得用王禮如其逾制則春秋書之適足以纍伯姬非彰其賢矣略記秋七月丙子齊侯無野卒頃公卒子靈公環立晉人執鄭伯晉欒書帥師伐鄭不言執鄭伯以伐鄭則非以也始齊桓與楚爭鄭逃盟乞盟去來任之至洮之會可言鄭服鄭伯方在㑹安用執之經不言歸鄭伯不以會服豫晉也其後悼公城虎牢以備鄭至蕭魚之會可言鄭服野編𫝊載晉殺鄭行成之使而經不書重在君也傳載楚子侵陳救鄭經不書薄楚不足録也補程傳冬十有一月葬齊頃公楚公子嬰齊帥師伐莒庚申莒潰楚人入鄆伐莒所以救鄭也馬陵于蒲莒同盟焉爾野編季氏曰楚自入春秋以來兵未有至于沂上者今特遣貴卿越淮泗沂以伐莒且是時晉方執鄭伯以伐鄭乃不之救長驅東向以攻所不急此其䇿安在乎蓋為備吳之計也吳自七年伐鄭而尋入州來江淮間與楚之國已皆震驚楚人懼矣連合郯兵以出淮泗則自汝以東非楚有矣此所以逺出郯比以爭諸侯蓋郯之所畏者晉如莒一入邾則足以制郯而吳人不敢挾鄭南下矣此楚人伐莒之計也辨義莒今密州在魯東日抄秦人白狄伐晉諸侯二故也鄭人圍許示不急君也野編此公孫申之謀明年鄭伯歸殺申以鄭用其謀改立君也日抄城中城魯地十年春衛侯之弟黑背帥師侵鄭晉命也夏四月五卜郊不從乃不郊自此不復書三望矣春秋書禘者二于莊公于太廟無所取之直謂不當禘爾書郊者九夏四月五月乃至九月三卜四卜五卜牛傷牛死無所取之直謂不當郊爾昔者周公郊祀后稷以配天宗祀文王于明堂以配上帝是以四海之內各以其職來祭奚取于魯侯之廟乎野編五月公㑹晉侯齊侯宋公衛侯曹伯伐鄭傳言晉侯有疾立太子州蒲為君㑹諸侯伐鄭所書晉侯太子州蒲也野編晉景未亡而先立君春秋又從而書曰晉侯有是理乎見左傳之妄經翼齊人來媵凡諸侯嫁女同姓媵之異姓則否左周語曰王御不參一族則三國之媵不得出于一族天子之禮如此諸侯亦可推也若三國必皆同姓則嬴曹姒弋之國嫁女者或不能備矣略記丙午晉侯獳卒景公卒子厲公州蒲立當是卒下脫于師字不然則丙午上脫六月字晉景十九年中征伐㑹盟無虛日然南伐不于楚于鄭東伐不于吳于郯令冦自大此景之不得與于伯也野編秋七月公如晉冬十月公羊無十有一年春王三月公至自晉公有行多矣未有淹于此者卿弔大夫葬公身兼之非禮也前書晉侯獳卒公如晉後書十有一年春王三月公至自晉此中當書葬晉景公不書嫌京師晉也當書春王正月公在晉不書在楚在乾侯春秋不恥也其在晉也公安之不恥春秋恥之也不書謂削之以見義爾非諱也春秋有削無諱野編晉侯使郤犨來聘己丑及郤犨盟犨公作州不盟公反于國而使大夫盟晉之無禮甚矣孔義夏季孫行父如晉報聘且涖盟也秋叔孫僑如如齊自蟲牢以來晉厚齊魯亦親齊而十四年如齊逆女之議始此矣野編冬十月十有二年春周公出奔晉周公楚患襄惠之逼且與伯輿爭政不勝而出王使劉子復盟于鄄而入三日復出凡自周無出周公自出故書周公出奔晉蘇氏夏公㑹晉侯衛侯于瑣澤公作沙澤左氏謂華元合晉楚之成而㑹然楚不至宋亦不與不應書法如此豈其為謀狄乎孔義灌甫曰晉侯初立㑹魯衛于瑣澤將以伐秦也故明年使郤錡來乞師辨義秋晉人敗狄于交剛蓋白狄也九年秦人白狄伐晉此先敗狄而後伐秦報九年之役也髙閌冬十月十有三年春晉侯使郤錡來乞師雖晉之大命魯興師亦書曰乞所以正王法劉絢傳三月公如京師夏五月公自京師遂㑹晉侯齊侯宋公衛侯鄭伯曹伯邾人滕人伐秦書曰如京師見諸侯之慢也因㑹伐而行矣又書公自京師以伐秦為遂事者此仲尼親筆明朝王為重存人臣之禮也胡傳曹伯盧卒于師公穀作廬宣公卒成公負芻篡立秋七月公至自伐秦不以京師至究其初心也孔義冬葬曹宣公十有四年春王正月莒子朱卒渠丘公卒犂比公密州立季他也張氏夏衛孫林父自晉歸于衛歸易詞也自晉奉之故也孔義衛獻之出奔始此衛自元咺以臣抗君皆晉為之矣日抄秋叔孫僑如如齊逆女鄭公子喜帥師伐許九月僑如以夫人婦姜氏至自齊稱婦宣公夫人穆姜尚存張洽冬十月庚寅衛侯臧卒定公卒子獻公衎立秦伯卒桓公卒子景公立十有五年春王二月葬衛定公三月乙巳仲嬰齊卒嬰齊公孫歸父之弟歸父奔齊魯人使嬰齊後之故曰仲嬰齊孔義癸丑公會晉侯衛侯鄭伯曹伯宋世子成齊國佐邾人同盟于戚晉侯執曹伯歸于京師歸下公有之字曹伯卒于師負芻殺太子自立稱侯以執執有罪也歸于京師禮也此伯討也而猶不掩曹伯之與盟者以為先執曹伯以令諸侯而後盟之乃盡善也故書同盟見其既同矣孔義伯討諒哉乃若先盟後執則文之故譎也於厲何尤邵寶夫執人者視所執也書人書爵總不關義齊桓執鄭詹詹亦得稱人也楚子執宋公亦得稱爵也野編公至自會夏六月宋公固卒共公卒子平公成立楚子伐鄭秋八月庚辰葬宋共公三月而葬宋華元出奔晉宋華元自晉歸于宋宋殺其大夫山宋魚石出奔楚葬甫畢而國卿出走知有亂者也亂者為誰山即其人矣故兩挈華元而山不氏晉盟主也宋人聽焉所直歸之不直者殺之魚石山黨也不之晉之楚入彭城以披宋則可知也野編蕩山弱公室殺公子肥元欲討山而力不能故出奔魚石懼其挾晉援而桓氏不祀于宋故自止之于河上而許以討山然後歸元之出元之入皆正也山不書氏害公族也魚石之奔親於山恐見及也孔義宋四告故四書之實一事也華元出未至晉而書奔晉志其志也河上非晉地之晉之道也簡端録冬十有一月叔孫僑如會晉士燮齊髙無咎宋華元衛孫林父鄭公子鰌邾人會吳于鍾離楚邑濠州會吳之始亦晉以諸侯之大夫為會之始始通吳也吳求㑹于諸侯諸侯之衆往而從之孔義殊㑹吳外吳也穀梁晉侯㑹狄于攢函此會吳注腳也野編成公之末楚浸衰而吳驟强天下所恃者晉而已反率諸侯而從之一會而合七國再㑹而合十三國三㑹而合十二國天下無不聽于吳焉葉氏許遷于葉畏逼于鄭也十有六年春王正月雨木冰二傳雨而木冰也野編唐遜皇帝所謂木稼者是也木稼蓋木介爾蘇氏夏四月辛未滕于卒文公卒子成公原立鄭公子喜帥師侵宋鄭服中國五年矣至是附楚侵宋自是與楚同病中國諸侯之兵無寧嵗矣孔義六月丙寅朔日有食之晉侯使欒黶來乞師甲午晦晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績鄭地邲之戰楚無晉矣鄢陵之戰差足厭之野編晉將伐鄭鄭告于楚楚子遽引師而來于是晉不暇俟諸侯之兵先與合戰而敗之故直言戰而已補程傳自晉敗于邲楚師橫行中原厲公一戰而勝之洗中國二十餘年之恥日抄邲之戰晉敗于楚鄭襄公則畏楚而畔晉鄢陵之戰楚敗于晉鄭成公又德楚而讐晉鄭之于楚何若是親乎列國論楚殺其大夫公子側子反楚共身在行間以罷卒致敗嬰齊以令尹將左軍而與側相惡致有此敗故稱國以殺君臣同責也孔義秋公會晉侯齊侯衛侯宋華元邾人于沙隨不見公宋地魯以內難師出後期晉聽僑如之譛不見公不諱者曲不在公也孔義公至自會公㑹尹子晉侯齊國佐邾人伐鄭王臣始㑹伐經筌曰自厲公以上未有王命主兵者後傳曰㑹伐未有書王人者雖齊桓不得與單伯序伐江之役王叔桓公不書伐秦之役劉子成子不書也通說曹伯歸自京師不名不稱復歸位未絶也自京師王命也孔義九月晉人執季孫行父舍之于苕丘苕公作軺晉地執不言舍舍適館也執則囚也季孫殆將歸矣叔孫譛之野編冬十月乙亥叔孫僑如出奔齊譛不行野編十有二月乙丑季孫行父及晉郤犨盟于扈公至自㑹至自㑹以見公之不與伐鄭也孔義乙酉刺公子偃必叔孫謀立偃也魯之盟東門氏也曰毋或如東門遂不聽公命殺適立庶盟叔孫氏曰毋或如叔孫僑如欲廢國常蕩覆公室事成則宣不成偃也野編十有七年春衛北宫括帥師侵鄭括公作結晉命也夏公㑹尹子單子晉侯齊侯宋公衛侯曹伯邾人伐鄭前此諸侯屈天子之卿而㑹者有之未有屈二卿者屈天子之卿為盟者有之未有同盟者厲公之志驕僣甚矣戴溪比之翟泉與王子盟者差重比之洮盟于王人者差輕重則故皆人之沒公輕則不沒公此以與王臣比之與王子者亦差輕故不沒公通說六月乙酉同盟于柯陵鄭地秋公至自㑹齊髙無咎出奔莒以慶克之故髙國不能自保崔氏于是復進矣孔義九月辛丑用郊用郊之始九月非所以用郊也野編魯之卜郊自僖公始而用郊自成公始書曰用郊蓋前此未嘗用也木訥晉侯使荀罃來乞師冬公會單子晉侯宋公衛侯曹伯齊人邾人伐鄭單伯㑹伐宋尹單二子三伐鄭庶幾禮樂征伐自天子出春秋甚珍之晉主兵而先二子則可知也惜乎厲之無道不然鄢陵之戰柯陵之盟與召陵城濮爭烈矣野編夏伐鄭楚師至而諸侯還冬伐鄭楚師至而諸侯還厲公無服人之德而人心之不一見矣孔義十有一月公至自伐鄭壬申公孫嬰齊卒于貍脤公作軫穀作蜃從公伐鄭還而道卒孔義十一月無壬申其以壬申卒之何春秋故史也有所不革劉傳十有二月丁巳朔日有食之推厯當為十一月丁巳朔邾子貜且卒定公卒宣公牼立晉殺其大夫郤錡郤犨郤至郤氏一族三卿雖欒氏亦忌之矣故羣怨並興厲公輕聽而殺三卿自禍之道也孔義楚人滅舒庸舒庸恃吳而不備也孔義舒庸偃姓之國任氏十有八年春王正月晉殺其大夫胥童晉語云晉厲殺三郤而尸諸朝納其室以分婦人國人弗蠲也遂殺諸翼則殺胥童者書偃也而弒君者國人也于書偃同盟也故當時莫以書偃為弒君如士鞅見逐于欒黶猶言武子之德使誠有弒君之惡何至頌美若此叔向之言亦未嘗斥其弒君惟云行刑不姦以免于難蓋謂殺胥童之事耳其以弒君之罪加欒書者實始于陽畢畢謂平公曰欒書覆宗殺厲以厚其家按陽氏固黨于趙氏故趙括趙同之難欒氏實為戎首由是思之欒氏者趙氏之深讐也陽氏為趙氏之黨故為之隕欒而即以興趙逮欒盈以叛誅趙氏世擅晉國于是陽畢之說無異議欒書之弒晉乘記之矣夫子據魯史書之左氏不辨而採之晉乘遂與春秋相抵牾略記晉弒其君州蒲厲公弒悼公周立三卿一大夫皆晉厲殺之次當及書偃左右皆敵仇獄無所歸故曰晉弒之也野編木訥曰厲公修文襄業敗狄伐秦當吳楚並興欲抗吳則畏楚欲抗楚則慮吳遂合諸侯以會吳于鍾離蓋疑吳楚合則中國無以抗之也吳既我附明年遂興鄢陵之師大敗楚鄭謀亦深矣然晉雖得志而鄭不反既而上屈王師下連諸侯三疾于鄭鄭不能得而中行欒氏之逆成剛曓之君可不監哉齊殺其大夫國佐此齊崔慶專國之始事也李氏諸𫝊㑹通公如晉夏楚子鄭伯伐宋宋魚石復入于彭城宋邑王樵曰楚為是舉非止納宋之叛患其意尤在隔吳晉之道也辨義傳稱楚納魚石而經書復入者何蓋納者雖强其所不容然憑藉歸國稱是順辭至于入則乘勢逞强直據之而已經翼公至自晉晉侯使士丐來聘秋杞伯來朝八月邾子來朝築鹿囿己酉公薨于路寢冬楚人鄭人侵宋晉侯使士魴來乞師魴公作彭齊桓伯業始於平宋亂晉文伯業始于釋宋圍悼公伯業又始于彭城之救宋故韓獻子曰成伯安疆自宋始矣孔義十有二月仲孫蔑㑹晉侯宋公衛侯邾子齊崔杼同盟于虛朾宋地晉悼之伯自此始野編丁未葬我君成公春秋平義卷八
